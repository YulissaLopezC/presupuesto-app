<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Configurar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── Tabs Gastos / Ingresos ──────────────────────────── */
    .tabs {
      display: flex; background: var(--bg);
      border-radius: 10px; padding: 4px;
      margin-bottom: 20px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 9px; text-align: center;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; border-radius: 7px;
      transition: all 0.2s; user-select: none;
    }
    .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

    /* ── Resumen totales arriba ───────────────────────────── */
    .summary-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 20px;
    }
    .summary-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      text-align: center;
    }
    .summary-item .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .summary-item .s-value {
      font-family: "DM Serif Display", serif;
      font-size: 16px; letter-spacing: -0.3px; margin-top: 3px;
    }
    .s-value.inc { color: var(--info); }
    .s-value.exp { color: var(--warning); }
    .s-value.pos { color: var(--accent); }
    .s-value.neg { color: var(--danger); }

    /* ── Grupos de categorías ────────────────────────────── */
    .type-section { margin-bottom: 6px; }

    .type-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 0 8px;
    }
    .type-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .type-dot.basico      { background: var(--accent); }
    .type-dot.no-esencial { background: var(--warning); }
    .type-dot.ahorro      { background: var(--info); }

    .type-section-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .type-section-total {
      margin-left: auto; font-size: 12px; color: var(--muted);
      font-family: "DM Serif Display", serif;
    }

    /* ── Fila de categoría editable ─────────────────────── */
    .budget-row {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; gap: 12px;
      transition: border-color 0.15s;
    }
    .budget-row:focus-within { border-color: var(--border2); }

    .budget-row-name {
      flex: 1; font-size: 14px; color: var(--text);
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .budget-input-wrap { position: relative; flex-shrink: 0; width: 130px; }
    .budget-input-wrap .sym {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; color: var(--muted); pointer-events: none;
    }
    .budget-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px 8px 22px;
      font-family: "DM Serif Display", serif;
      font-size: 14px; color: var(--text);
      outline: none; text-align: right;
      transition: border-color 0.15s;
    }
    .budget-input:focus { border-color: var(--accent); }
    .budget-input::placeholder { color: var(--muted2); font-family: "DM Sans", sans-serif; font-size: 13px; }

    /* ── Filas de fuentes de ingreso ─────────────────────── */
    .income-row {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; gap: 10px;
    }
    .income-name-input {
      flex: 1; background: transparent; border: none;
      font-family: "DM Sans", sans-serif; font-size: 14px;
      color: var(--text); outline: none;
    }
    .income-name-input::placeholder { color: var(--muted2); }

    /* ── Botón copiar mes anterior ───────────────────────── */
    .copy-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(181,209,122,0.06);
      border: 1px solid rgba(181,209,122,0.2);
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 16px;
    }
    .copy-banner p { font-size: 13px; color: var(--accent); }
    .copy-banner span { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

    .btn-copy {
      background: rgba(181,209,122,0.1); border: 1px solid rgba(181,209,122,0.3);
      color: var(--accent); border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 500;
      font-family: "DM Sans", sans-serif; cursor: pointer;
      white-space: nowrap; transition: background 0.15s;
      flex-shrink: 0; margin-left: 10px;
    }
    .btn-copy:hover { background: rgba(181,209,122,0.18); }

    /* ── Botón agregar ingreso ────────────────────────────── */
    .btn-add-row {
      width: 100%; padding: 10px;
      background: none; border: 1px dashed var(--border2);
      border-radius: 10px; color: var(--muted);
      font-family: "DM Sans", sans-serif; font-size: 13px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      margin-bottom: 6px;
    }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Sticky save bar ─────────────────────────────────── */
    .save-bar {
      position: sticky; bottom: 68px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px; margin: 0 -16px;
      z-index: 80;
    }

    /* ── No categorías aviso ─────────────────────────────── */
    .no-cats-notice {
      background: rgba(224,184,112,0.07);
      border: 1px solid rgba(224,184,112,0.25);
      border-radius: 12px; padding: 14px 16px;
      font-size: 13px; color: var(--warning); line-height: 1.5;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <h2>Presupuesto</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Define cuánto planeas gastar e ingresar cada mes.
      </p>
    </div>

    <!-- Selector de mes -->
    <div id="month-selector-container" style="margin-bottom:16px;"></div>

    <!-- Copiar mes anterior -->
    <div id="copy-banner" style="display:none;" class="copy-banner">
      <div>
        <p>Copiar del mes anterior</p>
        <span id="copy-banner-sub"></span>
      </div>
      <button class="btn-copy" id="btn-copy">Copiar</button>
    </div>

    <!-- Resumen totales -->
    <div class="summary-bar" id="summary-bar">
      <div class="summary-item">
        <div class="s-label">Ingresos</div>
        <div class="s-value inc" id="sum-income">$ 0</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Gastos</div>
        <div class="s-value exp" id="sum-expenses">$ 0</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Balance</div>
        <div class="s-value pos" id="sum-balance">$ 0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-gastos"   onclick="switchTab('gastos')">Gastos</div>
      <div class="tab"        id="tab-ingresos" onclick="switchTab('ingresos')">Ingresos</div>
    </div>

    <!-- Panel Gastos -->
    <div id="panel-gastos">
      <div id="no-cats-notice" style="display:none;" class="no-cats-notice">
        No tienes categorías configuradas.
        <a href="./categories.html" style="color:var(--warning);font-weight:500;"> Ir a Categorías →</a>
      </div>
      <div id="categories-form"></div>
    </div>

    <!-- Panel Ingresos -->
    <div id="panel-ingresos" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">
        Fuentes de ingreso esperadas para el mes.
      </p>
      <div id="income-form"></div>
      <button class="btn-add-row" onclick="addIncomeRow()">+ Agregar fuente de ingreso</button>
    </div>

    <!-- Sticky save -->
    <div class="save-bar">
      <button class="btn-primary" id="btn-save" onclick="saveBudget()">Guardar presupuesto</button>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth }   from "../modules/auth.js";
    import { getBudget, setBudget, getBudgetMonths, getCategories } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector, showToast } from "../assets/ui.js";
    import { formatCOP, currentMonth, formatMonth, lastMonths } from "../assets/utils.js";

    let uid, selectedMonth, categories = [], currentBudget = null;

    // ── Init ─────────────────────────────────────────────
    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("budget");
    renderMonthSelector("month-selector-container", selectedMonth, (m) => {
      selectedMonth = m;
      loadBudget();
    });

    categories = await getCategories(uid);
    await loadBudget();

    // ── Cargar presupuesto del mes ────────────────────────
    async function loadBudget() {
      currentBudget = await getBudget(uid, selectedMonth);
      renderCategoriesForm();
      renderIncomeForm();
      updateSummary();
      await checkCopyBanner();
    }

    // ── Banner "copiar mes anterior" ──────────────────────
    async function checkCopyBanner() {
      const months = lastMonths(12);
      const idx = months.indexOf(selectedMonth);
      if (idx < 0 || idx >= months.length - 1) {
        document.getElementById("copy-banner").style.display = "none";
        return;
      }
      const prevMonth = months[idx + 1];
      const prevBudget = await getBudget(uid, prevMonth);
      const banner = document.getElementById("copy-banner");
      if (prevBudget && !currentBudget) {
        document.getElementById("copy-banner-sub").textContent = `Desde ${formatMonth(prevMonth)}`;
        banner.style.display = "flex";
        document.getElementById("btn-copy").onclick = () => copyFromMonth(prevBudget);
      } else {
        banner.style.display = "none";
      }
    }

    async function copyFromMonth(prevBudget) {
      currentBudget = { categories: { ...prevBudget.categories }, income: { ...prevBudget.income } };
      renderCategoriesForm();
      renderIncomeForm();
      updateSummary();
      document.getElementById("copy-banner").style.display = "none";
      showToast("Presupuesto copiado. Guarda para confirmar.", "success");
    }

    // ── Panel Gastos ──────────────────────────────────────
    function renderCategoriesForm() {
      const container = document.getElementById("categories-form");
      const noticEl   = document.getElementById("no-cats-notice");

      if (!categories.length) {
        noticEl.style.display = "block";
        container.innerHTML = "";
        return;
      }
      noticEl.style.display = "none";

      const savedCats = currentBudget?.categories || {};

      const TYPES = [
        { key: "GASTO BÁSICO",       cls: "basico",      label: "Gasto básico" },
        { key: "GASTO NO ESENCIAL",  cls: "no-esencial", label: "Gasto no esencial" },
        { key: "AHORRO O INVERSIÓN", cls: "ahorro",      label: "Ahorro o inversión" }
      ];

      container.innerHTML = TYPES.map(type => {
        const cats = categories.filter(c => c.type === type.key);
        if (!cats.length) return "";

        const typeTotal = cats.reduce((s, c) => s + (Number(savedCats[c.name]) || 0), 0);

        return `
          <div class="type-section">
            <div class="type-section-header">
              <div class="type-dot ${type.cls}"></div>
              <span class="type-section-label">${type.label}</span>
              <span class="type-section-total" id="type-total-${type.cls}">${formatCOP(typeTotal)}</span>
            </div>
            ${cats.map(cat => `
              <div class="budget-row">
                <span class="budget-row-name">${cat.name}</span>
                <div class="budget-input-wrap">
                  <span class="sym">$</span>
                  <input
                    type="number" min="0"
                    class="budget-input"
                    data-cat="${cat.name}"
                    data-type-cls="${type.cls}"
                    value="${savedCats[cat.name] || ""}"
                    placeholder="0"
                    oninput="onBudgetInput(this)"
                  />
                </div>
              </div>`).join("")}
          </div>`;
      }).join("");
    }

    // ── Panel Ingresos ────────────────────────────────────
    function renderIncomeForm() {
      const container = document.getElementById("income-form");
      const savedIncome = currentBudget?.income || {};
      const entries = Object.entries(savedIncome);

      if (!entries.length) {
        container.innerHTML = "";
        return;
      }

      container.innerHTML = entries.map(([name, amount], i) => incomeRowHTML(name, amount, i)).join("");
    }

    function incomeRowHTML(name = "", amount = "", idx) {
      return `
        <div class="income-row" id="income-row-${idx ?? Date.now()}">
          <input type="text" class="income-name-input" placeholder="Fuente de ingreso"
                 value="${name}" oninput="updateSummary()"/>
          <div class="budget-input-wrap" style="width:130px;">
            <span class="sym">$</span>
            <input type="number" min="0" class="budget-input" placeholder="0"
                   value="${amount}" oninput="updateSummary()"/>
          </div>
          <button class="btn-danger" onclick="this.closest('.income-row').remove();updateSummary()">✕</button>
        </div>`;
    }

    window.addIncomeRow = function() {
      const container = document.getElementById("income-form");
      const div = document.createElement("div");
      div.innerHTML = incomeRowHTML("", "", Date.now());
      container.appendChild(div.firstElementChild);
      container.lastElementChild.querySelector(".income-name-input").focus();
    };

    // ── Actualizar resumen en tiempo real ─────────────────
    window.onBudgetInput = function(input) {
      updateTypeTotal(input.dataset.typeCls);
      updateSummary();
    };

    function updateTypeTotal(typeCls) {
      const inputs = document.querySelectorAll(`.budget-input[data-type-cls="${typeCls}"]`);
      const total = Array.from(inputs).reduce((s, inp) => s + (Number(inp.value) || 0), 0);
      const el = document.getElementById(`type-total-${typeCls}`);
      if (el) el.textContent = formatCOP(total);
    }

    window.updateSummary = function() {
      // Total gastos (todas las cat inputs)
      const catInputs = document.querySelectorAll(".budget-input[data-cat]");
      const totalExp  = Array.from(catInputs).reduce((s, i) => s + (Number(i.value) || 0), 0);

      // Total ingresos (income-form inputs de valor)
      const incomeRows   = document.querySelectorAll("#income-form .income-row");
      const totalIncome  = Array.from(incomeRows).reduce((s, row) => {
        const amountInput = row.querySelector(".budget-input");
        return s + (Number(amountInput?.value) || 0);
      }, 0);

      const balance = totalIncome - totalExp;
      document.getElementById("sum-income").textContent   = formatCOP(totalIncome);
      document.getElementById("sum-expenses").textContent = formatCOP(totalExp);

      const balEl = document.getElementById("sum-balance");
      balEl.textContent = formatCOP(Math.abs(balance));
      balEl.className = `s-value ${balance >= 0 ? "pos" : "neg"}`;
    };

    // ── Tabs ──────────────────────────────────────────────
    window.switchTab = function(tab) {
      const isGastos = tab === "gastos";
      document.getElementById("panel-gastos").style.display   = isGastos ? "block" : "none";
      document.getElementById("panel-ingresos").style.display = isGastos ? "none"  : "block";
      document.getElementById("tab-gastos").classList.toggle("active", isGastos);
      document.getElementById("tab-ingresos").classList.toggle("active", !isGastos);
    };

    // ── Guardar presupuesto ───────────────────────────────
    window.saveBudget = async function() {
      const btn = document.getElementById("btn-save");

      // Recoger categorías
      const catInputs = document.querySelectorAll(".budget-input[data-cat]");
      const categoriesData = {};
      catInputs.forEach(inp => {
        const val = Number(inp.value) || 0;
        if (val > 0) categoriesData[inp.dataset.cat] = val;
      });

      // Recoger ingresos
      const incomeRows  = document.querySelectorAll("#income-form .income-row");
      const incomeData  = {};
      incomeRows.forEach(row => {
        const nameInput   = row.querySelector(".income-name-input");
        const amountInput = row.querySelector(".budget-input");
        const name   = nameInput?.value.trim();
        const amount = Number(amountInput?.value) || 0;
        if (name && amount > 0) incomeData[name] = amount;
      });

      if (!Object.keys(categoriesData).length && !Object.keys(incomeData).length) {
        showToast("Ingresa al menos un valor para guardar.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        await setBudget(uid, selectedMonth, { categories: categoriesData, income: incomeData });
        currentBudget = { categories: categoriesData, income: incomeData };
        showToast("Presupuesto guardado.", "success");
        document.getElementById("copy-banner").style.display = "none";
      } catch (err) {
        showToast("Error al guardar. Intenta de nuevo.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar presupuesto";
      }
    };
  </script>
</body>
</html>
