<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body { background: #f0f4f8; }
    body.dark { background: #111; }

    /* ── Stats 3 cards ───────────────────────────────────── */
    .stats-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 14px; }
    .s3-card { background: #fff; border-radius: 14px; padding: 12px 12px 10px; }
    body.dark .s3-card { background: #1a1a1a; }
    .s3-card.active { background: #0f3460; }
    .s3-lbl { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: #888; margin-bottom: 6px; }
    .s3-card.active .s3-lbl { color: #7ab8e8; }
    .s3-val { font-size: 14px; font-weight: 500; }
    .s3-val.inc { color: #185fa5; }
    .s3-val.exp { color: #c0392b; }
    .s3-val.bal { color: #fff; }
    .s3-bar { height: 3px; border-radius: 99px; margin-top: 8px; }

    /* ── Tabs ────────────────────────────────────────────── */
    .budget-tabs { display: flex; background: #e8edf2; border-radius: 10px; padding: 3px; margin: 0 14px 14px; }
    body.dark .budget-tabs { background: #222; }
    .budget-tab { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; color: #888; user-select: none; transition: all 0.15s; }
    .budget-tab.active { background: #fff; color: #1a1a2e; }
    body.dark .budget-tab.active { background: #1a1a1a; color: #e8e8e8; }

    /* ── Banner copiar mes ───────────────────────────────── */
    .copy-banner {
      margin: 0 14px 12px; background: #e6f1fb; border-radius: 12px;
      padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .copy-banner-txt { font-size: 12px; color: #185fa5; }
    .copy-banner-btn { font-size: 12px; color: #185fa5; font-weight: 500; background: none; border: none; cursor: pointer; font-family: "DM Sans", sans-serif; }

    /* ── Sección por tipo ────────────────────────────────── */
    .type-section { margin: 0 14px 14px; }
    .type-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 0 2px; }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .type-dot.basico    { background: #185fa5; }
    .type-dot.noesencial { background: #c0392b; }
    .type-dot.ahorro    { background: #3b6d11; }
    .type-lbl { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
    .type-total { font-size: 12px; font-weight: 500; color: var(--text); }

    /* ── Fila de categoría ───────────────────────────────── */
    .cat-row-card {
      background: #fff; border-radius: 12px; padding: 11px 12px;
      margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
    }
    body.dark .cat-row-card { background: #1a1a1a; }
    .cat-ico-box { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cat-name-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500;
      color: var(--text); min-width: 0;
    }
    .cat-right-wrap { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .val-pill { display: flex; align-items: center; gap: 3px; background: #f0f4f8; border-radius: 8px; padding: 5px 8px; }
    body.dark .val-pill { background: #222; }
    .val-pill-sym { font-size: 11px; color: #888; }
    .val-pill-input {
      font-size: 13px; font-weight: 500; color: #1a1a2e; border: none;
      background: transparent; outline: none; width: 72px; text-align: right;
      font-family: "DM Sans", sans-serif;
    }
    body.dark .val-pill-input { color: #e8e8e8; }
    .day-lbl { font-size: 10px; color: #aaa; white-space: nowrap; }
    .prop-toggle-btn {
      width: 28px; height: 16px; background: #ddd; border-radius: 99px;
      position: relative; cursor: pointer; border: none; padding: 0; flex-shrink: 0;
      transition: background 0.2s;
    }
    .prop-toggle-btn.on { background: #0f3460; }
    .prop-toggle-btn::after {
      content: ""; position: absolute; width: 12px; height: 12px;
      background: #fff; border-radius: 50%; top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .prop-toggle-btn.on::after { transform: translateX(12px); }
    .cat-del-btn { background: none; border: none; color: #cdd5e0; font-size: 14px; cursor: pointer; padding: 0 2px; transition: color 0.15s; }
    .cat-del-btn:hover { color: #c0392b; }

    /* ── Agregar categoría ───────────────────────────────── */
    .add-cat-btn {
      width: 100%; border: 1.5px dashed #cdd5e0; border-radius: 12px;
      padding: 11px; display: flex; align-items: center; justify-content: center;
      gap: 7px; background: none; cursor: pointer; font-family: "DM Sans", sans-serif;
      margin-bottom: 6px; transition: border-color 0.15s;
    }
    .add-cat-btn:hover { border-color: #0f3460; }
    .add-cat-btn span { font-size: 12px; color: #888; }

    /* ── Ingresos form ───────────────────────────────────── */
    .income-card {
      background: #fff; border-radius: 12px; padding: 12px 14px;
      margin-bottom: 8px;
    }
    body.dark .income-card { background: #1a1a1a; }
    .income-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .income-name-input {
      flex: 1; border: none; outline: none; font-family: "DM Sans", sans-serif;
      font-size: 13px; font-weight: 500; color: var(--text); background: transparent; min-width: 0;
    }
    .income-amount-input {
      border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 6px 10px;
      font-size: 13px; font-family: "DM Sans", sans-serif; color: var(--text);
      background: #fff; outline: none; width: 110px; text-align: right;
    }
    body.dark .income-amount-input { background: #222; border-color: #333; }
    .income-meta { display: flex; align-items: center; gap: 8px; }
    .income-type-select {
      flex: 1; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 5px 8px;
      font-size: 11px; font-family: "DM Sans", sans-serif; color: #888;
      background: #fff; outline: none;
    }
    body.dark .income-type-select { background: #222; border-color: #333; }
    .toggle-switch {
      width: 28px; height: 16px; background: #ddd; border-radius: 99px;
      position: relative; cursor: pointer; flex-shrink: 0;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: #3b6d11; }
    .toggle-switch::after {
      content: ""; position: absolute; width: 12px; height: 12px;
      background: #fff; border-radius: 50%; top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(12px); }
    .toggle-prop-lbl { font-size: 10px; color: #888; white-space: nowrap; }
    .income-del-btn { background: none; border: none; color: #cdd5e0; font-size: 14px; cursor: pointer; transition: color 0.15s; }
    .income-del-btn:hover { color: #c0392b; }
    .add-income-btn {
      width: 100%; border: 1.5px dashed #cdd5e0; border-radius: 12px;
      padding: 11px; display: flex; align-items: center; justify-content: center;
      gap: 7px; background: none; cursor: pointer; font-family: "DM Sans", sans-serif;
      margin-bottom: 6px;
    }
    .add-income-btn span { font-size: 12px; color: #888; }

    /* ── Cálculo avanzado gastos ─────────────────────────── */
    .cat-calc-btn {
      background: none; border: none; font-size: 10px; color: #aaa;
      cursor: pointer; font-family: "DM Sans", sans-serif; padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .cat-calc-form { display: flex; flex-wrap: wrap; justify-content: flex-end; }
    .cat-adv-input {
      padding: 5px 7px; border: 1.5px solid #e2e8f0; border-radius: 7px;
      font-size: 12px; font-family: "DM Sans", sans-serif; color: #1a1a2e;
      background: #fff; outline: none;
    }
    body.dark .cat-adv-input { background: #222; border-color: #333; color: #e8e8e8; }

    /* ── Form avanzado ingresos ──────────────────────────── */
    .adv-toggle-btn {
      background: none; border: none; font-size: 11px; color: #888;
      cursor: pointer; font-family: "DM Sans", sans-serif; padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .field-lbl2 { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .income-adv-input {
      width: 100%; padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 12px; font-family: "DM Sans", sans-serif; color: #1a1a2e;
      background: #fff; outline: none;
    }
    body.dark .income-adv-input { background: #222; border-color: #333; color: #e8e8e8; }

    /* ── Save button ─────────────────────────────────────── */
    .save-budget-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: calc(100% - 28px); margin: 4px 14px 90px; padding: 14px;
      background: #0f3460; color: #fff; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: "DM Sans", sans-serif;
    }
    .save-budget-btn:hover { background: #1a4a7a; }

    /* ── Inline add form ─────────────────────────────────── */
    .inline-add-form {
      background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 6px;
      display: none;
    }
    body.dark .inline-add-form { background: #1a1a1a; }
    .inline-add-form.open { display: block; }
    .inline-add-input {
      width: 100%; border: none; border-bottom: 1.5px solid #e2e8f0; padding: 6px 0;
      font-size: 13px; font-family: "DM Sans", sans-serif; color: var(--text);
      background: transparent; outline: none; margin-bottom: 10px;
    }
    .inline-add-actions { display: flex; gap: 8px; }
    .inline-add-confirm { flex: 1; padding: 8px; background: #0f3460; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-family: "DM Sans", sans-serif; cursor: pointer; }
    .inline-add-cancel { padding: 8px 14px; background: #f0f4f8; color: #888; border: none; border-radius: 8px; font-size: 13px; font-family: "DM Sans", sans-serif; cursor: pointer; }
    /* ── Number input formatting ─────────────────────────── */
    .val-pill-input { -moz-appearance: textfield; }
    .val-pill-input::-webkit-outer-spin-button,
    .val-pill-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar" style="max-width:680px;margin:0 auto;padding:12px 14px 0;"></div>

  <div style="max-width:680px;margin:0 auto;">
    <div id="month-selector-container" style="display:flex;justify-content:center;padding:12px 0 0;"></div>

    <div class="stats-3" id="stats-3">
      <div class="skeleton" style="height:68px;border-radius:14px;"></div>
      <div class="skeleton" style="height:68px;border-radius:14px;"></div>
      <div class="skeleton" style="height:68px;border-radius:14px;"></div>
    </div>

    <div class="budget-tabs">
      <div class="budget-tab active" id="tab-gastos">Gastos</div>
      <div class="budget-tab" id="tab-ingresos">Ingresos</div>
    </div>

    <div id="copy-banner" class="copy-banner" style="display:none;">
      <span class="copy-banner-txt">¿Copiar presupuesto del mes anterior?</span>
      <button class="copy-banner-btn" id="btn-copy-prev">Copiar</button>
    </div>

    <div id="expenses-form"></div>
    <div id="income-form" style="display:none;"></div>

    <button class="save-budget-btn" id="btn-save">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Guardar presupuesto
    </button>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getBudget, setBudget, getCategories, addCategory, updateCategory, deleteCategory, syncProportionalIncomes } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector, showToast } from "../assets/ui.js?v=3";
    import { currentMonth, formatMonth, formatCOP, applyNumericFormat, getNumericValue } from "../assets/utils.js";

    let uid, selectedMonth, currentBudget = null, categories = [], activeTab = "gastos";

    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("budget");
    renderMonthSelector("month-selector-container", selectedMonth, async m => {
      selectedMonth = m;
      await loadBudget();
    });

    // ── TIPOS de categoría ────────────────────────────────
    const TYPES = [
      { key: "GASTO BÁSICO",       label: "Gasto básico",       dot: "basico",    bg: "#e6f1fb", stroke: "#185fa5" },
      { key: "GASTO NO ESENCIAL",  label: "Gasto no esencial",  dot: "noesencial",bg: "#fbeaf0", stroke: "#993556" },
      { key: "AHORRO O INVERSIÓN", label: "Ahorro o inversión", dot: "ahorro",    bg: "#eaf3de", stroke: "#3b6d11" },
    ];

    categories = await getCategories(uid);
    await loadBudget();

    // Tabs
    document.getElementById("tab-gastos").addEventListener("click", () => switchTab("gastos"));
    document.getElementById("tab-ingresos").addEventListener("click", () => switchTab("ingresos"));

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById("tab-gastos").classList.toggle("active", tab === "gastos");
      document.getElementById("tab-ingresos").classList.toggle("active", tab === "ingresos");
      document.getElementById("expenses-form").style.display = tab === "gastos" ? "block" : "none";
      document.getElementById("income-form").style.display  = tab === "ingresos" ? "block" : "none";
    }

    async function loadBudget() {
      currentBudget = await getBudget(uid, selectedMonth);
      renderStats();
      renderExpensesForm();
      renderIncomeForm();
      checkCopyBanner();
    }

    // ── Stats 3 cards ─────────────────────────────────────
    function renderStats() {
      const cats     = currentBudget?.categories || {};
      const totalExp = Object.values(cats).reduce((s,v) => s+Number(v), 0);
      const inc      = currentBudget?.income || {};
      const totalInc = typeof inc === "object" && !Array.isArray(inc)
        ? Object.values(inc).reduce((s,v) => s+Number(v?.amount||v||0), 0) : 0;
      const bal      = totalInc - totalExp;
      const balCls   = bal >= 0 ? "#3b6d11" : "#c0392b";

      document.getElementById("stats-3").innerHTML = `
        <div class="s3-card">
          <div class="s3-lbl">Ingresos</div>
          <div class="s3-val inc">${fmtShort(totalInc)}</div>
          <div class="s3-bar" style="background:#b5d4f4;"></div>
        </div>
        <div class="s3-card">
          <div class="s3-lbl">Gastos</div>
          <div class="s3-val exp">${fmtShort(totalExp)}</div>
          <div class="s3-bar" style="background:#f5c6c6;"></div>
        </div>
        <div class="s3-card active">
          <div class="s3-lbl">Balance</div>
          <div class="s3-val bal" style="color:${bal>=0?'#7fddaa':'#ffaaaa'}">${bal>=0?"+":""}${fmtShort(bal)}</div>
          <div class="s3-bar" style="background:rgba(255,255,255,0.2);"></div>
        </div>`;
    }

    function fmtShort(v) {
      const abs = Math.abs(v);
      const sign = v < 0 ? "-" : "";
      if (abs >= 1000000) return sign + "$" + (abs/1000000).toFixed(1) + "M";
      if (abs >= 1000)    return sign + "$" + Math.round(abs/1000) + "k";
      return sign + "$" + Math.round(abs);
    }

    // ── Copy banner ───────────────────────────────────────
    async function checkCopyBanner() {
      const banner = document.getElementById("copy-banner");
      if (currentBudget?.categories && Object.keys(currentBudget.categories).length) {
        banner.style.display = "none"; return;
      }
      const [y, m] = selectedMonth.split("-").map(Number);
      const pm = m === 1 ? 12 : m - 1;
      const py = m === 1 ? y - 1 : y;
      const prevMonth = `${py}-${String(pm).padStart(2,"0")}`;
      const prev = await getBudget(uid, prevMonth);
      banner.style.display = prev ? "flex" : "none";

      document.getElementById("btn-copy-prev").onclick = async () => {
        if (!prev) return;
        await setBudget(uid, selectedMonth, {
          categories: prev.categories || {},
          income: prev.income || {},
          categoryMeta: prev.categoryMeta || {}
        });
        banner.style.display = "none";
        await loadBudget();
        showToast("Presupuesto copiado.", "success");
      };
    }

    // ── Expenses form ─────────────────────────────────────
    function renderExpensesForm() {
      const savedCats = currentBudget?.categories || {};
      const meta      = currentBudget?.categoryMeta || {};
      const el        = document.getElementById("expenses-form");

      el.innerHTML = TYPES.map(type => {
        const cats = categories.filter(c => c.type === type.key);
        const typeTotal = cats.reduce((s,c) => s + Number(savedCats[c.name]||0), 0);
        return `
          <div class="type-section">
            <div class="type-hdr">
              <div class="type-dot ${type.dot}"></div>
              <span class="type-lbl">${type.label}</span>
              <span class="type-total">${formatCOP(typeTotal)}</span>
            </div>
            ${cats.map(cat => {
              const isProp = meta[cat.name]?.proportional || false;
              return `
                <div class="cat-row-card">
                  <div class="cat-ico-box" style="background:${type.bg};">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${type.stroke}" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                  </div>
                  <input type="text" class="cat-name-input budget-name-input"
                    data-cat-id="${cat.id}" data-original-name="${cat.name}"
                    value="${cat.name}" placeholder="Nombre..."/>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                    <div class="cat-right-wrap">
                      <div class="val-pill">
                        <span class="val-pill-sym">$</span>
                        <input type="number" min="0" class="val-pill-input budget-input"
                          data-cat="${cat.name}" value="${savedCats[cat.name]||""}" placeholder="0" data-field="amount"/>
                      </div>
                      <span class="day-lbl">~/día</span>
                      <button type="button" class="prop-toggle-btn ${isProp?"on":""}"
                        data-cat-name="${cat.name}" data-field="prop-toggle"></button>
                      <button class="cat-del-btn btn-delete-cat"
                        data-cat-id="${cat.id}" data-cat-name="${cat.name}">✕</button>
                    </div>
                    <button type="button" class="cat-calc-btn" data-open="false">
                      ▼ Calcular
                    </button>
                    <div class="cat-calc-form" style="display:none;gap:6px;align-items:center;">
                      <input type="number" class="cat-adv-input" placeholder="Cant." min="0" data-field="qty" style="width:64px;"/>
                      <span style="font-size:12px;color:#aaa;">×</span>
                      <input type="number" class="cat-adv-input" placeholder="Valor" min="0" data-field="unitValue" style="width:84px;"/>
                      <span style="font-size:12px;color:#aaa;">=</span>
                      <span class="cat-adv-total" style="font-size:12px;font-weight:500;color:#0f3460;min-width:60px;text-align:right;">$0</span>
                    </div>
                  </div>
                </div>`;
            }).join("")}
            <div class="inline-add-form" id="inline-add-${type.key.replace(/\s/g,"-")}">
              <input type="text" class="inline-add-input" placeholder="Nombre de la categoría..."/>
              <div class="inline-add-actions">
                <button class="inline-add-confirm" data-type="${type.key}">Agregar</button>
                <button class="inline-add-cancel" data-type="${type.key}">Cancelar</button>
              </div>
            </div>
            <button class="add-cat-btn" data-add-type="${type.key}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>Agregar en ${type.label.toLowerCase()}</span>
            </button>
          </div>`;
      }).join("");

      // Event delegation
      el.addEventListener("click", handleExpensesClick);

      // Format number inputs with dots
      el.querySelectorAll(".val-pill-input").forEach(inp => {
        if (inp.value) {
          inp.dataset.raw = inp.value;
          inp.value = Number(inp.value).toLocaleString("es-CO");
        }
        inp.addEventListener("input", () => {
          const raw = inp.value.replace(/\./g, "").replace(/[^0-9]/g, "");
          inp.dataset.raw = raw;
          inp.value = raw ? Number(raw).toLocaleString("es-CO") : "";
        });
        inp.addEventListener("focus", () => inp.select());
      });
    }

    function handleExpensesClick(e) {
      // Prop toggle
      const propBtn = e.target.closest("[data-field='prop-toggle']");
      if (propBtn) { propBtn.classList.toggle("on"); return; }

      // Delete cat
      const delBtn = e.target.closest(".btn-delete-cat");
      if (delBtn) {
        if (!confirm(`¿Eliminar la categoría "${delBtn.dataset.catName}"?`)) return;
        deleteCategory(uid, delBtn.dataset.catId).then(async () => {
          categories = categories.filter(c => c.id !== delBtn.dataset.catId);
          showToast("Categoría eliminada.", "success");
          await loadBudget();
        });
        return;
      }

      // Add cat button
      const addBtn = e.target.closest("[data-add-type]");
      if (addBtn) {
        const type   = addBtn.dataset.addType;
        const formId = "inline-add-" + type.replace(/\s/g, "-");
        document.getElementById(formId).classList.add("open");
        addBtn.style.display = "none";
        return;
      }

      // Confirm add
      const confirmBtn = e.target.closest(".inline-add-confirm");
      if (confirmBtn) {
        const type   = confirmBtn.dataset.type;
        const formEl = document.getElementById("inline-add-" + type.replace(/\s/g, "-"));
        const name   = formEl.querySelector(".inline-add-input").value.trim();
        if (!name) { showToast("Escribe un nombre.", "error"); return; }
        addCategory(uid, { name, type }).then(async () => {
          showToast("Categoría agregada.", "success");
          categories = await getCategories(uid);
          await loadBudget();
        });
        return;
      }

      // Cancel add
      const cancelBtn = e.target.closest(".inline-add-cancel");
      if (cancelBtn) {
        const type   = cancelBtn.dataset.type;
        const formEl = document.getElementById("inline-add-" + type.replace(/\s/g, "-"));
        formEl.classList.remove("open");
        formEl.querySelector(".inline-add-input").value = "";
        const addBtn2 = document.querySelector(`[data-add-type="${type}"]`);
        if (addBtn2) addBtn2.style.display = "";
        return;
      }
    }

    // ── Income form ───────────────────────────────────────
    function renderIncomeForm() {
      const incomeData = currentBudget?.income || {};
      function normalizeIncome(income) {
        if (!income || typeof income !== "object") return [];
        if (Array.isArray(income)) return income.filter(i => i?.name);
        return Object.entries(income)
          .filter(([k]) => isNaN(Number(k)) && !["month","updatedAt"].includes(k))
          .map(([name, val]) => typeof val === "object" ? { name, ...val } : { name, amount: val, type: "fijo", proportional: false })
          .filter(i => i.name);
      }
      const incArr = normalizeIncome(incomeData);
      const daysInMonth = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();

      const el = document.getElementById("income-form");
      el.innerHTML = `
        <div style="margin:0 14px;">
          <div id="income-cards">
            ${incArr.map((inc, idx) => renderIncomeCard(inc, idx, daysInMonth)).join("")}
          </div>
          <button class="add-income-btn" id="btn-add-income">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>Agregar fuente de ingreso</span>
          </button>
        </div>`;

      document.getElementById("btn-add-income").addEventListener("click", () => {
        const newInc = { name: "", amount: 0, type: "fijo", proportional: false };
        const idx = document.querySelectorAll(".income-card").length;
        const tmp = document.createElement("div");
        tmp.innerHTML = renderIncomeCard(newInc, idx, daysInMonth);
        document.getElementById("income-cards").appendChild(tmp.firstElementChild);
        attachToggleListeners();
      });

      attachToggleListeners();
    }

    function renderIncomeCard(inc, idx, daysInMonth) {
      const typeLabels = { fijo: "Fijo", no_operacional: "No operacional", extraordinario: "Extraordinario" };
      return `
        <div class="income-card">
          <div class="income-row">
            <input type="text" class="income-name-input" placeholder="Fuente de ingreso..."
              value="${inc.name||""}" maxlength="60" style="font-weight:500;"/>
            <input type="number" class="income-amount-input" placeholder="0"
              value="${inc.amount||""}" min="0"/>
            <button class="income-del-btn" onclick="this.closest('.income-card').remove()">✕</button>
          </div>
          <div class="income-meta">
            <select class="income-type-select">
              ${["fijo","no_operacional","extraordinario"].map(t =>
                `<option value="${t}" ${inc.type===t?"selected":""}>${typeLabels[t]}</option>`
              ).join("")}
            </select>
            <span class="toggle-prop-lbl">~/día</span>
            <div class="toggle-switch ${inc.proportional?"on":""}" data-toggle></div>
          </div>
        </div>`;
    }

    function attachToggleListeners() {
      document.querySelectorAll("[data-toggle]").forEach(el => {
        el.onclick = () => el.classList.toggle("on");
      });

      // Cat calc toggle
      document.querySelectorAll(".cat-calc-btn").forEach(btn => {
        btn.onclick = () => {
          const wrap   = btn.closest("div");
          const form   = wrap.querySelector(".cat-calc-form");
          const isOpen = btn.dataset.open === "true";
          btn.dataset.open     = isOpen ? "false" : "true";
          btn.textContent      = isOpen ? "▼ Calcular" : "▲ Ocultar";
          form.style.display   = isOpen ? "none" : "flex";
        };
      });

      // Cat calc auto-total
      document.querySelectorAll(".cat-calc-form").forEach(form => {
        const card      = form.closest(".cat-row-card");
        const amountInp = card ? card.querySelector(".val-pill-input") : null;
        const totalEl   = form.querySelector(".cat-adv-total");
        const recalc = () => {
          const qty  = Number(form.querySelector("[data-field='qty']")?.value) || 0;
          const unit = Number(form.querySelector("[data-field='unitValue']")?.value) || 0;
          const tot  = qty * unit;
          totalEl.textContent = formatCOP(tot);
          if (tot > 0 && amountInp) amountInp.value = tot;
        };
        form.querySelectorAll(".cat-adv-input").forEach(inp => inp.addEventListener("input", recalc));
      });
    }

    // ── Guardar ───────────────────────────────────────────
    document.getElementById("btn-save").addEventListener("click", saveBudget);

    async function saveBudget() {
      const btn = document.getElementById("btn-save");

      // Categorías
      const categoriesData = {};
      document.querySelectorAll(".val-pill-input.budget-input[data-cat]").forEach(inp => {
        const val = getNumericValue(inp);
        if (val > 0) categoriesData[inp.dataset.cat] = val;
      });

      // Renombrar categorías
      const renamePromises = [];
      document.querySelectorAll(".budget-name-input").forEach(inp => {
        const newName = inp.value.trim();
        const oldName = inp.dataset.originalName;
        const catId   = inp.dataset.catId;
        if (newName && newName !== oldName) {
          renamePromises.push(updateCategory(uid, catId, { name: newName }));
          if (categoriesData[oldName] !== undefined) {
            categoriesData[newName] = categoriesData[oldName];
            delete categoriesData[oldName];
          }
        }
      });

      // Props
      const categoryMeta = {};
      document.querySelectorAll("[data-field='prop-toggle']").forEach(btn => {
        const catName = btn.dataset.catName;
        if (catName) categoryMeta[catName] = { proportional: btn.classList.contains("on") };
      });

      // Ingresos
      const daysInMonth = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();
      const incomeData  = {};
      document.querySelectorAll(".income-card").forEach(card => {
        const name         = card.querySelector(".income-name-input")?.value.trim();
        const amount       = Number(card.querySelector(".income-amount-input")?.value) || 0;
        const type         = card.querySelector(".income-type-select")?.value || "fijo";
        const proportional = card.querySelector("[data-toggle]")?.classList.contains("on") || false;
        if (name && amount > 0) {
          incomeData[name] = { amount, type, proportional, dailyAmount: proportional ? Math.round(amount / daysInMonth) : 0 };
        }
      });

      btn.disabled = true; btn.textContent = "Guardando...";
      try {
        await Promise.all(renamePromises);
        await setBudget(uid, selectedMonth, { categories: categoriesData, income: incomeData, categoryMeta });
        currentBudget = { categories: categoriesData, income: incomeData, categoryMeta };
        categories = await getCategories(uid);
        showToast("Presupuesto guardado.", "success");
        document.getElementById("copy-banner").style.display = "none";
        if (Object.values(incomeData).some(i => i.proportional)) {
          await syncProportionalIncomes(uid, selectedMonth);
        }
        renderStats();
      } catch (err) {
        showToast("Error al guardar.", "error"); console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar presupuesto`;
      }
    }
  </script>
</body>
</html>
