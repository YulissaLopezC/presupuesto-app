<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Configurar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── Tabs Gastos / Ingresos ──────────────────────────── */
    .tabs {
      display: flex; background: var(--bg);
      border-radius: 10px; padding: 4px;
      margin-bottom: 20px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 9px; text-align: center;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; border-radius: 7px;
      transition: all 0.2s; user-select: none;
    }
    .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }

    /* ── Resumen totales arriba ───────────────────────────── */
    .summary-bar {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 20px;
    }
    .summary-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      text-align: center;
    }
    .summary-item .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .summary-item .s-value {
      font-family: "DM Serif Display", serif;
      font-size: 16px; letter-spacing: -0.3px; margin-top: 3px;
    }
    .s-value.inc { color: var(--info); }
    .s-value.exp { color: var(--warning); }
    .s-value.pos { color: var(--accent); }
    .s-value.neg { color: var(--danger); }

    /* ── Grupos de categorías ────────────────────────────── */
    .type-section { margin-bottom: 6px; }

    .type-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 0 8px;
    }
    .type-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .type-dot.basico      { background: var(--accent); }
    .type-dot.no-esencial { background: var(--warning); }
    .type-dot.ahorro      { background: var(--info); }

    .type-section-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .type-section-total {
      margin-left: auto; font-size: 12px; color: var(--muted);
      font-family: "DM Serif Display", serif;
    }

    /* ── Fila de categoría editable ─────────────────────── */
    .budget-row {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; gap: 12px;
      transition: border-color 0.15s;
    }
    .budget-row:focus-within { border-color: var(--border2); }

    .budget-row-name {
      flex: 1; font-size: 14px; color: var(--text);
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .budget-input-wrap { position: relative; flex-shrink: 0; width: 130px; }
    .budget-input-wrap .sym {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; color: var(--muted); pointer-events: none;
    }
    .budget-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px 8px 22px;
      font-family: "DM Serif Display", serif;
      font-size: 14px; color: var(--text);
      outline: none; text-align: right;
      transition: border-color 0.15s;
    }
    .budget-input:focus { border-color: var(--accent); }
    .budget-input::placeholder { color: var(--muted2); font-family: "DM Sans", sans-serif; font-size: 13px; }

    /* ── Filas de fuentes de ingreso ─────────────────────── */
    .income-row {
      display: flex; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; gap: 10px;
    }
    .income-name-input {
      flex: 1; background: transparent; border: none;
      font-family: "DM Sans", sans-serif; font-size: 14px;
      color: var(--text); outline: none;
    }
    .income-name-input::placeholder { color: var(--muted2); }

    /* ── Botón copiar mes anterior ───────────────────────── */
    .copy-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(212,96,138,0.06);
      border: 1px solid rgba(212,96,138,0.2);
      border-radius: 12px; padding: 12px 14px;
      margin-bottom: 16px;
    }
    .copy-banner p { font-size: 13px; color: var(--accent); }
    .copy-banner span { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

    .btn-copy {
      background: rgba(212,96,138,0.1); border: 1px solid rgba(212,96,138,0.25);
      color: var(--accent); border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 500;
      font-family: "DM Sans", sans-serif; cursor: pointer;
      white-space: nowrap; transition: background 0.15s;
      flex-shrink: 0; margin-left: 10px;
    }
    .btn-copy:hover { background: rgba(212,96,138,0.18); }

    /* ── Botón agregar ingreso ────────────────────────────── */
    .btn-add-row {
      width: 100%; padding: 10px;
      background: none; border: 1px dashed var(--border2);
      border-radius: 10px; color: var(--muted);
      font-family: "DM Sans", sans-serif; font-size: 13px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      margin-bottom: 6px;
    }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Sticky save bar ─────────────────────────────────── */
    .save-bar {
      position: sticky; bottom: 68px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px; margin: 0 -16px;
      z-index: 80;
    }

    /* ── No categorías aviso ─────────────────────────────── */
    .no-cats-notice {
      background: rgba(201,124,46,0.07);
      border: 1px solid rgba(201,124,46,0.25);
      border-radius: 12px; padding: 14px 16px;
      font-size: 13px; color: var(--warning); line-height: 1.5;
      margin-bottom: 16px;
    }

    /* ── Filas de ingreso mejoradas ──────────────────────── */
    .income-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 8px;
    }
    .income-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .income-name-input {
      flex: 1; background: transparent; border: none;
      font-family: "DM Sans", sans-serif; font-size: 14px;
      color: var(--text); outline: none; min-width: 0;
    }
    .income-name-input::placeholder { color: var(--muted2); }
    .income-type-select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 5px 10px;
      font-family: "DM Sans", sans-serif; font-size: 11px;
      color: var(--muted); outline: none; cursor: pointer;
      appearance: none; flex-shrink: 0;
    }
    .income-type-select option { background: var(--surface); }

    .income-card-body { display: flex; gap: 8px; align-items: flex-start; }
    .income-amount-wrap { flex: 1; position: relative; }
    .income-amount-wrap .sym {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; color: var(--muted); pointer-events: none;
    }
    .income-amount-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px 8px 22px;
      font-family: "DM Serif Display", serif;
      font-size: 14px; color: var(--text);
      outline: none; text-align: right;
    }
    .income-amount-input:focus { border-color: var(--accent); }

    /* Toggle proporcional */
    .prop-toggle {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .prop-toggle label { font-size: 12px; color: var(--muted); cursor: pointer; flex: 1; }
    .toggle-switch {
      width: 32px; height: 18px; background: var(--border2);
      border-radius: 9px; position: relative; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0; border: none;
    }
    .toggle-switch.on { background: var(--accent); }
    .toggle-switch::after {
      content: ""; position: absolute;
      width: 14px; height: 14px; background: #fff;
      border-radius: 50%; top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(14px); }

    /* Form avanzado */
    .advanced-form {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .advanced-form.open { display: block; }
    .advanced-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .advanced-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .advanced-result { font-size: 12px; color: var(--accent); margin-top: 6px; font-weight: 500; }
    .btn-advanced {
      background: none; border: none; color: var(--muted);
      font-size: 11px; font-family: "DM Sans", sans-serif;
      cursor: pointer; padding: 0; text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-advanced:hover { color: var(--text); }

    /* Badges de tipo */
    .type-badge {
      font-size: 10px; font-weight: 500; padding: 2px 7px;
      border-radius: 99px; flex-shrink: 0;
    }
    .type-badge.fijo          { background: rgba(74,127,181,0.12); color: var(--info); }
    .type-badge.no_operacional{ background: rgba(201,124,46,0.12); color: var(--warning); }
    .type-badge.extraordinario{ background: rgba(212,96,138,0.10); color: var(--accent); }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <h2>Presupuesto</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Define cuánto planeas gastar e ingresar cada mes.
      </p>
    </div>

    <!-- Selector de mes -->
    <div id="month-selector-container" style="margin-bottom:16px;"></div>

    <!-- Copiar mes anterior -->
    <div id="copy-banner" style="display:none;" class="copy-banner">
      <div>
        <p>Copiar del mes anterior</p>
        <span id="copy-banner-sub"></span>
      </div>
      <button class="btn-copy" id="btn-copy">Copiar</button>
    </div>

    <!-- Resumen totales -->
    <div class="summary-bar" id="summary-bar">
      <div class="summary-item">
        <div class="s-label">Ingresos</div>
        <div class="s-value inc" id="sum-income">$ 0</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Gastos</div>
        <div class="s-value exp" id="sum-expenses">$ 0</div>
      </div>
      <div class="summary-item">
        <div class="s-label">Balance</div>
        <div class="s-value pos" id="sum-balance">$ 0</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tab-gastos">Gastos</div>
      <div class="tab"        id="tab-ingresos">Ingresos</div>
    </div>

    <!-- Panel Gastos -->
    <div id="panel-gastos">
      <div id="no-cats-notice" style="display:none;" class="no-cats-notice">
        No tienes categorías configuradas.
        <a href="./categories.html" style="color:var(--warning);font-weight:500;"> Ir a Categorías →</a>
      </div>
      <div id="categories-form"></div>
    </div>

    <!-- Panel Ingresos -->
    <div id="panel-ingresos" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">
        Fuentes de ingreso esperadas para el mes.
      </p>
      <div id="income-form"></div>
      <button class="btn-add-row" id="btn-add-income">+ Agregar fuente de ingreso</button>
    </div>

    <!-- Sticky save -->
    <div class="save-bar">
      <button class="btn-primary" id="btn-save" >Guardar presupuesto</button>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth }   from "../modules/auth.js";
    import { getBudget, setBudget, getCategories, syncProportionalIncomes } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector, showToast } from "../assets/ui.js";
    import { formatCOP, currentMonth, formatMonth, lastMonths } from "../assets/utils.js";

    let uid, selectedMonth, categories = [], currentBudget = null;

    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("budget");
    renderMonthSelector("month-selector-container", selectedMonth, (m) => {
      selectedMonth = m;
      loadBudget();
    });

    categories = await getCategories(uid);
    await loadBudget();

    // ── Event delegation — un solo listener por contenedor ─
    document.getElementById("categories-form").addEventListener("input", e => {
      if (e.target.classList.contains("budget-input") && e.target.dataset.cat) {
        updateTypeTotal(e.target.dataset.typeCls);
        updateSummary();
      }
    });

    // Tabs
    document.getElementById("tab-gastos").addEventListener("click",   () => switchTab("gastos"));
    document.getElementById("tab-ingresos").addEventListener("click", () => switchTab("ingresos"));

    // Botón agregar ingreso
    document.getElementById("btn-add-income").addEventListener("click", addIncomeRow);

    // Botón guardar
    document.getElementById("btn-save").addEventListener("click", saveBudget);

    // ── Cargar presupuesto ────────────────────────────────
    async function loadBudget() {
      currentBudget = await getBudget(uid, selectedMonth);
      renderCategoriesForm();
      renderIncomeForm();
      updateSummary();
      await checkCopyBanner();
    }

    // ── Banner copiar mes anterior ────────────────────────
    async function checkCopyBanner() {
      const months = lastMonths(12);
      const idx = months.indexOf(selectedMonth);
      if (idx < 0 || idx >= months.length - 1) {
        document.getElementById("copy-banner").style.display = "none";
        return;
      }
      const prevMonth  = months[idx + 1];
      const prevBudget = await getBudget(uid, prevMonth);
      if (prevBudget && !currentBudget) {
        document.getElementById("copy-banner-sub").textContent = `Desde ${formatMonth(prevMonth)}`;
        document.getElementById("copy-banner").style.display = "flex";
        document.getElementById("btn-copy").onclick = () => copyFromMonth(prevBudget);
      } else {
        document.getElementById("copy-banner").style.display = "none";
      }
    }

    async function copyFromMonth(prevBudget) {
      currentBudget = { categories: { ...prevBudget.categories }, income: { ...prevBudget.income } };
      renderCategoriesForm();
      renderIncomeForm();
      updateSummary();
      document.getElementById("copy-banner").style.display = "none";
      showToast("Presupuesto copiado. Guarda para confirmar.", "success");
    }

    // ── Panel Gastos ──────────────────────────────────────
    function renderCategoriesForm() {
      const container = document.getElementById("categories-form");
      const noticeEl  = document.getElementById("no-cats-notice");

      if (!categories.length) {
        noticeEl.style.display = "block";
        container.innerHTML = "";
        return;
      }
      noticeEl.style.display = "none";

      const savedCats = currentBudget?.categories || {};
      const TYPES = [
        { key: "GASTO BÁSICO",       cls: "basico",      label: "Gasto básico" },
        { key: "GASTO NO ESENCIAL",  cls: "no-esencial", label: "Gasto no esencial" },
        { key: "AHORRO O INVERSIÓN", cls: "ahorro",      label: "Ahorro o inversión" }
      ];

      container.innerHTML = TYPES.map(type => {
        const cats = categories.filter(c => c.type === type.key);
        if (!cats.length) return "";
        const typeTotal = cats.reduce((s, c) => s + (Number(savedCats[c.name]) || 0), 0);
        return `
          <div class="type-section">
            <div class="type-section-header">
              <div class="type-dot ${type.cls}"></div>
              <span class="type-section-label">${type.label}</span>
              <span class="type-section-total" id="type-total-${type.cls}">${formatCOP(typeTotal)}</span>
            </div>
            ${cats.map(cat => `
              <div class="budget-row">
                <span class="budget-row-name">${cat.name}</span>
                <div class="budget-input-wrap">
                  <span class="sym">$</span>
                  <input type="number" min="0" class="budget-input"
                    data-cat="${cat.name}" data-type-cls="${type.cls}"
                    value="${savedCats[cat.name] || ""}" placeholder="0"/>
                </div>
              </div>`).join("")}
          </div>`;
      }).join("");
    }

    // ── Panel Ingresos ────────────────────────────────────
    function renderIncomeForm() {
      const container   = document.getElementById("income-form");
      const savedIncome = currentBudget?.income || [];

      // Soporte legado: si income era objeto {name: amount}, convertir a array
      // Filtrar solo entradas donde el valor sea un número (ignorar campos de Firestore)
      let entries;
      if (Array.isArray(savedIncome)) {
        entries = savedIncome;
      } else if (typeof savedIncome === "object" && savedIncome !== null) {
        entries = Object.entries(savedIncome)
          .filter(([key, val]) => typeof val === "number" && !["month","updatedAt"].includes(key))
          .map(([name, amount]) => ({ name, amount, type: "fijo", proportional: false }));
      } else {
        entries = [];
      }

      container.innerHTML = entries.map((inc, i) => incomeCardHTML(inc, i)).join("");
      if (entries.length) bindIncomeCardEvents();
    }

    function incomeCardHTML(inc = {}, idx = Date.now()) {
      const name         = inc.name || "";
      const amount       = inc.amount || "";
      const type         = inc.type || "fijo";
      const proportional = inc.proportional || false;
      const qty     = (inc.qty && inc.qty > 0)     ? inc.qty     : "";
      const unitVal = (inc.unitValue && inc.unitValue > 0) ? inc.unitValue : "";
      const id           = `ic-${idx}`;

      const typeLabels = { fijo: "Fijo", no_operacional: "No operacional", extraordinario: "Extraordinario" };

      return `
        <div class="income-card" id="${id}">
          <div class="income-card-header">
            <input type="text" class="income-name-input" placeholder="Fuente de ingreso" value="${name}"/>
            <select class="income-type-select" data-field="type">
              <option value="fijo"           ${type==="fijo"            ? "selected":""}>Fijo</option>
              <option value="no_operacional" ${type==="no_operacional"  ? "selected":""}>No operacional</option>
              <option value="extraordinario" ${type==="extraordinario"  ? "selected":""}>Extraordinario</option>
            </select>
            <button class="btn-danger" style="flex-shrink:0;">✕</button>
          </div>

          <div class="income-card-body">
            <div class="income-amount-wrap">
              <span class="sym">$</span>
              <input type="number" min="0" class="income-amount-input" placeholder="0" value="${amount}" data-field="amount"/>
            </div>
          </div>

          <!-- Toggle proporcional -->
          <div class="prop-toggle">
            <label>¿Se devenga día a día?</label>
            <button type="button" class="toggle-switch ${proportional ? "on" : ""}" data-field="proportional" title="Activar proporcional por día"></button>
          </div>

          <!-- Form avanzado -->
          <div class="advanced-form ${(qty > 0 || unitVal > 0) ? "open" : ""}">
            <div class="advanced-row">
              <div>
                <div class="advanced-label">Cantidad</div>
                <input type="number" min="0" class="form-input" style="padding:8px 10px;font-size:13px;" placeholder="0" value="${qty}" data-field="qty"/>
              </div>
              <div>
                <div class="advanced-label">Valor unitario</div>
                <div style="position:relative;">
                  <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);">$</span>
                  <input type="number" min="0" class="form-input" style="padding:8px 10px 8px 22px;font-size:13px;" placeholder="0" value="${unitVal}" data-field="unitValue"/>
                </div>
              </div>
            </div>
            <div class="advanced-result" id="${id}-result">${(qty > 0 && unitVal > 0) ? "= " + new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(Number(qty)*Number(unitVal)) : ""}</div>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:8px;">
            <button type="button" class="btn-advanced" data-action="toggle-advanced">
              ${qty || unitVal ? "Ocultar form avanzado" : "Form avanzado (cantidad × valor)"}
            </button>
          </div>
        </div>`;
    }

    function bindIncomeCardEvents() {
      // Usamos delegación en el contenedor padre para evitar duplicados
      // Primero removemos listeners viejos clonando el nodo
      const container = document.getElementById("income-form");
      const fresh = container.cloneNode(true);
      container.parentNode.replaceChild(fresh, container);
      const cont = document.getElementById("income-form");

      cont.addEventListener("input", e => {
        const card = e.target.closest(".income-card");
        if (!card) return;
        const field = e.target.dataset.field;
        if (field === "qty" || field === "unitValue") {
          const qty     = Number(card.querySelector("[data-field='qty']")?.value) || 0;
          const unitVal = Number(card.querySelector("[data-field='unitValue']")?.value) || 0;
          const total   = qty * unitVal;
          const resultEl = card.querySelector("[id$='-result']");
          if (resultEl) {
            resultEl.textContent = total > 0
              ? "= " + new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0}).format(total)
              : "";
          }
          if (total > 0) {
            const amountInput = card.querySelector(".income-amount-input");
            if (amountInput) amountInput.value = total;
          }
        }
        updateSummary();
      });

      cont.addEventListener("click", e => {
        const card = e.target.closest(".income-card");
        if (!card) return;

        // Toggle proporcional — el botón puede tener ::after, usar closest
        const toggleBtn = e.target.closest(".toggle-switch");
        if (toggleBtn) {
          toggleBtn.classList.toggle("on");
          return;
        }

        // Toggle form avanzado
        if (e.target.closest("[data-action='toggle-advanced']")) {
          const btn     = e.target.closest("[data-action='toggle-advanced']");
          const advForm = card.querySelector(".advanced-form");
          const isOpen  = advForm.classList.toggle("open");
          btn.textContent = isOpen ? "Ocultar form avanzado" : "Form avanzado (cantidad × valor)";
          return;
        }

        // Eliminar card
        if (e.target.closest(".btn-danger")) {
          card.remove();
          updateSummary();
        }
      });
    }

    function addIncomeRow() {
      const container = document.getElementById("income-form");
      const div = document.createElement("div");
      div.innerHTML = incomeCardHTML({}, Date.now());
      container.appendChild(div.firstElementChild);
      bindIncomeCardEvents();
      // Focus en el último nombre
      const cards = container.querySelectorAll(".income-card");
      if (cards.length) cards[cards.length-1].querySelector(".income-name-input")?.focus();
    }

    // ── Totales en tiempo real ────────────────────────────
    function updateTypeTotal(typeCls) {
      const inputs = document.querySelectorAll(`.budget-input[data-type-cls="${typeCls}"]`);
      const total  = Array.from(inputs).reduce((s, i) => s + (Number(i.value) || 0), 0);
      const el = document.getElementById(`type-total-${typeCls}`);
      if (el) el.textContent = formatCOP(total);
    }

    function updateSummary() {
      const catInputs  = document.querySelectorAll(".budget-input[data-cat]");
      const totalExp   = Array.from(catInputs).reduce((s, i) => s + (Number(i.value) || 0), 0);
      const incomeCards = document.querySelectorAll("#income-form .income-card");
      const totalIncome = Array.from(incomeCards).reduce((s, card) => {
        return s + (Number(card.querySelector(".income-amount-input")?.value) || 0);
      }, 0);
      const balance = totalIncome - totalExp;
      document.getElementById("sum-income").textContent   = formatCOP(totalIncome);
      document.getElementById("sum-expenses").textContent = formatCOP(totalExp);
      const balEl = document.getElementById("sum-balance");
      balEl.textContent = formatCOP(Math.abs(balance));
      balEl.className   = `s-value ${balance >= 0 ? "pos" : "neg"}`;
    }

    // ── Tabs ──────────────────────────────────────────────
    function switchTab(tab) {
      const isGastos = tab === "gastos";
      document.getElementById("panel-gastos").style.display   = isGastos ? "block" : "none";
      document.getElementById("panel-ingresos").style.display = isGastos ? "none"  : "block";
      document.getElementById("tab-gastos").classList.toggle("active",   isGastos);
      document.getElementById("tab-ingresos").classList.toggle("active", !isGastos);
    }

    // ── Guardar ───────────────────────────────────────────
    async function saveBudget() {
      const btn = document.getElementById("btn-save");
      const catInputs = document.querySelectorAll(".budget-input[data-cat]");
      const categoriesData = {};
      catInputs.forEach(inp => {
        const val = Number(inp.value) || 0;
        if (val > 0) categoriesData[inp.dataset.cat] = val;
      });

      // Recoger ingresos (nueva estructura array)
      const incomeCards = document.querySelectorAll("#income-form .income-card");
      const incomeData  = [];
      incomeCards.forEach(card => {
        const name         = card.querySelector(".income-name-input")?.value.trim();
        const amount       = Number(card.querySelector(".income-amount-input")?.value) || 0;
        const type         = card.querySelector(".income-type-select")?.value || "fijo";
        const proportional = card.querySelector(".toggle-switch")?.classList.contains("on") || false;
        const qty          = Number(card.querySelector("[data-field='qty']")?.value) || 0;
        const unitValue    = Number(card.querySelector("[data-field='unitValue']")?.value) || 0;
        const daysInMonth  = new Date(selectedMonth.split("-")[0], selectedMonth.split("-")[1], 0).getDate();
        if (name && amount > 0) {
          const entry = { name, amount, type, proportional,
            dailyAmount: proportional ? Math.round(amount / daysInMonth) : 0 };
          if (qty > 0)       entry.qty       = qty;
          if (unitValue > 0) entry.unitValue = unitValue;
          incomeData.push(entry);
        }
      });

      if (!Object.keys(categoriesData).length && !incomeData.length) {
        showToast("Ingresa al menos un valor para guardar.", "error"); return;
      }

      btn.disabled = true; btn.textContent = "Guardando...";
      try {
        await setBudget(uid, selectedMonth, { categories: categoriesData, income: incomeData });
        currentBudget = { categories: categoriesData, income: incomeData };
        showToast("Presupuesto guardado.", "success");
        document.getElementById("copy-banner").style.display = "none";
        // Sincronizar ingresos proporcionales
        if (incomeData.some(i => i.proportional)) {
          await syncProportionalIncomes(uid, selectedMonth);
        }
      } catch (err) {
        showToast("Error al guardar. Intenta de nuevo.", "error");
        console.error(err);
      } finally {
        btn.disabled = false; btn.textContent = "Guardar presupuesto";
      }
    }
  </script>
</body>
</html>
