<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Comparativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body { background: #f0f4f8; }
    body.dark { background: #111; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 14px; }

    /* ── Header ──────────────────────────────────────────── */
    .page-hdr {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 0 0; margin-bottom: 18px;
    }
    .page-title { font-size: 22px; font-weight: 500; color: var(--text); }
    .page-sub { font-size: 12px; color: #888; margin-top: 3px; }

    /* ── 3 stat cards ────────────────────────────────────── */
    .stats-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .s3-card { background: #fff; border-radius: 14px; padding: 14px 14px 12px; position: relative; overflow: hidden; }
    body.dark .s3-card { background: #1a1a1a; }
    .s3-lbl { font-size: 9px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .s3-val { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; }
    .s3-val.pres { color: #185fa5; }
    .s3-val.gast { color: #c0392b; }
    .s3-val.disp { color: #3b6d11; }
    .s3-bar { height: 3px; border-radius: 99px; margin-top: 10px; }
    .s3-ico {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      opacity: 0.08; font-size: 32px;
    }

    /* ── Uso total ───────────────────────────────────────── */
    .uso-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
    body.dark .uso-card { background: #1a1a1a; }
    .uso-hdr { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
    .uso-lbl { color: var(--text); font-weight: 400; }
    .uso-pct { font-weight: 500; color: #185fa5; }
    .uso-bar { height: 8px; background: #f0f4f8; border-radius: 99px; overflow: hidden; }
    body.dark .uso-bar { background: #2a2a2a; }
    .uso-fill { height: 100%; border-radius: 99px; background: #0f3460; transition: width 0.5s ease; }
    .uso-fill.warn { background: #e0a050; }
    .uso-fill.over { background: #c0392b; }

    /* ── Filtros ─────────────────────────────────────────── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-chip {
      padding: 6px 14px; border-radius: 99px; border: 1.5px solid #e2e8f0;
      font-size: 12px; font-weight: 500; color: #888; cursor: pointer;
      background: #fff; font-family: "DM Sans", sans-serif;
      transition: all 0.15s;
    }
    body.dark .filter-chip { background: #1a1a1a; border-color: #2a2a2a; }
    .filter-chip.active { background: #0f3460; border-color: #0f3460; color: #fff; }

    /* ── Category rows ───────────────────────────────────── */
    .cat-row {
      background: #fff; border-radius: 14px; padding: 16px;
      margin-bottom: 8px;
    }
    body.dark .cat-row { background: #1a1a1a; }
    .cat-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cat-row-left { display: flex; align-items: center; gap: 10px; }
    .cat-row-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .cat-badge {
      font-size: 10px; font-weight: 500; padding: 2px 8px;
      border-radius: 99px;
    }
    .cat-badge.none { background: #f0f4f8; color: #888; }
    body.dark .cat-badge.none { background: #222; }
    .cat-badge.ok   { background: #eaf3de; color: #3b6d11; }
    .cat-badge.warn { background: #faeeda; color: #854f0b; }
    .cat-badge.over { background: #fbeaea; color: #c0392b; }

    .cat-row-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .cat-col-lbl { font-size: 9px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .cat-col-val { font-size: 14px; font-weight: 500; }
    .cat-col-val.spent { color: var(--text); }
    .cat-col-val.budget { color: #185fa5; }
    .cat-col-val.avail  { color: #3b6d11; }
    .cat-col-val.neg    { color: #c0392b; }

    .cat-prog { height: 5px; background: #f0f4f8; border-radius: 99px; overflow: hidden; }
    body.dark .cat-prog { background: #2a2a2a; }
    .cat-prog-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

    .empty-filter { text-align: center; padding: 40px 0; font-size: 13px; color: #888; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar" style="max-width:680px;margin:0 auto;padding:12px 14px 0;"></div>

  <div class="wrap">
    <div class="page-hdr">
      <div>
        <div class="page-title">Comparativo</div>
        <div class="page-sub">Análisis de rendimiento presupuestario</div>
      </div>
      <div id="month-selector-container"></div>
    </div>

    <div class="stats-3" id="stats-3">
      <div class="skeleton" style="height:80px;border-radius:14px;"></div>
      <div class="skeleton" style="height:80px;border-radius:14px;"></div>
      <div class="skeleton" style="height:80px;border-radius:14px;"></div>
    </div>

    <div class="uso-card" id="uso-card">
      <div class="uso-hdr">
        <span class="uso-lbl">Uso total del presupuesto</span>
        <span class="uso-pct" id="uso-pct">0%</span>
      </div>
      <div class="uso-bar"><div class="uso-fill" id="uso-fill" style="width:0%;"></div></div>
    </div>

    <div class="filters" id="filters">
      <button class="filter-chip active" data-filter="">Todos</button>
      <button class="filter-chip" data-filter="GASTO BÁSICO">Básico</button>
      <button class="filter-chip" data-filter="GASTO NO ESENCIAL">No esencial</button>
      <button class="filter-chip" data-filter="AHORRO O INVERSIÓN">Ahorro</button>
    </div>

    <div id="cat-list" style="padding-bottom:90px;">
      <div class="skeleton" style="height:100px;border-radius:14px;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:100px;border-radius:14px;margin-bottom:8px;"></div>
      <div class="skeleton" style="height:100px;border-radius:14px;"></div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getExpenses, getBudget, getCategories } from "../modules/db.js";
    import { renderTopbar, renderBottomNav } from "../assets/ui.js?v=4";
    import { formatCOP, currentMonth, formatMonth, sumByCategory, buildComparison } from "../assets/utils.js";

    let uid, selectedMonth, allData = [], categories = [], activeFilter = "";

    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();
    renderTopbar(user);
    renderBottomNav("comparison");

    // Month selector pill style
    renderMonthPill();
    categories = await getCategories(uid);
    await loadData();

    function renderMonthPill() {
      const container = document.getElementById("month-selector-container");
      container.innerHTML = `
        <div style="display:inline-flex;align-items:center;gap:8px;background:#fff;border:0.5px solid #ddd;border-radius:99px;padding:6px 12px;">
          <span style="font-size:13px;color:#888;cursor:pointer;" id="mp-prev">‹</span>
          <span style="font-size:12px;font-weight:500;color:#1a1a2e;" id="mp-lbl">${formatMonth(selectedMonth)}</span>
          <span style="font-size:13px;color:#888;cursor:pointer;" id="mp-next">›</span>
        </div>`;
      document.getElementById("mp-prev").addEventListener("click", () => {
        const [y,m] = selectedMonth.split("-").map(Number);
        const pm = m===1?12:m-1, py = m===1?y-1:y;
        selectedMonth = `${py}-${String(pm).padStart(2,"0")}`;
        document.getElementById("mp-lbl").textContent = formatMonth(selectedMonth);
        loadData();
      });
      document.getElementById("mp-next").addEventListener("click", () => {
        const [y,m] = selectedMonth.split("-").map(Number);
        const nm = m===12?1:m+1, ny = m===12?y+1:y;
        selectedMonth = `${ny}-${String(nm).padStart(2,"0")}`;
        document.getElementById("mp-lbl").textContent = formatMonth(selectedMonth);
        loadData();
      });
    }

    async function loadData() {
      const [expenses, budget] = await Promise.all([
        getExpenses(uid, { month: selectedMonth }),
        getBudget(uid, selectedMonth)
      ]);
      const actual     = sumByCategory(expenses);
      const comparison = buildComparison(budget?.categories || {}, actual);
      allData = comparison.map(row => {
        const catObj = categories.find(c => c.name === row.category);
        return { ...row, type: catObj?.type || "" };
      });
      renderStats(budget, expenses);
      renderList();
    }

    function renderStats(budget, expenses) {
      const totalBudget  = budget ? Object.values(budget.categories||{}).reduce((s,v)=>s+Number(v),0) : 0;
      const totalSpent   = expenses.reduce((s,e)=>s+Number(e.amount),0);
      const totalAvail   = Math.max(totalBudget - totalSpent, 0);
      const pct          = totalBudget > 0 ? Math.min(Math.round(totalSpent/totalBudget*100),100) : 0;
      const barCls       = pct >= 100 ? "over" : pct >= 80 ? "warn" : "";

      document.getElementById("stats-3").innerHTML = `
        <div class="s3-card">
          <div class="s3-lbl">Presupuestado</div>
          <div class="s3-val pres">${formatCOP(totalBudget)}</div>
          <div class="s3-bar" style="background:#b5d4f4;"></div>
          <div class="s3-ico">🏦</div>
        </div>
        <div class="s3-card">
          <div class="s3-lbl">Gastado</div>
          <div class="s3-val gast">${formatCOP(totalSpent)}</div>
          <div class="s3-bar" style="background:#f5c6c6;"></div>
          <div class="s3-ico">💸</div>
        </div>
        <div class="s3-card">
          <div class="s3-lbl">Disponible</div>
          <div class="s3-val disp">${formatCOP(totalAvail)}</div>
          <div class="s3-bar" style="background:#c0dda0;"></div>
          <div class="s3-ico">✅</div>
        </div>`;

      document.getElementById("uso-pct").textContent = pct + "%";
      document.getElementById("uso-pct").style.color = pct >= 100 ? "#c0392b" : pct >= 80 ? "#e0a050" : "#185fa5";
      const fill = document.getElementById("uso-fill");
      fill.style.width = pct + "%";
      fill.className = "uso-fill " + barCls;
    }

    function renderList() {
      const el       = document.getElementById("cat-list");
      const filtered = activeFilter ? allData.filter(r => r.type === activeFilter) : allData;
      const sorted   = filtered.sort((a,b) => (b.pct||0)-(a.pct||0));

      if (!sorted.length) {
        el.innerHTML = `<div class="empty-filter">No hay datos para este filtro.</div>`;
        return;
      }

      el.innerHTML = sorted.map(row => {
        const budgeted  = row.budgeted || 0;
        const actual    = row.actual   || 0;
        const avail     = Math.max(budgeted - actual, 0);
        const isOver    = actual > budgeted && budgeted > 0;
        const pct       = row.pct !== null ? Math.min(Math.round((row.pct||0)*100), 100) : 0;
        const barColor  = isOver ? "#c0392b" : pct >= 80 ? "#e0a050" : "#0f3460";
        const barW      = Math.min(row.pct||0, 1) * 100;
        const noSpend   = actual === 0;

        let badgeCls, badgeTxt;
        if (noSpend)       { badgeCls="none"; badgeTxt="Sin gastos"; }
        else if (isOver)   { badgeCls="over"; badgeTxt=`${pct}% · Excedido`; }
        else if (pct >= 80){ badgeCls="warn"; badgeTxt=`${pct}%`; }
        else               { badgeCls="ok";   badgeTxt=`${pct}%`; }

        return `
          <div class="cat-row">
            <div class="cat-row-top">
              <div class="cat-row-left">
                <div class="cat-row-name">${row.category}</div>
                <span class="cat-badge ${badgeCls}">${badgeTxt}</span>
              </div>
            </div>
            <div class="cat-row-cols">
              <div>
                <div class="cat-col-lbl">Gastado</div>
                <div class="cat-col-val spent">${formatCOP(actual)}</div>
              </div>
              <div>
                <div class="cat-col-lbl">Presupuesto</div>
                <div class="cat-col-val budget">${formatCOP(budgeted)}</div>
              </div>
              <div>
                <div class="cat-col-lbl">Disponible</div>
                <div class="cat-col-val ${isOver?"neg":"avail"}">${isOver ? "-"+formatCOP(actual-budgeted) : formatCOP(avail)}</div>
              </div>
            </div>
            <div class="cat-prog">
              <div class="cat-prog-fill" style="width:${barW}%;background:${barColor};"></div>
            </div>
          </div>`;
      }).join("");
    }

    // Filters
    document.getElementById("filters").addEventListener("click", e => {
      const btn = e.target.closest(".filter-chip");
      if (!btn) return;
      document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = btn.dataset.filter;
      renderList();
    });
  </script>
</body>
</html>
