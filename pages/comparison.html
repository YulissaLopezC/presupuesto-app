<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Comparativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── Tarjeta resumen global ──────────────────────────── */
    .hero-comparison {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 14px;
    }

    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat .hs-label {
      font-size: 10px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .hero-stat .hs-value {
      font-family: "DM Serif Display", serif;
      font-size: 19px; letter-spacing: -0.5px;
    }

    .hs-value.inc { color: var(--info); }
    .hs-value.exp { color: var(--warning); }
    .hs-value.pos { color: var(--accent); }
    .hs-value.neg { color: var(--danger); }
    .hs-value.neu { color: var(--text); }

    .global-bar-wrap { }
    .global-bar-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--muted); margin-bottom: 5px;
    }

    /* ── Tabs de tipo ────────────────────────────────────── */
    .type-tabs {
      display: flex; gap: 6px; overflow-x: auto;
      padding-bottom: 2px; margin-bottom: 16px;
      scrollbar-width: none;
    }
    .type-tabs::-webkit-scrollbar { display: none; }

    .type-tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      font-size: 12px; font-weight: 400; color: var(--muted);
      cursor: pointer; background: none;
      font-family: "DM Sans", sans-serif;
      transition: all 0.15s; white-space: nowrap;
    }
    .type-tab.active-all     { background: rgba(212,96,138,0.1); border-color: var(--accent);   color: var(--accent); }
    .type-tab.active-basico  { background: rgba(212,96,138,0.1); border-color: var(--accent);   color: var(--accent); }
    .type-tab.active-noe     { background: rgba(201,124,46,0.10); border-color: var(--warning);  color: var(--warning); }
    .type-tab.active-ahorro  { background: rgba(112,171,224,0.1); border-color: var(--info);     color: var(--info); }

    /* ── Fila de categoría ───────────────────────────────── */
    .comp-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
    }

    .comp-row-header {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 8px;
    }

    .comp-cat-name { font-size: 14px; color: var(--text); }

    .comp-pct {
      font-size: 12px; font-weight: 500;
      padding: 2px 8px; border-radius: 99px;
    }
    .comp-pct.ok   { background: rgba(212,96,138,0.10); color: var(--accent); }
    .comp-pct.warn { background: rgba(201,124,46,0.12); color: var(--warning); }
    .comp-pct.over { background: rgba(217,79,79,0.12); color: var(--danger); }
    .comp-pct.zero { background: var(--surface); color: var(--muted); }

    .comp-amounts {
      display: flex; justify-content: space-between;
      margin-bottom: 8px;
    }

    .comp-col { }
    .comp-col-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .comp-col-val   { font-family: "DM Serif Display", serif; font-size: 15px; letter-spacing: -0.3px; }
    .comp-col-val.actual   { color: var(--warning); }
    .comp-col-val.budget   { color: var(--text); }
    .comp-col-val.diff-pos { color: var(--accent); }
    .comp-col-val.diff-neg { color: var(--danger); }

    /* ── Tipo section header ─────────────────────────────── */
    .type-section-hdr {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0 8px;
    }
    .type-dot { width: 7px; height: 7px; border-radius: 50%; }
    .type-dot.basico      { background: var(--accent); }
    .type-dot.no-esencial { background: var(--warning); }
    .type-dot.ahorro      { background: var(--info); }
    .type-section-lbl {
      font-size: 11px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .type-section-sub { margin-left: auto; font-size: 12px; color: var(--muted); }

    /* ── Sin presupuesto notice ──────────────────────────── */
    .no-budget-notice {
      background: rgba(201,124,46,0.07);
      border: 1px solid rgba(201,124,46,0.25);
      border-radius: 14px; padding: 20px;
      text-align: center; color: var(--warning); font-size: 13px; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <h2>Comparativo</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Presupuestado vs. gastado real por categoría.
      </p>
    </div>

    <div id="month-selector-container" style="margin-bottom:16px;"></div>

    <!-- Hero resumen -->
    <div id="hero-section">
      <div class="skeleton" style="height:130px;border-radius:24px;margin-bottom:14px;"></div>
    </div>

    <!-- Tabs de tipo -->
    <div class="type-tabs" id="type-tabs" style="display:none;">
      <button class="type-tab active-all" data-filter="all"   >Todos</button>
      <button class="type-tab"            data-filter="basico">Básico</button>
      <button class="type-tab"            data-filter="noe"   >No esencial</button>
      <button class="type-tab"            data-filter="ahorro">Ahorro</button>
    </div>

    <!-- Lista comparativo -->
    <div id="comparison-list">
      <div class="skeleton" style="height:280px;border-radius:14px;"></div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth }  from "../modules/auth.js";
    import { getExpenses, getBudget, getCategories } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector } from "../assets/ui.js?v=2";
    import { formatCOP, currentMonth, formatMonth, sumByCategory, buildComparison, totalUsedPct } from "../assets/utils.js";

    let uid, selectedMonth, activeFilter = "all";
    let compData = [], categories = [];

    // ── Init ─────────────────────────────────────────────
    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("budget");  // comparativo vive bajo el ícono de presupuesto
    renderMonthSelector("month-selector-container", selectedMonth, (m) => {
      selectedMonth = m;
      loadData();
    });

    // Event delegation for type tabs
    document.getElementById("type-tabs").addEventListener("click", e => {
      const btn = e.target.closest(".type-tab");
      if (btn) setFilter(btn, btn.dataset.filter);
    });

    categories = await getCategories(uid);
    await loadData();

    // ── Cargar datos ──────────────────────────────────────
    async function loadData() {
      const [expenses, budget] = await Promise.all([
        getExpenses(uid, { month: selectedMonth }),
        getBudget(uid, selectedMonth)
      ]);

      if (!budget?.categories) {
        renderNoBudget();
        return;
      }

      const actualByCategory = sumByCategory(expenses);
      compData = buildComparison(budget.categories, actualByCategory);

      // Enriquecer con tipo de categoría
      const catTypeMap = Object.fromEntries(categories.map(c => [c.name, c.type]));
      compData = compData.map(row => ({
        ...row,
        catType: catTypeMap[row.category] || "GASTO BÁSICO"
      }));

      renderHero(compData, budget, expenses);
      document.getElementById("type-tabs").style.display = "flex";
      renderList();
    }

    // ── Hero global ───────────────────────────────────────
    function renderHero(comp, budget, expenses) {
      const totalBudgeted = comp.reduce((s, r) => s + r.budgeted, 0);
      const totalActual   = comp.reduce((s, r) => s + r.actual,   0);
      const totalDiff     = totalBudgeted - totalActual;
      const pct           = totalBudgeted > 0 ? Math.min(totalActual / totalBudgeted, 1) : 0;
      const pctN          = Math.round((totalBudgeted > 0 ? totalActual / totalBudgeted : 0) * 100);
      const barClass      = pct >= 1 ? "over" : pct >= 0.8 ? "warn" : "";

      document.getElementById("hero-section").innerHTML = `
        <div class="hero-comparison">
          <div class="hero-row">
            <div class="hero-stat">
              <div class="hs-label">Presupuestado</div>
              <div class="hs-value neu">${formatCOP(totalBudgeted)}</div>
            </div>
            <div class="hero-stat">
              <div class="hs-label">Gastado</div>
              <div class="hs-value exp">${formatCOP(totalActual)}</div>
            </div>
            <div class="hero-stat">
              <div class="hs-label">${totalDiff >= 0 ? "Disponible" : "Exceso"}</div>
              <div class="hs-value ${totalDiff >= 0 ? "pos" : "neg"}">${formatCOP(Math.abs(totalDiff))}</div>
            </div>
          </div>
          <div class="global-bar-labels">
            <span>${pctN}% del presupuesto usado</span>
            <span>${formatCOP(totalActual)} / ${formatCOP(totalBudgeted)}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${barClass}" style="width:${pct * 100}%"></div>
          </div>
        </div>
      `;
    }

    // ── Lista por tipo ────────────────────────────────────
    function renderList() {
      const el = document.getElementById("comparison-list");

      const TYPE_MAP = {
        "GASTO BÁSICO":       { key: "basico",  cls: "basico",      label: "Gasto básico" },
        "GASTO NO ESENCIAL":  { key: "noe",     cls: "no-esencial", label: "Gasto no esencial" },
        "AHORRO O INVERSIÓN": { key: "ahorro",  cls: "ahorro",      label: "Ahorro o inversión" }
      };

      const TYPES = [
        "GASTO BÁSICO",
        "GASTO NO ESENCIAL",
        "AHORRO O INVERSIÓN"
      ];

      let html = "";

      TYPES.forEach(typeKey => {
        const meta  = TYPE_MAP[typeKey];
        const items = compData.filter(r => {
          const matchType = r.catType === typeKey;
          if (activeFilter === "all") return matchType;
          return matchType && meta.key === activeFilter;
        });

        if (!items.length) return;

        const typeTotal     = items.reduce((s, r) => s + r.actual,   0);
        const typeBudgeted  = items.reduce((s, r) => s + r.budgeted, 0);

        html += `
          <div class="type-section-hdr">
            <div class="type-dot ${meta.cls}"></div>
            <span class="type-section-lbl">${meta.label}</span>
            <span class="type-section-sub">${formatCOP(typeTotal)} / ${formatCOP(typeBudgeted)}</span>
          </div>
          ${items.map(row => compRowHTML(row)).join("")}
        `;
      });

      // Categorías sin tipo conocido (gastos sin categoría configurada)
      const orphans = compData.filter(r => !TYPE_MAP[r.catType]);
      if (orphans.length && (activeFilter === "all")) {
        html += `
          <div class="type-section-hdr">
            <div class="type-dot" style="background:var(--muted);"></div>
            <span class="type-section-lbl">Otros</span>
          </div>
          ${orphans.map(row => compRowHTML(row)).join("")}
        `;
      }

      el.innerHTML = html || `<div class="empty-state"><p>No hay datos para mostrar.</p></div>`;
    }

    function compRowHTML(row) {
      const pctN     = row.pct !== null ? Math.round(row.pct * 100) : 0;
      const pct      = row.pct !== null ? Math.min(row.pct, 1) : 0;
      const pctClass = row.actual === 0 ? "zero" : pctN >= 100 ? "over" : pctN >= 80 ? "warn" : "ok";
      const barClass = pct >= 1 ? "over" : pct >= 0.8 ? "warn" : "";
      const diffCls  = row.diff >= 0 ? "diff-pos" : "diff-neg";

      return `
        <div class="comp-row">
          <div class="comp-row-header">
            <span class="comp-cat-name">${row.category}</span>
            <span class="comp-pct ${pctClass}">${row.actual === 0 ? "Sin gastos" : pctN + "%"}</span>
          </div>
          <div class="comp-amounts">
            <div class="comp-col">
              <div class="comp-col-label">Gastado</div>
              <div class="comp-col-val actual">${formatCOP(row.actual)}</div>
            </div>
            <div class="comp-col" style="text-align:center;">
              <div class="comp-col-label">Presupuesto</div>
              <div class="comp-col-val budget">${formatCOP(row.budgeted)}</div>
            </div>
            <div class="comp-col" style="text-align:right;">
              <div class="comp-col-label">${row.diff >= 0 ? "Disponible" : "Exceso"}</div>
              <div class="comp-col-val ${diffCls}">${formatCOP(Math.abs(row.diff))}</div>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${barClass}" style="width:${pct * 100}%"></div>
          </div>
        </div>`;
    }

    // ── Filtro por tipo ───────────────────────────────────
    function setFilter(btn, filter) {
      document.querySelectorAll(".type-tab").forEach(b => b.className = "type-tab");
      const clsMap = { all: "active-all", basico: "active-basico", noe: "active-noe", ahorro: "active-ahorro" };
      btn.classList.add(clsMap[filter]);
      activeFilter = filter;
      renderList();
    };

    // ── Sin presupuesto ───────────────────────────────────
    function renderNoBudget() {
      document.getElementById("hero-section").innerHTML = "";
      document.getElementById("type-tabs").style.display = "none";
      document.getElementById("comparison-list").innerHTML = `
        <div class="no-budget-notice">
          No hay presupuesto configurado para ${formatMonth(selectedMonth)}.<br/>
          <a href="./budget.html" style="color:var(--warning);font-weight:500;display:inline-block;margin-top:8px;">
            Configurar presupuesto →
          </a>
        </div>`;
    }
  </script>
</body>
</html>
