<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body { background: #f0f4f8; padding-bottom: 0; }
    body.dark { background: #111; }

    /* ── Topbar fuera del hero ───────────────────────────── */
    .dash-topbar {
      background: #f0f4f8; padding: 12px 16px 0;
      max-width: 680px; margin: 0 auto;
    }
    body.dark .dash-topbar { background: #111; }
    .dash-topbar .topbar { padding: 0; }

    /* ── Hero card azul ──────────────────────────────────── */
    .hero-card {
      background: #0f3460; border-radius: 20px;
      padding: 16px 18px 20px; margin: 12px 14px 0;
      max-width: calc(680px - 28px);
    }
    body.dark .hero-card { background: #0a1f3d; }

    .hero-month-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12); border-radius: 99px;
      padding: 5px 12px; margin-bottom: 12px;
    }
    .hero-month-pill .ms-arrow { color: #7aa3cc !important; }
    .hero-month-pill .ms-label { color: #fff !important; font-size: 12px !important; min-width: 100px !important; }

    .hero-label {
      font-size: 9px; font-weight: 500; color: #7aa3cc;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px;
    }
    .hero-amount {
      font-size: 36px; font-weight: 500; color: #fff;
      letter-spacing: -1.5px; margin-bottom: 4px; line-height: 1.1;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.12); border-radius: 99px;
      padding: 3px 10px; font-size: 11px; color: #7ab8e8; margin-bottom: 12px;
    }
    .hero-prog-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #7aa3cc; margin-bottom: 4px;
    }
    .hero-prog-track {
      height: 4px; background: rgba(255,255,255,0.15);
      border-radius: 99px; overflow: hidden; margin-bottom: 14px;
    }
    .hero-prog-fill { height: 100%; background: #fff; border-radius: 99px; }
    .hero-prog-fill.warn { background: #e0a050; }
    .hero-prog-fill.over { background: #e07070; }
    .hero-btns { display: flex; gap: 8px; align-items: center; }
    .hero-btn-main {
      background: #fff; color: #0f3460; border: none;
      border-radius: 99px; padding: 8px 16px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: "DM Sans", sans-serif;
      text-decoration: none; display: inline-block;
    }
    .hero-btn-sm {
      background: rgba(255,255,255,0.15); color: #fff; border: none;
      border-radius: 50%; width: 34px; height: 34px; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }

    /* ── Body ────────────────────────────────────────────── */
    .dash-body {
      padding: 12px 14px 90px;
      display: flex; flex-direction: column; gap: 12px;
      max-width: 680px; margin: 0 auto;
    }

    /* ── Stats row ───────────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: #fff; border-radius: 14px; padding: 12px 14px; }
    body.dark .stat-card { background: #1a1a1a; }
    .stat-lbl { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .stat-val { font-size: 17px; font-weight: 500; }
    .stat-val.blue { color: #185fa5; }
    .stat-val.green { color: #3b6d11; }
    .mini-bar { height: 3px; border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .mini-fill { height: 100%; border-radius: 99px; }
    .stat-sub { font-size: 10px; color: #888; margin-top: 3px; }

    /* ── Dash cards ──────────────────────────────────────── */
    .dash-card { background: #fff; border-radius: 16px; padding: 14px; }
    body.dark .dash-card { background: #1a1a1a; }
    .card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .card-sub { font-size: 10px; color: #888; margin-top: 1px; }
    .card-link { font-size: 11px; color: #185fa5; text-decoration: none; cursor: pointer; }

    /* ── Barras semanales ────────────────────────────────── */
    .bars-wrap { display: flex; gap: 6px; align-items: flex-end; height: 100px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar-pair { display: flex; gap: 2px; align-items: flex-end; width: 100%; flex: 1; position: relative; }
    .bar { border-radius: 3px 3px 0 0; flex: 1; min-height: 3px; position: relative; }
    .bar-b { background: #b5d4f4; }
    .bar-r { background: #0f3460; }
    body.dark .bar-b { background: #1a3a6a; }
    body.dark .bar-r { background: #5a8abc; }
    .bar-val-top {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      font-size: 9px; color: #888; white-space: nowrap;
    }
    .bar-lbl { font-size: 9px; color: #888; margin-top: 4px; }
    .chart-legend { display: flex; gap: 10px; margin-top: 8px; }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 3px; }
    .leg-item { font-size: 10px; color: #666; display: flex; align-items: center; }

    /* ── Two col ─────────────────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .donut-wrap { position: relative; width: 68px; height: 68px; margin: 0 auto 10px; }
    .donut-ctr { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-pct { font-size: 14px; font-weight: 500; color: var(--text); }
    .donut-sub2 { font-size: 9px; color: #888; }
    .d-stat { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; }
    .d-lbl { color: #888; }
    .d-val { font-weight: 500; color: var(--text); }
    .d-val.g { color: #3b6d11; }
    .wall-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .wall-name { font-size: 11px; color: var(--text); }
    .wall-sub { font-size: 9px; color: #888; }
    .wall-val { font-size: 12px; font-weight: 500; }
    .wall-val.b { color: #185fa5; }
    .wall-val.r { color: #a32d2d; }

    /* ── Categorías top ──────────────────────────────────── */
    .cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-top-card { border-radius: 12px; padding: 10px; border: 0.5px solid #e8e8e8; }
    body.dark .cat-top-card { border-color: #2a2a2a; }
    .cat-ico { width: 28px; height: 28px; border-radius: 7px; margin-bottom: 6px; display: flex; align-items: center; justify-content: center; }
    .cat-top-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 3px; }
    .cat-top-val { font-size: 13px; font-weight: 500; color: var(--text); }

    /* ── Progreso por categoría ──────────────────────────── */
    .cat-prog-row { padding: 9px 0; border-bottom: 0.5px solid #f0f0f0; }
    body.dark .cat-prog-row { border-bottom-color: #2a2a2a; }
    .cat-prog-row:last-child { border-bottom: none; }
    .cat-prog-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
    .cat-prog-name { font-size: 12px; color: var(--text); }
    .cat-prog-amounts { font-size: 10px; color: #888; }
    .cat-prog-amounts b { color: var(--text); font-weight: 500; }
    .prog-bar { height: 4px; background: #f0f0f0; border-radius: 99px; overflow: hidden; }
    body.dark .prog-bar { background: #2a2a2a; }
    .prog-fill { height: 100%; border-radius: 99px; background: #0f3460; }
    .prog-fill.warn { background: #e0a050; }
    .prog-fill.over { background: #e07070; }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="dash-topbar">
    <div id="topbar" class="topbar"></div>
  </div>

  <!-- Hero card azul -->
  <div style="max-width:680px;margin:0 auto;">
    <div class="hero-card" id="hero-card">
      <div id="month-selector-container"></div>
      <div id="hero-inner">
        <div class="hero-label">Cargando...</div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="dash-body">
    <div class="stats-row" id="stats-row">
      <div class="skeleton" style="height:80px;border-radius:14px;"></div>
      <div class="skeleton" style="height:80px;border-radius:14px;"></div>
    </div>

    <div class="dash-card">
      <div class="card-hdr">
        <div>
          <div class="card-title">Rendimiento semanal</div>
          <div class="card-sub">Real vs presupuesto</div>
        </div>
      </div>
      <div class="bars-wrap" id="weekly-bars" style="margin-top:18px;">
        <div class="skeleton" style="height:80px;border-radius:8px;flex:1;"></div>
      </div>
      <div class="chart-legend" id="chart-legend" style="display:none;">
        <div class="leg-item"><span class="leg-dot" style="background:#b5d4f4;"></span>Presupuesto</div>
        <div class="leg-item"><span class="leg-dot" style="background:#0f3460;"></span>Real</div>
      </div>
    </div>

    <div class="two-col">
      <div class="dash-card" id="donut-card">
        <div class="skeleton" style="height:160px;border-radius:8px;"></div>
      </div>
      <div class="dash-card" id="wallets-card">
        <div class="skeleton" style="height:160px;border-radius:8px;"></div>
      </div>
    </div>

    <div class="dash-card">
      <div class="card-hdr">
        <div class="card-title">Categorías top</div>
        <a href="./comparison.html" class="card-link">Ver todo →</a>
      </div>
      <div class="cats-grid" id="cats-grid">
        <div class="skeleton" style="height:76px;border-radius:12px;"></div>
        <div class="skeleton" style="height:76px;border-radius:12px;"></div>
        <div class="skeleton" style="height:76px;border-radius:12px;"></div>
        <div class="skeleton" style="height:76px;border-radius:12px;"></div>
      </div>
    </div>

    <div class="dash-card">
      <div class="card-hdr">
        <div class="card-title">Por categoría</div>
        <a href="./comparison.html" class="card-link">Comparativo →</a>
      </div>
      <div id="cat-progress">
        <div class="skeleton" style="height:160px;border-radius:8px;"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getExpenses, getBudget, getWallets, getIncomes, getProportionalSummary, getProportionalExpensesSummary } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector } from "../assets/ui.js?v=3";
    import { formatCOP, currentMonth, formatDate, formatMonth, sumByCategory, buildComparison } from "../assets/utils.js";

    let uid, selectedMonth;
    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("dashboard");

    // Render month selector inside hero with white style
    renderMonthSelector("month-selector-container", selectedMonth, m => {
      selectedMonth = m;
      loadDashboard();
    });

    await loadDashboard();

    async function loadDashboard() {
      const [expenses, budget, wallets, incomes, propSummary] = await Promise.all([
        getExpenses(uid, { month: selectedMonth }),
        getBudget(uid, selectedMonth),
        getWallets(uid),
        getIncomes(uid, { month: selectedMonth }),
        getProportionalSummary(uid, selectedMonth)
      ]);
      const propExpSummary = await getProportionalExpensesSummary(uid, selectedMonth, expenses);

      renderHero(expenses, budget);
      renderStats(expenses, budget, incomes);
      renderWeeklyBars(expenses, budget);
      renderDonut(expenses, budget);
      renderWalletsCard(wallets);
      renderCatsTop(expenses);
      renderCatProgress(expenses, budget);
    }

    // ── Hero ──────────────────────────────────────────────
    function renderHero(expenses, budget) {
      const totalBudgeted = budget ? Object.values(budget.categories||{}).reduce((s,v)=>s+Number(v),0) : 0;
      const totalSpent    = expenses.reduce((s,e)=>s+Number(e.amount),0);
      const saldo         = totalBudgeted - totalSpent;
      const pctUsed       = totalBudgeted > 0 ? Math.min(totalSpent/totalBudgeted,1) : 0;
      const pctN          = Math.round(pctUsed*100);
      const barCls        = pctUsed >= 1 ? "over" : pctUsed >= 0.8 ? "warn" : "";

      document.getElementById("hero-inner").innerHTML = `
        <div class="hero-label">Disponible del presupuesto</div>
        <div class="hero-amount">${formatCOP(Math.abs(saldo))}</div>
        <div class="hero-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#7ab8e8" stroke-width="2.5" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
          ${pctN}% del presupuesto ${saldo < 0 ? "excedido" : "usado"}
        </div>
        ${totalBudgeted > 0 ? `
          <div class="hero-prog-labels">
            <span>Gastado: ${formatCOP(totalSpent)}</span>
            <span>${pctN}%</span>
          </div>
          <div class="hero-prog-track">
            <div class="hero-prog-fill ${barCls}" style="width:${pctUsed*100}%;"></div>
          </div>` : ""}
        <div class="hero-btns">
          <a href="./expenses.html" class="hero-btn-main">+ Registrar movimiento</a>
          <a href="./expenses.html" class="hero-btn-sm">↗</a>
        </div>`;
    }

    // ── Stats ─────────────────────────────────────────────
    function renderStats(expenses, budget, incomes) {
      const totalBudgeted = budget ? Object.values(budget.categories||{}).reduce((s,v)=>s+Number(v),0) : 0;
      const totalSpent    = expenses.reduce((s,e)=>s+Number(e.amount),0);
      const totalIncome   = incomes.filter(i=>!i.isProportional).reduce((s,i)=>s+Number(i.amount),0);
      const pctSpent      = totalBudgeted > 0 ? Math.min(totalSpent/totalBudgeted,1) : 0;
      const pctIncome     = totalBudgeted > 0 ? Math.min(totalIncome/totalBudgeted,1) : 0;

      document.getElementById("stats-row").innerHTML = `
        <div class="stat-card">
          <div class="stat-lbl">Presupuesto</div>
          <div class="stat-val blue">${formatCOP(totalBudgeted)}</div>
          <div class="mini-bar" style="background:#e6f1fb;">
            <div class="mini-fill" style="width:${pctSpent*100}%;background:#185fa5;"></div>
          </div>
          <div class="stat-sub">${Math.round(pctSpent*100)}% gastado</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Ingresos reales</div>
          <div class="stat-val green">${formatCOP(totalIncome)}</div>
          <div class="mini-bar" style="background:#eaf3de;">
            <div class="mini-fill" style="width:${pctIncome*100}%;background:#3b6d11;"></div>
          </div>
          <div class="stat-sub">${Math.round(pctIncome*100)}% del esperado</div>
        </div>`;
    }

    // ── Barras semanales con valores ──────────────────────
    function renderWeeklyBars(expenses, budget) {
      const totalBudgeted = budget ? Object.values(budget.categories||{}).reduce((s,v)=>s+Number(v),0) : 0;
      const weekBudget    = totalBudgeted / 4;

      const weeks = [0,0,0,0];
      expenses.forEach(e => {
        const day = parseInt((e.date||"").split("-")[2]||"1");
        const w   = Math.min(Math.floor((day-1)/7), 3);
        weeks[w] += Number(e.amount);
      });

      const maxVal = Math.max(...weeks, weekBudget, 1);

      const fmt = v => {
        if (v >= 1000000) return "$" + (v/1000000).toFixed(1) + "M";
        if (v >= 1000)    return "$" + Math.round(v/1000) + "k";
        return "$" + Math.round(v);
      };

      document.getElementById("weekly-bars").innerHTML = weeks.map((w,i) => {
        const hReal   = Math.max(Math.round((w/maxVal)*100), 3);
        const hBudget = Math.max(Math.round((weekBudget/maxVal)*100), 3);
        return `
          <div class="bar-col">
            <div class="bar-pair">
              <div class="bar bar-b" style="height:${hBudget}%;">
                <span class="bar-val-top">${fmt(weekBudget)}</span>
              </div>
              <div class="bar bar-r" style="height:${hReal}%;"></div>
            </div>
            <div class="bar-lbl">Sem ${i+1}</div>
          </div>`;
      }).join("");
      document.getElementById("chart-legend").style.display = "flex";
    }

    // ── Donut ─────────────────────────────────────────────
    function renderDonut(expenses, budget) {
      const totalBudgeted = budget ? Object.values(budget.categories||{}).reduce((s,v)=>s+Number(v),0) : 0;
      const totalSpent    = expenses.reduce((s,e)=>s+Number(e.amount),0);
      const pct           = totalBudgeted > 0 ? Math.min(totalSpent/totalBudgeted,1) : 0;
      const pctN          = Math.round(pct*100);
      const saldo         = Math.max(totalBudgeted - totalSpent, 0);
      const circumference = 2 * Math.PI * 26;
      const dash          = pct * circumference;
      const strokeColor   = pct >= 1 ? "#e07070" : pct >= 0.8 ? "#e0a050" : "#0f3460";

      document.getElementById("donut-card").innerHTML = `
        <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;">Salud presupuesto</div>
        <div class="donut-wrap">
          <svg width="68" height="68" viewBox="0 0 68 68">
            <circle cx="34" cy="34" r="26" fill="none" stroke="#e8f0fa" stroke-width="8"/>
            <circle cx="34" cy="34" r="26" fill="none" stroke="${strokeColor}" stroke-width="8"
              stroke-dasharray="${dash} ${circumference}"
              stroke-linecap="round" transform="rotate(-90 34 34)"/>
          </svg>
          <div class="donut-ctr">
            <div class="donut-pct">${pctN}%</div>
            <div class="donut-sub2">usado</div>
          </div>
        </div>
        <div class="d-stat"><span class="d-lbl">Límite</span><span class="d-val">${formatCOP(totalBudgeted)}</span></div>
        <div class="d-stat"><span class="d-lbl">Resta</span><span class="d-val g">${formatCOP(saldo)}</span></div>`;
    }

    // ── Cajitas card ──────────────────────────────────────
    function renderWalletsCard(wallets) {
      const shown = wallets.slice(0,3);
      document.getElementById("wallets-card").innerHTML = `
        <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;">Cajitas</div>
        ${shown.map(w => `
          <div class="wall-row">
            <div>
              <div class="wall-name">${w.icon||"🏦"} ${w.name}</div>
              <div class="wall-sub">${w.type||"ahorro"}</div>
            </div>
            <div class="wall-val ${w.type==="credito"?"r":"b"}">${formatCOP(Number(w.balance||0))}</div>
          </div>`).join("")}
        <a href="./wallets.html" style="font-size:10px;color:#185fa5;cursor:pointer;margin-top:6px;display:block;text-decoration:none;">Ver todas →</a>`;
    }

    // ── Categorías top ────────────────────────────────────
    function renderCatsTop(expenses) {
      const actual  = sumByCategory(expenses);
      const colors  = ["#eaf3de","#fbeaf0","#e6f1fb","#faeeda"];
      const strokes = ["#3b6d11","#993556","#185fa5","#854f0b"];
      const sorted  = Object.entries(actual).sort((a,b)=>b[1]-a[1]).slice(0,4);

      if (!sorted.length) {
        document.getElementById("cats-grid").innerHTML = `<div class="empty-state" style="grid-column:1/-1;">Sin gastos este mes.</div>`;
        return;
      }
      document.getElementById("cats-grid").innerHTML = sorted.map(([name,amount],i) => `
        <div class="cat-top-card">
          <div class="cat-ico" style="background:${colors[i%colors.length]};">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${strokes[i%strokes.length]}" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <div class="cat-top-lbl">${name}</div>
          <div class="cat-top-val">${formatCOP(amount)}</div>
        </div>`).join("");
    }

    // ── Progreso por categoría ────────────────────────────
    function renderCatProgress(expenses, budget) {
      const el = document.getElementById("cat-progress");
      if (!budget?.categories) {
        el.innerHTML = `<div class="empty-state"><p>Configura tu presupuesto para ver el progreso.</p>
          <a href="./budget.html" style="font-size:12px;color:#185fa5;display:inline-block;margin-top:8px;">Configurar →</a></div>`;
        return;
      }
      const actual     = sumByCategory(expenses);
      const comparison = buildComparison(budget.categories, actual)
        .filter(r => r.budgeted > 0)
        .sort((a,b) => (b.pct||0) - (a.pct||0));

      if (!comparison.length) {
        el.innerHTML = `<div class="empty-state">Sin datos de categorías.</div>`;
        return;
      }
      el.innerHTML = comparison.map(row => {
        const pct    = row.pct !== null ? Math.min(row.pct,1) : 0;
        const pctN   = row.pct !== null ? Math.round(row.pct*100) : 0;
        const barCls = pct >= 1 ? "over" : pct >= 0.8 ? "warn" : "";
        return `
          <div class="cat-prog-row">
            <div class="cat-prog-hdr">
              <span class="cat-prog-name">${row.category}</span>
              <span class="cat-prog-amounts">
                <b>${formatCOP(row.actual)}</b> / ${formatCOP(row.budgeted)}
                <span style="margin-left:4px;color:${pctN>=100?"#e07070":"#888"}">${pctN}%</span>
              </span>
            </div>
            <div class="prog-bar">
              <div class="prog-fill ${barCls}" style="width:${pct*100}%;"></div>
            </div>
          </div>`;
      }).join("");
    }
  </script>
</body>
</html>
