<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Cajitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 54px; height: 54px;
      background: var(--accent); color: #0f110e;
      border: none; border-radius: 50%; font-size: 26px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(181,209,122,0.3);
      z-index: 90; transition: background 0.2s, transform 0.2s;
    }
    .fab:hover  { background: var(--accent2); }
    .fab:active { transform: scale(0.95); }

    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
      z-index: 160; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-width: 680px; margin: 0 auto;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; background: var(--border2);
      border-radius: 99px; margin: 0 auto 20px;
    }
    .drawer-title {
      font-family: "DM Serif Display", serif;
      font-size: 20px; font-weight: 400; margin-bottom: 20px;
    }

    /* ── Resumen global cajitas ───────────────────────────── */
    .envelopes-summary {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .env-sum-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
    }
    .env-sum-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .env-sum-value { font-family: "DM Serif Display", serif; font-size: 20px; letter-spacing: -0.5px; }
    .env-sum-value.budgeted { color: var(--text); }
    .env-sum-value.actual   { color: var(--accent); }

    /* ── Tarjeta de cajita ───────────────────────────────── */
    .envelope-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .envelope-card:hover { border-color: var(--border2); }

    .env-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 12px;
    }

    .env-card-name {
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    .env-card-status {
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 99px;
    }
    .env-card-status.ok   { background: rgba(181,209,122,0.12); color: var(--accent); }
    .env-card-status.warn { background: rgba(224,184,112,0.12); color: var(--warning); }
    .env-card-status.over { background: rgba(224,112,112,0.12); color: var(--danger); }

    .env-card-amounts {
      display: flex; align-items: baseline;
      gap: 6px; margin-bottom: 10px;
    }

    .env-actual {
      font-family: "DM Serif Display", serif;
      font-size: 28px; font-weight: 400; letter-spacing: -1px;
    }
    .env-actual.ok   { color: var(--accent); }
    .env-actual.warn { color: var(--warning); }
    .env-actual.over { color: var(--danger); }

    .env-of-budget {
      font-size: 13px; color: var(--muted);
    }

    .env-diff {
      font-size: 12px; margin-bottom: 10px;
    }
    .env-diff.pos { color: var(--accent); }
    .env-diff.neg { color: var(--danger); }

    .env-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 4px;
    }

    .env-pct-label { font-size: 11px; color: var(--muted); }

    /* ── Inputs duales del drawer ────────────────────────── */
    .dual-inputs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    .amount-wrapper { position: relative; }
    .amount-wrapper .sym {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }
    .amount-wrapper .form-input { padding-left: 26px; }

    /* ── Copiar del mes anterior ─────────────────────────── */
    .copy-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(181,209,122,0.06);
      border: 1px solid rgba(181,209,122,0.2);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
    }
    .copy-banner p { font-size: 13px; color: var(--accent); }
    .copy-banner span { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
    .btn-copy {
      background: rgba(181,209,122,0.1); border: 1px solid rgba(181,209,122,0.3);
      color: var(--accent); border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 500;
      font-family: "DM Sans", sans-serif; cursor: pointer;
      white-space: nowrap; transition: background 0.15s;
      flex-shrink: 0; margin-left: 10px;
    }
    .btn-copy:hover { background: rgba(181,209,122,0.18); }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <h2>Cajitas</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Sobres de dinero con meta y valor actual.
      </p>
    </div>

    <div id="month-selector-container" style="margin-bottom:14px;"></div>

    <!-- Copiar mes anterior -->
    <div id="copy-banner" style="display:none;" class="copy-banner">
      <div>
        <p>Copiar cajitas del mes anterior</p>
        <span id="copy-banner-sub"></span>
      </div>
      <button class="btn-copy" id="btn-copy">Copiar</button>
    </div>

    <!-- Resumen totales -->
    <div class="envelopes-summary" id="envelopes-summary" style="display:none;">
      <div class="env-sum-card">
        <div class="env-sum-label">Total presupuestado</div>
        <div class="env-sum-value budgeted" id="sum-budgeted">$ 0</div>
      </div>
      <div class="env-sum-card">
        <div class="env-sum-label">Total actual</div>
        <div class="env-sum-value actual" id="sum-actual">$ 0</div>
      </div>
    </div>

    <!-- Lista de cajitas -->
    <div id="envelopes-list">
      <div class="skeleton" style="height:220px;border-radius:16px;"></div>
    </div>
  </div>

  <button class="fab" id="fab" title="Nueva cajita">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Drawer: agregar / editar cajita -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="drawer-title">Nueva cajita</div>

    <div class="form-group">
      <label class="form-label">Nombre de la cajita</label>
      <input type="text" class="form-input" id="field-name"
             placeholder="Ej: Ahorro, Emergencias..." maxlength="40"/>
    </div>

    <div class="dual-inputs">
      <div class="form-group">
        <label class="form-label">Meta / presupuesto</label>
        <div class="amount-wrapper">
          <span class="sym">$</span>
          <input type="number" class="form-input" id="field-budgeted"
                 placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Valor actual</label>
        <div class="amount-wrapper">
          <span class="sym">$</span>
          <input type="number" class="form-input" id="field-actual"
                 placeholder="0" min="0"/>
        </div>
      </div>
    </div>

    <!-- Mini progress en el drawer -->
    <div id="drawer-progress-wrap" style="margin-bottom:18px;display:none;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;">
        <span id="dp-label">0%</span>
        <span id="dp-diff"></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="dp-fill" style="width:0%"></div>
      </div>
    </div>

    <button class="btn-primary" id="btn-save">Guardar cajita</button>
  </div>

  <script type="module">
    import { requireAuth }   from "../modules/auth.js";
    import { getEnvelopes, setEnvelope, deleteEnvelope } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector, showToast } from "../assets/ui.js";
    import { formatCOP, currentMonth, formatMonth, lastMonths } from "../assets/utils.js";

    let uid, selectedMonth, envelopes = [], editingId = null;

    // ── Init ─────────────────────────────────────────────
    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("envelopes");
    renderMonthSelector("month-selector-container", selectedMonth, (m) => {
      selectedMonth = m;
      loadEnvelopes();
    });

    await loadEnvelopes();

    // ── Cargar cajitas ────────────────────────────────────
    async function loadEnvelopes() {
      envelopes = await getEnvelopes(uid, selectedMonth);
      renderEnvelopes();
      await checkCopyBanner();
    }

    // ── Render lista ──────────────────────────────────────
    function renderEnvelopes() {
      const el = document.getElementById("envelopes-list");
      const sumEl = document.getElementById("envelopes-summary");

      if (!envelopes.length) {
        sumEl.style.display = "none";
        el.innerHTML = `
          <div class="empty-state">
            <p>No hay cajitas para este mes.</p>
            <p style="margin-top:6px;font-size:12px;">
              Toca <strong style="color:var(--accent)">+</strong> para crear la primera.
            </p>
          </div>`;
        return;
      }

      // Resumen totales
      const totalBudgeted = envelopes.reduce((s, e) => s + Number(e.budgeted), 0);
      const totalActual   = envelopes.reduce((s, e) => s + Number(e.actual),   0);
      document.getElementById("sum-budgeted").textContent = formatCOP(totalBudgeted);
      document.getElementById("sum-actual").textContent   = formatCOP(totalActual);
      sumEl.style.display = "grid";

      el.innerHTML = envelopes.map(env => {
        const budgeted = Number(env.budgeted);
        const actual   = Number(env.actual);
        const pct      = budgeted > 0 ? actual / budgeted : 0;
        const pctN     = Math.round(pct * 100);
        const diff     = budgeted - actual;

        const cls      = pct > 1 ? "over" : pct > 0.8 ? "warn" : "ok";
        const barCls   = pct >= 1 ? "over" : pct >= 0.8 ? "warn" : "";
        const statusLbl = pct > 1 ? "Por encima" : pct > 0.8 ? "Casi llena" : "En curso";

        return `
          <div class="envelope-card" data-id="${env.id}">
            <div class="env-card-top">
              <div class="env-card-name">${env.name}</div>
              <div class="env-card-status ${cls}">${statusLbl}</div>
            </div>
            <div class="env-card-amounts">
              <div class="env-actual ${cls}">${formatCOP(actual)}</div>
              <div class="env-of-budget">de ${formatCOP(budgeted)}</div>
            </div>
            <div class="env-diff ${diff >= 0 ? "pos" : "neg"}">
              ${diff >= 0
                ? `Faltan ${formatCOP(diff)} para la meta`
                : `${formatCOP(Math.abs(diff))} por encima de la meta`}
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${barCls}" style="width:${Math.min(pct,1)*100}%"></div>
            </div>
            <div class="env-card-footer" style="margin-top:8px;">
              <span class="env-pct-label">${pctN}% completado</span>
              <button class="btn-danger" data-id="${env.id}" data-name="${env.name}">
                Eliminar
              </button>
            </div>
          </div>`;
      }).join("");
    }

    // ── Banner copiar mes anterior ────────────────────────
    async function checkCopyBanner() {
      const months = lastMonths(12);
      const idx = months.indexOf(selectedMonth);
      if (idx < 0 || idx >= months.length - 1) {
        document.getElementById("copy-banner").style.display = "none";
        return;
      }
      const prevMonth = months[idx + 1];
      const prevEnvelopes = await getEnvelopes(uid, prevMonth);
      if (prevEnvelopes.length && !envelopes.length) {
        document.getElementById("copy-banner-sub").textContent = `${prevEnvelopes.length} cajita(s) desde ${formatMonth(prevMonth)}`;
        document.getElementById("copy-banner").style.display = "flex";
        document.getElementById("btn-copy").onclick = () => copyFromMonth(prevEnvelopes, prevMonth);
      } else {
        document.getElementById("copy-banner").style.display = "none";
      }
    }

    async function copyFromMonth(prevEnvelopes, prevMonth) {
      document.getElementById("btn-copy").disabled = true;
      try {
        for (const env of prevEnvelopes) {
          const newId = `${uid}_${selectedMonth}_${env.name.replace(/\s+/g,"_")}`;
          await setEnvelope(uid, newId, {
            name: env.name,
            month: selectedMonth,
            budgeted: env.budgeted,
            actual: 0           // el valor actual siempre parte en 0 en el nuevo mes
          });
        }
        showToast("Cajitas copiadas.", "success");
        document.getElementById("copy-banner").style.display = "none";
        await loadEnvelopes();
      } catch (err) {
        showToast("Error al copiar.", "error");
      }
    }

    // ── Drawer: nuevo ─────────────────────────────────────
    document.getElementById("fab").addEventListener("click", openNewDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
    document.getElementById("btn-save").addEventListener("click", saveEnvelope);
    document.getElementById("field-budgeted").addEventListener("input", updateDrawerProgress);
    document.getElementById("field-actual").addEventListener("input", updateDrawerProgress);

    // Event delegation for envelope cards
    document.getElementById("envelopes-list").addEventListener("click", e => {
      const deleteBtn = e.target.closest(".btn-danger");
      const card      = e.target.closest(".envelope-card");
      if (deleteBtn) {
        const id = deleteBtn.dataset.id, name = deleteBtn.dataset.name;
        if (id) handleDelete(id, name);
      } else if (card) {
        const id = card.dataset.id;
        if (id) openEditDrawer(id);
      }
    });

    function openNewDrawer() {
      editingId = null;
      document.getElementById("drawer-title").textContent = "Nueva cajita";
      document.getElementById("field-name").value     = "";
      document.getElementById("field-budgeted").value = "";
      document.getElementById("field-actual").value   = "";
      document.getElementById("btn-save").textContent = "Guardar cajita";
      resetDrawerProgress();
      openDrawer();
    }

    // ── Drawer: editar ────────────────────────────────────
    function openEditDrawer(id) {
      const env = envelopes.find(e => e.id === id);
      if (!env) return;
      editingId = id;
      document.getElementById("drawer-title").textContent = "Editar cajita";
      document.getElementById("field-name").value     = env.name;
      document.getElementById("field-budgeted").value = env.budgeted;
      document.getElementById("field-actual").value   = env.actual;
      document.getElementById("btn-save").textContent = "Actualizar cajita";
      updateDrawerProgress();
      openDrawer();
    };

    // ── Mini progreso en el drawer ────────────────────────
    function updateDrawerProgress() {
      const budgeted = Number(document.getElementById("field-budgeted").value) || 0;
      const actual   = Number(document.getElementById("field-actual").value)   || 0;
      const wrap = document.getElementById("drawer-progress-wrap");

      if (!budgeted && !actual) { resetDrawerProgress(); return; }

      wrap.style.display = "block";
      const pct    = budgeted > 0 ? Math.min(actual / budgeted, 1) : 0;
      const pctN   = budgeted > 0 ? Math.round((actual / budgeted) * 100) : 0;
      const diff   = budgeted - actual;
      const barCls = pct >= 1 ? "over" : pct >= 0.8 ? "warn" : "";

      document.getElementById("dp-label").textContent = `${pctN}% completado`;
      document.getElementById("dp-diff").textContent  = diff >= 0
        ? `Faltan ${formatCOP(diff)}`
        : `${formatCOP(Math.abs(diff))} sobre la meta`;
      document.getElementById("dp-fill").style.width  = `${pct * 100}%`;
      document.getElementById("dp-fill").className    = `progress-fill ${barCls}`;
    };

    function resetDrawerProgress() {
      document.getElementById("drawer-progress-wrap").style.display = "none";
    }

    // ── Guardar ───────────────────────────────────────────
    async function saveEnvelope() {
      const name     = document.getElementById("field-name").value.trim();
      const budgeted = Number(document.getElementById("field-budgeted").value) || 0;
      const actual   = Number(document.getElementById("field-actual").value)   || 0;
      const btn      = document.getElementById("btn-save");

      if (!name) { showToast("Escribe un nombre para la cajita.", "error"); return; }
      if (!budgeted) { showToast("Ingresa una meta o presupuesto.", "error"); return; }

      // ID determinístico para poder hacer upsert fácil
      const docId = editingId || `${uid}_${selectedMonth}_${name.replace(/\s+/g,"_")}`;

      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        await setEnvelope(uid, docId, { name, month: selectedMonth, budgeted, actual });
        showToast(editingId ? "Cajita actualizada." : "Cajita creada.", "success");
        closeDrawer();
        await loadEnvelopes();
      } catch (err) {
        showToast("Error al guardar. Intenta de nuevo.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? "Actualizar cajita" : "Guardar cajita";
      }
    };

    // ── Eliminar ──────────────────────────────────────────
    async function handleDelete(id, name) {
      if (!confirm(`¿Eliminar la cajita "${name}"?`)) return;
      try {
        await deleteEnvelope(uid, id);
        showToast("Cajita eliminada.", "success");
        await loadEnvelopes();
      } catch (err) {
        showToast("Error al eliminar.", "error");
      }
    };

    // ── Drawer helpers ────────────────────────────────────
    function openDrawer() {
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
      setTimeout(() => document.getElementById("field-name").focus(), 320);
    }

    function closeDrawer() {
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawer();
    });
  </script>
</body>
</html>
