<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Movimientos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body { background: #f0f4f8; }
    body.dark { background: #111; }

    /* ── Header ──────────────────────────────────────────── */
    .mov-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 14px 0; max-width: 680px; margin: 0 auto;
    }
    .mov-title { font-size: 20px; font-weight: 500; color: var(--text); }
    .mov-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .month-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 0.5px solid #ddd;
      border-radius: 99px; padding: 6px 12px; flex-shrink: 0;
    }
    body.dark .month-pill { background: #1a1a1a; border-color: #333; }
    .m-arrow { font-size: 13px; color: #888; cursor: pointer; }
    .m-lbl { font-size: 12px; font-weight: 500; color: var(--text); min-width: 80px; text-align: center; }

    /* ── Tabs ────────────────────────────────────────────── */
    .main-tabs {
      display: flex; background: #e8edf2; border-radius: 10px;
      padding: 3px; margin: 12px 0 0 0;
    }
    body.dark .main-tabs { background: #222; }
    .main-tab {
      flex: 1; text-align: center; padding: 8px;
      font-size: 13px; font-weight: 500; border-radius: 8px;
      cursor: pointer; color: #888; transition: all 0.15s;
      user-select: none;
    }
    .main-tab.active { background: #fff; color: var(--text); }
    body.dark .main-tab.active { background: #1a1a1a; }

    /* ── Hero suma ───────────────────────────────────────── */
    .hero-sum {
      background: #0f3460; border-radius: 16px;
      padding: 16px 18px;
    }
    body.dark .hero-sum { background: #0a1f3d; }
    .sum-lbl { font-size: 10px; color: #7aa3cc; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .sum-amount { font-size: 28px; font-weight: 500; color: #fff; letter-spacing: -1px; margin-bottom: 6px; }
    .sum-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.12); border-radius: 99px;
      padding: 3px 10px; font-size: 11px; color: #7ab8e8;
    }

    /* ── Filtros ─────────────────────────────────────────── */
    .filters {
      display: flex; gap: 7px; overflow-x: auto;
      padding: 0 14px 12px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      max-width: 680px; margin: 0 auto;
    }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 5px 13px; border-radius: 99px;
      border: 0.5px solid #ddd; font-size: 12px; color: #888;
      cursor: pointer; background: #fff; white-space: nowrap;
      font-family: "DM Sans", sans-serif; transition: all 0.15s;
    }
    body.dark .chip { background: #1a1a1a; border-color: #333; color: #888; }
    .chip.active { background: #0f3460; border-color: #0f3460; color: #fff; }

    /* ── Listas ──────────────────────────────────────────── */
    .mov-body { padding: 0 14px 90px; max-width: 680px; margin: 0 auto; }
    .date-lbl {
      font-size: 10px; font-weight: 500; color: #888;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 0 6px;
    }
    .day-group {
      background: #fff; border-radius: 14px;
      margin-bottom: 10px; overflow: hidden;
    }
    body.dark .day-group { background: #1a1a1a; }
    .mov-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-bottom: 0.5px solid #f0f0f0;
      cursor: pointer; transition: background 0.1s;
    }
    body.dark .mov-item { border-bottom-color: #2a2a2a; }
    .mov-item:last-child { border-bottom: none; }
    .mov-item:hover { background: #fafafa; }
    body.dark .mov-item:hover { background: #222; }

    .mov-ico {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mov-info { flex: 1; min-width: 0; }
    .mov-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .mov-desc { font-size: 11px; color: #888; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mov-right { text-align: right; flex-shrink: 0; }
    .mov-amt { font-size: 14px; font-weight: 500; }
    .mov-amt.neg { color: #c0392b; }
    .mov-amt.pos { color: #3b6d11; }
    .mov-wallet { font-size: 10px; color: #aaa; margin-top: 2px; }
    .mov-del { background: none; border: none; color: #ddd; font-size: 14px; cursor: pointer; padding: 4px; flex-shrink: 0; transition: color 0.15s; }
    .mov-del:hover { color: #c0392b; }

    /* ── Devengado ───────────────────────────────────────── */
    .dev-card {
      background: #fff; border-radius: 14px; padding: 12px 14px;
      margin-bottom: 10px;
    }
    body.dark .dev-card { background: #1a1a1a; }
    .dev-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .dev-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .dev-amount { font-size: 14px; font-weight: 500; color: #185fa5; }
    .dev-bar { height: 4px; background: #e8edf2; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
    .dev-fill { height: 100%; background: #185fa5; border-radius: 99px; }
    .dev-sub { font-size: 10px; color: #888; }
    .dev-reg-btn {
      display: inline-block; margin-top: 8px; background: #0f3460;
      color: #fff; border: none; border-radius: 99px;
      padding: 5px 12px; font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: "DM Sans", sans-serif;
    }

    /* ── FAB ─────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 52px; height: 52px; background: #0f3460; color: #fff;
      border: none; border-radius: 50%; font-size: 24px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(15,52,96,0.3); z-index: 90;
      transition: transform 0.2s;
    }
    .fab:active { transform: scale(0.95); }
    .fab.income { background: #3b6d11; }

    /* ── Modal centrado ──────────────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(15,52,96,0.4);
      z-index: 150; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      background: #fff; border-radius: 16px;
      padding: 24px 20px 20px; width: 100%; max-width: 400px;
      z-index: 160; transform: scale(0.95); opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      max-height: 90vh; overflow-y: auto;
    }
    body.dark .drawer { background: #1a1a1a; }
    .drawer-overlay.open .drawer { transform: scale(1); opacity: 1; }
    .drawer-handle { display: none; }
    .drawer-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; color: #1a1a2e; }
    body.dark .drawer-title { color: #e8e8e8; }

    /* ── Modal header con X ──────────────────────────────── */
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-close-btn { background: none; border: none; cursor: pointer; color: #888; font-size: 20px; line-height:1; padding: 0; }

    /* ── Valor grande ────────────────────────────────────── */
    .valor-block { background: #f0f4f8; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    body.dark .valor-block { background: #222; }
    .valor-sym { font-size: 22px; color: #0f3460; font-weight: 500; }
    body.dark .valor-sym { color: #7ab8e8; }
    .valor-input { font-size: 32px; font-weight: 500; color: #0f3460; border: none; background: none; outline: none; flex: 1; min-width: 0; font-family: "DM Sans", sans-serif; width: 100%; }
    body.dark .valor-input { color: #7ab8e8; }
    .valor-input::placeholder { color: #c8d4e0; }

    /* ── Field styles ────────────────────────────────────── */
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .field-block { margin-bottom: 14px; }
    .field-lbl { font-size: 10px; font-weight: 500; color: #8a9ab0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .f-input, .f-select {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 13px; font-family: "DM Sans", sans-serif;
      color: #1a1a2e; background: #fff; outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s;
    }
    body.dark .f-input, body.dark .f-select { background: #222; border-color: #333; color: #e8e8e8; }
    .f-input:focus, .f-select:focus { border-color: #0f3460; }
    .f-desc {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 13px; font-family: "DM Sans", sans-serif;
      color: #1a1a2e; background: #fff; outline: none; resize: none; height: 70px;
    }
    body.dark .f-desc { background: #222; border-color: #333; color: #e8e8e8; }
    .f-desc::placeholder { color: #b0bec8; }
    .f-desc:focus { border-color: #0f3460; }
    .modal-save-btn {
      width: 100%; padding: 13px; background: #0f3460; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: "DM Sans", sans-serif; margin-top: 4px;
    }
    .modal-save-btn:hover { background: #1a4a7a; }
    .modal-save-btn.income { background: #3b6d11; }
    .modal-save-btn.income:hover { background: #2d540d; }



    /* ── Ingresos por fuente ─────────────────────────────── */
    .source-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 11px 0; border-bottom: 0.5px solid #f0f0f0; }
    body.dark .source-item { border-bottom-color: #2a2a2a; }
    .source-item:last-child { border-bottom: none; }
    .source-name { font-size: 14px; color: var(--text); }
    .source-sub { font-size: 11px; color: #888; margin-top: 2px; }
    .source-right { text-align: right; }
    .source-received { font-size: 15px; font-weight: 500; color: #3b6d11; }
    .source-budgeted { font-size: 10px; color: #888; margin-top: 1px; }
    .source-diff { font-size: 10px; margin-top: 1px; }
    .source-diff.pos { color: #3b6d11; }
    .source-diff.neg { color: #c0392b; }
    .type-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; margin-left: 6px; }
    .type-badge.fijo { background: rgba(74,127,181,0.12); color: #185fa5; }
    .type-badge.prop { background: rgba(74,127,181,0.12); color: #185fa5; }
    .type-badge.no_operacional { background: rgba(201,124,46,0.12); color: #854f0b; }
    .type-badge.extraordinario { background: rgba(212,96,138,0.10); color: #993556; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar" style="max-width:680px;margin:0 auto;padding:12px 14px 0;"></div>

  <div class="mov-header" style="align-items:center;">
    <div>
      <div class="mov-title">Movimientos</div>
      <div class="mov-sub">Gastos e ingresos del mes</div>
    </div>
    <div id="month-selector-container"></div>
  </div>

  <div style="max-width:680px;margin:0 auto;padding:0 14px;">
  <div class="main-tabs" style="margin-top:12px;margin-left:0;margin-right:0;">
    <div class="main-tab active" id="tab-gastos">Gastos</div>
    <div class="main-tab" id="tab-ingresos">Ingresos</div>
  </div>
  </div>

  <!-- Hero suma -->
  <div style="max-width:680px;margin:0 auto;padding:0 14px;">
  <div class="hero-sum" id="hero-sum" style="margin:12px 0;">
    <div class="sum-lbl">Cargando...</div>
  </div>
  </div>

  <!-- Filtros -->
  <div class="filters" id="item-filters" style="max-width:680px;margin:0 auto;">
    <div class="chip active" data-cat="">Todos</div>
  </div>

  <!-- Body -->
  <div class="mov-body">
    <div id="panel-gastos">
      <div id="prop-expenses-section" style="display:none;">
        <div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;padding:4px 0 8px;">Devengado del mes</div>
        <div id="prop-expenses-list"></div>
      </div>
      <div id="expenses-list">
        <div class="skeleton" style="height:200px;border-radius:14px;"></div>
      </div>
    </div>
    <div id="panel-ingresos" style="display:none;">
      <div id="devengado-section" style="display:none;">
        <div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;padding:4px 0 8px;">Devengado del mes</div>
        <div id="devengado-list"></div>
      </div>
      <div id="sources-section" style="display:none;">
        <div class="day-group" style="padding:4px 14px;margin-bottom:10px;">
          <div style="font-size:12px;font-weight:500;color:var(--text);padding:10px 0 4px;">Por fuente de ingreso</div>
          <div id="sources-list"></div>
        </div>
      </div>
      <div class="day-group" style="padding:4px 14px;">
        <div style="font-size:12px;font-weight:500;color:var(--text);padding:10px 0 4px;">Registros del mes</div>
        <div id="incomes-list">
          <div class="skeleton" style="height:160px;border-radius:10px;"></div>
        </div>
      </div>
    </div>
  </div>

  <button class="fab" id="fab">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Modal -->
  <div class="drawer-overlay" id="drawer-overlay">
    <div class="drawer" id="drawer">
      <div class="modal-hdr">
        <div class="drawer-title" id="drawer-title">Nuevo gasto</div>
        <button class="modal-close-btn" id="btn-modal-close">×</button>
      </div>

      <div class="field-lbl">Valor</div>
      <div class="valor-block">
        <span class="valor-sym">$</span>
        <input type="number" class="valor-input" id="field-amount" placeholder="0" min="0" inputmode="decimal"/>
      </div>

      <div class="field-row">
        <div>
          <div class="field-lbl">Fecha</div>
          <input type="date" class="f-input" id="field-date"/>
        </div>
        <div id="expense-category-group">
          <div class="field-lbl">Categoría</div>
          <select class="f-select" id="field-category">
            <option value="">Seleccionar...</option>
          </select>
        </div>
      </div>

      <div id="income-source-group" style="display:none;" class="field-block">
        <div class="field-lbl">Fuente de ingreso</div>
        <input type="text" class="f-input" id="field-source" placeholder="Ej: Guillo, Sociedad..." maxlength="60" list="sources-datalist"/>
        <datalist id="sources-datalist"></datalist>
      </div>

      <div class="field-block">
        <div class="field-lbl" id="wallet-label">¿De cuál cajita salió?</div>
        <select class="f-select" id="field-wallet">
          <option value="">Sin cajita asignada</option>
        </select>
      </div>

      <div class="field-block" id="savings-wallet-group" style="display:none;">
        <div class="field-lbl" id="savings-wallet-label">¿A cuál cajita va?</div>
        <select class="f-select" id="field-savings-wallet">
          <option value="">Sin cajita destino</option>
        </select>
      </div>

      <div class="field-block">
        <div class="field-lbl">Descripción (opcional)</div>
        <textarea class="f-desc" id="field-description" placeholder="Ej. Almuerzo con el equipo..."></textarea>
      </div>

      <button class="modal-save-btn" id="btn-save">Guardar movimiento</button>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import {
      addExpense, getExpenses, updateExpense, deleteExpense,
      addIncome, getIncomes, updateIncome, deleteIncome,
      getCategories, getWallets, getBudget,
      syncProportionalIncomes, getProportionalSummary,
      getProportionalExpensesSummary
    } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, showToast } from "../assets/ui.js?v=4";
    import { formatCOP, currentMonth, formatDate, formatMonth, today } from "../assets/utils.js";

    let uid, selectedMonth;
    let allExpenses=[], allIncomes=[], categories=[], wallets=[], budget=null;
    let propSummary=[], propExpenses=[];
    let editingId=null, activeFilter="", activeTab="gastos";

    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();
    renderTopbar(user);
    renderBottomNav("expenses");

    // Month selector manual (pill style)
    renderMonthPill();

    [categories, wallets] = await Promise.all([getCategories(uid), getWallets(uid)]);
    populateCategorySelect();
    populateWalletSelect();
    populateSavingsWalletSelect("");

    // ── Cat color map ─────────────────────────────────────
    const CAT_COLORS = {
      "GASTO BÁSICO":       ["#e6f1fb","#185fa5"],
      "GASTO NO ESENCIAL":  ["#faeeda","#854f0b"],
      "AHORRO O INVERSIÓN": ["#eaf3de","#3b6d11"],
    };
    function getCatStyle(catName) {
      const cat = categories.find(c=>c.name===catName);
      return CAT_COLORS[cat?.type] || ["#f0f4f8","#888"];
    }

    await loadAll();

    function renderMonthPill() {
      const today2   = new Date();
      const dayOfMonth = today2.getDate();
      const daysInMonth2 = new Date(today2.getFullYear(), today2.getMonth()+1, 0).getDate();
      const canNext  = (daysInMonth2 - dayOfMonth) < 10;
      const [cy, cm] = selectedMonth.split("-").map(Number);
      const maxY = canNext ? (cm===12?cy+1:cy) : cy;
      const maxM = canNext ? (cm===12?1:cm+1) : cm;

      const container = document.getElementById("month-selector-container");
      container.innerHTML = `
        <div style="display:inline-flex;align-items:center;gap:12px;background:#fff;border:0.5px solid #ddd;border-radius:99px;padding:8px 16px;">
          <span style="font-size:16px;color:#888;cursor:pointer;line-height:1;font-weight:300;" id="mp-prev">‹</span>
          <span style="font-size:14px;font-weight:500;color:#1a1a2e;min-width:120px;text-align:center;" id="mp-lbl">${formatMonth(selectedMonth)}</span>
          <span style="font-size:16px;color:#888;cursor:pointer;line-height:1;font-weight:300;" id="mp-next">›</span>
        </div>`;

      document.getElementById("mp-prev").addEventListener("click", () => {
        const [y,m] = selectedMonth.split("-").map(Number);
        const pm = m===1?12:m-1, py = m===1?y-1:y;
        selectedMonth = `${py}-${String(pm).padStart(2,"0")}`;
        document.getElementById("mp-lbl").textContent = formatMonth(selectedMonth);
        document.getElementById("mp-next").style.opacity = "1";
        activeFilter=""; loadAll();
      });
      document.getElementById("mp-next").addEventListener("click", () => {
        const [y,m] = selectedMonth.split("-").map(Number);
        if (y===maxY && m===maxM) return;
        const nm = m===12?1:m+1, ny = m===12?y+1:y;
        selectedMonth = `${ny}-${String(nm).padStart(2,"0")}`;
        document.getElementById("mp-lbl").textContent = formatMonth(selectedMonth);
        loadAll();
      });
    }

    // Tabs
    document.getElementById("tab-gastos").addEventListener("click", () => switchTab("gastos"));
    document.getElementById("tab-ingresos").addEventListener("click", () => switchTab("ingresos"));

    function switchTab(tab) {
      activeTab=tab; activeFilter="";
      const btn = document.getElementById("btn-save");
      if (btn) btn.className = tab==="ingresos" ? "modal-save-btn income" : "modal-save-btn";
      const isG = tab==="gastos";
      document.getElementById("tab-gastos").classList.toggle("active", isG);
      document.getElementById("tab-ingresos").classList.toggle("active", !isG);
      document.getElementById("panel-gastos").style.display   = isG?"block":"none";
      document.getElementById("panel-ingresos").style.display = isG?"none":"block";
      document.getElementById("fab").classList.toggle("income", !isG);
      document.getElementById("wallet-label").textContent = isG?"¿De cuál cajita salió?":"¿A cuál cajita entró?";
      if (isG) { renderHeroSum(); renderFilters(); renderPropExpenses(); renderExpenses(); }
      else      { renderHeroSum(); renderFilters(); renderDevengado(); renderSources(); renderIncomes(); }
    }

    async function loadAll() {
      await syncProportionalIncomes(uid, selectedMonth);
      const [exp, inc, bud, prop] = await Promise.all([
        getExpenses(uid, {month: selectedMonth}),
        getIncomes(uid,  {month: selectedMonth}),
        getBudget(uid, selectedMonth),
        getProportionalSummary(uid, selectedMonth)
      ]);
      allExpenses=exp; allIncomes=inc; budget=bud; propSummary=prop;
      propExpenses = await getProportionalExpensesSummary(uid, selectedMonth, allExpenses);
      renderHeroSum();
      renderFilters();
      if (activeTab==="gastos") { renderPropExpenses(); renderExpenses(); }
      else { renderDevengado(); renderSources(); renderIncomes(); }
    }

    // ── Hero suma ─────────────────────────────────────────
    function renderHeroSum() {
      const isG = activeTab==="gastos";
      const items = isG ? allExpenses : allIncomes.filter(i=>!i.isProportional);
      const filtered = activeFilter ? items.filter(i=>(isG?i.category:i.source)===activeFilter) : items;
      const total = filtered.reduce((s,i)=>s+Number(i.amount),0);
      const count = filtered.length;
      document.getElementById("hero-sum").innerHTML = `
        <div class="sum-lbl">${isG?"Total gastado":"Total recibido"}</div>
        <div class="sum-amount">${formatCOP(total)}</div>
        <div class="sum-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#7ab8e8" stroke-width="2.5" stroke-linecap="round">
            ${isG ? '<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>'
                  : '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>'}
          </svg>
          ${count} registro${count!==1?"s":""} este mes
        </div>`;
    }

    // ── Filtros ───────────────────────────────────────────
    function renderFilters() {
      const isG    = activeTab==="gastos";
      const names  = isG
        ? [...new Set(allExpenses.map(e=>e.category).filter(Boolean))]
        : [...new Set(allIncomes.filter(i=>!i.isProportional).map(i=>i.source).filter(Boolean))];
      const el = document.getElementById("item-filters");
      el.innerHTML = `<div class="chip active" data-cat="">Todos</div>` +
        names.map(n=>`<div class="chip" data-cat="${n}">${n}</div>`).join("");
      el.onclick = e => {
        const chip = e.target.closest(".chip");
        if (!chip) return;
        el.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
        activeFilter = chip.dataset.cat;
        renderHeroSum();
        if (activeTab==="gastos") renderExpenses();
        else renderIncomes();
      };
    }

    // ── Render gastos ─────────────────────────────────────
    function renderExpenses() {
      const el = document.getElementById("expenses-list");
      const filtered = activeFilter ? allExpenses.filter(e=>e.category===activeFilter) : allExpenses;
      if (!filtered.length) {
        el.innerHTML=`<div class="empty-state"><p>No hay gastos${activeFilter?" en esta categoría":""} este mes.</p></div>`; return;
      }
      const groups = filtered.reduce((acc,e)=>{(acc[e.date]=acc[e.date]||[]).push(e);return acc;},{});
      el.innerHTML = Object.keys(groups).sort().reverse().map(date=>`
        <div class="date-lbl">${formatDate(date)}</div>
        <div class="day-group">
          ${groups[date].map(e=>{
            const [bg,stroke] = getCatStyle(e.category);
            return `
              <div class="mov-item" data-id="${e.id}">
                <div class="mov-ico" style="background:${bg};">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                </div>
                <div class="mov-info">
                  <div class="mov-name">${e.category}</div>
                  ${e.description?`<div class="mov-desc">${e.description}</div>`:""}
                </div>
                <div class="mov-right">
                  <div class="mov-amt neg">-${formatCOP(e.amount)}</div>
                  ${e.walletName?`<div class="mov-wallet">← ${e.walletName}${e.toWalletName?" → "+e.toWalletName:""}</div>`:""}
                </div>
                <button class="mov-del" data-del="${e.id}">✕</button>
              </div>`;
          }).join("")}
        </div>`).join("");

      el.onclick = e => {
        const del = e.target.closest("[data-del]");
        const row = e.target.closest(".mov-item");
        if (del) handleDeleteExpense(del.dataset.del);
        else if (row && !e.target.closest("button")) openEditExpenseDrawer(row.dataset.id);
      };
    }

    // ── Prop expenses ─────────────────────────────────────
    function renderPropExpenses() {
      const section = document.getElementById("prop-expenses-section");
      const list    = document.getElementById("prop-expenses-list");
      if (!propExpenses.length) { section.style.display="none"; return; }
      section.style.display="block";
      list.innerHTML = propExpenses.map(s=>`
        <div class="dev-card">
          <div class="dev-hdr">
            <span class="dev-name">${s.name}</span>
            <span class="dev-amount">${formatCOP(s.accrued)}</span>
          </div>
          <div class="dev-bar"><div class="dev-fill" style="width:${Math.min(s.pct,1)*100}%;background:${Math.min(s.pct,1)>=1?'#c0392b':Math.min(s.pct,1)>=0.8?'#e0a050':'#0f3460'};"></div></div>
          <div class="dev-sub">${Math.round(Math.min(s.pct,1)*100)}% · ${s.daysPassed}/${s.daysInMonth} días · ${formatCOP(s.dailyAmount)}/día · de ${formatCOP(s.amount)}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
              ${s.pending > 0
                ? `<span style="font-size:11px;color:#888;">Pendiente: <strong style="color:#1a1a2e;">${formatCOP(s.pending)}</strong></span>
                   <button class="dev-reg-btn" data-cat="${s.name}" data-amount="${s.pending}" style="padding:6px 14px;font-size:11px;border-radius:8px;">+ Registrar</button>`
                : `<span style="font-size:11px;color:#3b6d11;font-weight:500;">✓ Registrado completo</span>`
              }
            </div>
        </div>`).join("");

      list.onclick = e => {
        const btn = e.target.closest(".dev-reg-btn");
        if (!btn) return;
        editingId=null;
        document.getElementById("drawer-title").textContent="Registrar gasto";
        document.getElementById("btn-save").textContent="Guardar gasto";
        document.getElementById("field-date").value=today();
        document.getElementById("field-category").value=btn.dataset.cat;
        document.getElementById("field-amount").value=btn.dataset.amount;
        document.getElementById("field-wallet").value="";
        document.getElementById("field-description").value=`${btn.dataset.cat} - proporcional ${selectedMonth}`;
        document.getElementById("expense-category-group").style.display="block";
        document.getElementById("income-source-group").style.display="none";
        const cat=categories.find(c=>c.name===btn.dataset.cat);
        const isSav=cat?.type==="AHORRO O INVERSIÓN";
        document.getElementById("savings-wallet-group").style.display=isSav?"block":"none";
        document.getElementById("field-savings-wallet").value="";
        openDrawer();
      };
    }

    // ── Devengado ingresos ────────────────────────────────
    function renderDevengado() {
      const section=document.getElementById("devengado-section");
      const list=document.getElementById("devengado-list");
      if (!propSummary.length){section.style.display="none";return;}
      section.style.display="block";
      list.innerHTML=propSummary.map(s=>`
        <div class="dev-card">
          <div class="dev-hdr">
            <span class="dev-name">${s.name}</span>
            <span class="dev-amount">${formatCOP(s.accruedAmount)}</span>
          </div>
          <div class="dev-bar"><div class="dev-fill" style="width:${Math.min(s.pct,1)*100}%;"></div></div>
          <div class="dev-sub">${s.daysPassed}/${s.daysInMonth} días · ${formatCOP(s.dailyAmount)}/día · de ${formatCOP(s.totalAmount)}</div>
        </div>`).join("");
    }

    // ── Sources ───────────────────────────────────────────
    function renderSources() {
      const section=document.getElementById("sources-section");
      const listEl=document.getElementById("sources-list");
      function normalizeIncome(income) {
        if (!income||typeof income!=="object") return [];
        if (Array.isArray(income)) return income.filter(i=>i&&i.name&&Number(i.amount)>0);
        return Object.entries(income)
          .filter(([k,v])=>isNaN(Number(k))&&!["month","updatedAt"].includes(k))
          .map(([name,val])=>typeof val==="object"?{name,...val}:typeof val==="number"?{name,amount:val,type:"fijo",proportional:false}:null)
          .filter(i=>i&&Number(i.amount)>0);
      }
      const incomeArr=normalizeIncome(budget?.income);
      if (!incomeArr.length){section.style.display="none";return;}
      section.style.display="block";
      const propMap={};
      propSummary.forEach(p=>{propMap[p.name]=p;});
      const realBySource=allIncomes.filter(i=>!i.isProportional)
        .reduce((acc,i)=>{acc[i.source]=(acc[i.source]||0)+Number(i.amount);return acc;},{});
      const typeLabels={fijo:"Fijo",no_operacional:"No operacional",extraordinario:"Extraordinario"};
      listEl.innerHTML=incomeArr.map(inc=>{
        const prop=propMap[inc.name];
        const received=inc.proportional&&prop?prop.accruedAmount:(realBySource[inc.name]||0);
        const budgeted=Number(inc.amount||0);
        const diff=received-budgeted;
        const diffCls=diff>0?"pos":"neg";
        const diffLabel=diff>0?`+${formatCOP(Math.abs(diff))} extra`:diff<0?`-${formatCOP(Math.abs(diff))} pendiente`:"Completo ✓";
        const typeLabel=inc.proportional?(typeLabels[inc.type]||inc.type)+" · Prop.":(typeLabels[inc.type]||inc.type);
        return `
          <div class="source-item">
            <div>
              <div class="source-name">${inc.name}<span class="type-badge ${inc.proportional?"prop":inc.type}">${typeLabel}</span></div>
              ${prop?`<div class="source-sub">${formatCOP(prop.dailyAmount)}/día · ${prop.daysPassed}/${prop.daysInMonth} días</div>`:""}
            </div>
            <div class="source-right">
              <div class="source-received">${formatCOP(received)}</div>
              ${budgeted>0?`<div class="source-budgeted">de ${formatCOP(budgeted)}</div>`:""}
              ${budgeted>0?`<div class="source-diff ${diffCls}">${diffLabel}</div>`:""}
            </div>
          </div>`;
      }).join("");
    }

    // ── Render ingresos ───────────────────────────────────
    function renderIncomes() {
      const el=document.getElementById("incomes-list");
      const manual=allIncomes.filter(i=>!i.isProportional);
      const filtered=activeFilter?manual.filter(i=>i.source===activeFilter):manual;
      if (!filtered.length){el.innerHTML=`<div class="empty-state"><p>No hay ingresos registrados este mes.</p></div>`;return;}
      const groups=filtered.reduce((acc,i)=>{(acc[i.date]=acc[i.date]||[]).push(i);return acc;},{});
      el.innerHTML=Object.keys(groups).sort().reverse().map(date=>`
        <div class="date-lbl" style="padding:8px 0 4px;">${formatDate(date)}</div>
        ${groups[date].map(i=>`
          <div class="mov-item">
            <div class="mov-ico" style="background:#eaf3de;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="1.5" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            </div>
            <div class="mov-info">
              <div class="mov-name">${i.source}</div>
              ${i.description?`<div class="mov-desc">${i.description}</div>`:""}
            </div>
            <div class="mov-right">
              <div class="mov-amt pos">+${formatCOP(i.amount)}</div>
              ${i.walletName?`<div class="mov-wallet">→ ${i.walletName}</div>`:""}
            </div>
            <button class="mov-del" data-del-inc="${i.id}">✕</button>
          </div>`).join("")}`).join("");

      el.onclick = e => {
        const del=e.target.closest("[data-del-inc]");
        if (del) handleDeleteIncome(del.dataset.delInc);
      };
    }

    // ── FAB ───────────────────────────────────────────────
    document.getElementById("fab").addEventListener("click", openNewDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("drawer-overlay")) closeDrawer();
    });
    document.getElementById("btn-modal-close").addEventListener("click", closeDrawer);
    document.getElementById("btn-save").addEventListener("click", saveItem);
    document.addEventListener("keydown", e=>{if(e.key==="Escape")closeDrawer();});

    function openNewDrawer() {
      editingId=null;
      const isG=activeTab==="gastos";
      document.getElementById("drawer-title").textContent=isG?"Nuevo gasto":"Nuevo ingreso";
      document.getElementById("btn-save").textContent=isG?"Guardar gasto":"Registrar ingreso";
      document.getElementById("field-date").value=today();
      document.getElementById("field-category").value="";
      document.getElementById("field-source").value="";
      document.getElementById("field-amount").value="";
      document.getElementById("field-wallet").value="";
      document.getElementById("field-savings-wallet").value="";
      document.getElementById("field-description").value="";
      document.getElementById("expense-category-group").style.display=isG?"block":"none";
      document.getElementById("income-source-group").style.display=isG?"none":"block";
      document.getElementById("savings-wallet-group").style.display="none";
      document.getElementById("wallet-label").textContent=isG?"¿De cuál cajita salió?":"¿A cuál cajita entró?";
      populateSourcesSuggestions();
      openDrawer();
    }

    function openEditExpenseDrawer(id) {
      const e=allExpenses.find(x=>x.id===id);
      if (!e) return;
      editingId=id;
      const cat=categories.find(c=>c.name===e.category);
      const isSav=cat?.type==="AHORRO O INVERSIÓN"||!!e.toWalletId;
      document.getElementById("drawer-title").textContent="Editar gasto";
      document.getElementById("btn-save").textContent="Actualizar gasto";
      document.getElementById("field-date").value=e.date;
      document.getElementById("field-category").value=e.category;
      document.getElementById("field-amount").value=e.amount;
      document.getElementById("field-wallet").value=e.walletId||"";
      document.getElementById("field-savings-wallet").value=e.toWalletId||"";
      document.getElementById("field-description").value=e.description||"";
      document.getElementById("expense-category-group").style.display="block";
      document.getElementById("income-source-group").style.display="none";
      document.getElementById("savings-wallet-group").style.display=isSav?"block":"none";
      document.getElementById("wallet-label").textContent="¿De cuál cajita salió?";
      if (isSav) populateSavingsWalletSelect(cat?.type||"");
      openDrawer();
    }

    document.getElementById("field-category").addEventListener("change", e=>{
      const catName=e.target.value;
      const cat=categories.find(c=>c.name===catName);
      const isAhorro=cat?.type==="AHORRO O INVERSIÓN";
      const isDeuda=catName.toLowerCase().includes("deuda")||catName.toLowerCase().includes("tarjeta")||catName.toLowerCase().includes("pago")||catName.toLowerCase().includes("credito");
      const show=isAhorro||isDeuda;
      document.getElementById("savings-wallet-group").style.display=show?"block":"none";
      if (!show) document.getElementById("field-savings-wallet").value="";
      else populateSavingsWalletSelect(cat?.type||"");
    });

    function openDrawer(){
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
    }
    function closeDrawer(){
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    }

    async function saveItem() {
      const isG=activeTab==="gastos"||document.getElementById("expense-category-group").style.display!=="none";
      const date=document.getElementById("field-date").value;
      const amount=Number(document.getElementById("field-amount").value);
      const walletId=document.getElementById("field-wallet").value;
      const walletOpt=document.querySelector(`#field-wallet option[value="${walletId}"]`);
      const walletName=walletOpt?.dataset.name||"";
      const walletType=walletOpt?.dataset.type||"ahorro";
      const desc=document.getElementById("field-description").value.trim();
      const btn=document.getElementById("btn-save");
      if (!date||!amount){showToast("Completa fecha y valor.","error");return;}
      btn.disabled=true; btn.textContent="Guardando...";
      try {
        if (isG) {
          const category=document.getElementById("field-category").value;
          const toWalletId=document.getElementById("field-savings-wallet").value;
          const toWalletOpt=document.querySelector(`#field-savings-wallet option[value="${toWalletId}"]`);
          const toWalletName=toWalletOpt?.dataset.name||"";
          if (!category){showToast("Selecciona una categoría.","error");btn.disabled=false;btn.textContent=editingId?"Actualizar gasto":"Guardar gasto";return;}
          const data={date,category,amount,description:desc,walletId,walletName,walletType,toWalletId,toWalletName};
          if (editingId){const old=allExpenses.find(x=>x.id===editingId);await updateExpense(uid,editingId,old,data);showToast("Gasto actualizado.","success");}
          else{await addExpense(uid,data);showToast("Gasto registrado.","success");}
        } else {
          const source=document.getElementById("field-source").value.trim();
          if (!source){showToast("Escribe la fuente.","error");btn.disabled=false;btn.textContent="Registrar ingreso";return;}
          await addIncome(uid,{date,source,amount,description:desc,walletId,walletName});
          showToast("Ingreso registrado.","success");
        }
        wallets=await getWallets(uid); populateWalletSelect(); populateSavingsWalletSelect("");
        closeDrawer(); await loadAll();
      } catch(err){showToast("Error al guardar.","error");console.error(err);}
      finally{btn.disabled=false;btn.textContent=isG?(editingId?"Actualizar gasto":"Guardar gasto"):"Registrar ingreso";}
    }

    async function handleDeleteExpense(id) {
      if (!confirm("¿Eliminar este gasto?")) return;
      try{const e=allExpenses.find(x=>x.id===id);await deleteExpense(uid,id,e);showToast("Eliminado.","success");wallets=await getWallets(uid);populateWalletSelect();await loadAll();}
      catch(err){showToast("Error.","error");}
    }
    async function handleDeleteIncome(id) {
      if (!confirm("¿Eliminar este ingreso?")) return;
      try{const i=allIncomes.find(x=>x.id===id);await deleteIncome(uid,id,i);showToast("Eliminado.","success");wallets=await getWallets(uid);populateWalletSelect();await loadAll();}
      catch(err){showToast("Error.","error");}
    }

    function populateCategorySelect() {
      const sel=document.getElementById("field-category");
      const def=`<option value="">Selecciona una categoría</option>`;
      if (!categories.length){sel.innerHTML=def+`<option value="Otro">Otro</option>`;return;}
      const grouped=categories.reduce((acc,c)=>{(acc[c.type]=acc[c.type]||[]).push(c.name);return acc;},{});
      sel.innerHTML=def+Object.entries(grouped).map(([type,names])=>
        `<optgroup label="${type}">${names.map(n=>`<option value="${n}">${n}</option>`).join("")}</optgroup>`
      ).join("");
    }
    function populateWalletSelect() {
      const sel=document.getElementById("field-wallet");
      sel.innerHTML=`<option value="">Sin cajita asignada</option>`+
        wallets.map(w=>`<option value="${w.id}" data-name="${w.name}" data-type="${w.type||'ahorro'}">${w.icon||"🏦"} ${w.name}</option>`).join("");
    }
    function populateSavingsWalletSelect(catType) {
      const sel=document.getElementById("field-savings-wallet");
      const labelEl=document.getElementById("savings-wallet-label");
      const normal=wallets.filter(w=>w.type!=="credito");
      const credit=wallets.filter(w=>w.type==="credito");
      let opts=`<option value="">Sin cajita destino</option>`;
      if (normal.length) opts+=`<optgroup label="Ahorro / Efectivo">`+normal.map(w=>`<option value="${w.id}" data-name="${w.name}" data-type="${w.type||'ahorro'}">${w.icon||"🏦"} ${w.name}</option>`).join("")+`</optgroup>`;
      if (credit.length) opts+=`<optgroup label="Tarjetas de crédito">`+credit.map(w=>`<option value="${w.id}" data-name="${w.name}" data-type="credito">${w.icon||"💳"} ${w.name}</option>`).join("")+`</optgroup>`;
      sel.innerHTML=opts;
      if (labelEl) labelEl.innerHTML=catType==="AHORRO O INVERSIÓN"?'¿A cuál cajita de ahorro va? <span style="color:#888;font-weight:300;">(opcional)</span>':'¿A cuál cajita va el pago? <span style="color:#888;font-weight:300;">(opcional)</span>';
    }
    function populateSourcesSuggestions() {
      const sources=[...new Set([...allIncomes.map(i=>i.source),...Object.keys(budget?.income||{}).filter(k=>isNaN(Number(k)))])];
      document.getElementById("sources-datalist").innerHTML=sources.map(s=>`<option value="${s}">`).join("");
    }
  </script>
</body>
</html>
