<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Gastos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── FAB - botón flotante agregar ───────────────────── */
    .fab {
      position: fixed;
      bottom: 76px;
      right: 20px;
      width: 54px; height: 54px;
      background: var(--accent);
      color: #fdf6f0;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(212,96,138,0.25);
      z-index: 90;
      transition: background 0.2s, transform 0.2s;
    }
    .fab:hover  { background: var(--accent2); }
    .fab:active { transform: scale(0.95); }

    /* ── Modal drawer ────────────────────────────────────── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px;
      z-index: 160;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-width: 680px;
      margin: 0 auto;
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border2);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .drawer-title {
      font-family: "DM Serif Display", serif;
      font-size: 20px; font-weight: 400;
      margin-bottom: 20px;
    }

    /* ── Lista de gastos ─────────────────────────────────── */
    .expense-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .expense-item:last-child { border-bottom: none; }

    .expense-left { flex: 1; min-width: 0; cursor: pointer; }
    .expense-cat  { font-size: 14px; color: var(--text); }
    .expense-desc { font-size: 12px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-date-label { font-size: 11px; color: var(--muted2); margin-top: 2px; }

    .expense-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 10px; }
    .expense-amount { font-family: "DM Serif Display", serif; font-size: 16px; color: var(--warning); letter-spacing: -0.3px; }

    /* ── Agrupación por fecha ────────────────────────────── */
    .date-group { margin-bottom: 4px; }
    .date-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 14px 0 6px;
    }

    /* ── Filtros ─────────────────────────────────────────── */
    .filters {
      display: flex; gap: 8px;
      overflow-x: auto; overflow-y: visible;
      padding-bottom: 8px; margin-bottom: 16px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      cursor: grab;
      user-select: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      font-size: 12px; font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      background: none;
      font-family: "DM Sans", sans-serif;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .filter-chip.active {
      background: rgba(212,96,138,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Resumen de totales ──────────────────────────────── */
    .total-banner {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .total-banner .label { font-size: 12px; color: var(--muted); }
    .total-banner .value {
      font-family: "DM Serif Display", serif;
      font-size: 22px; color: var(--warning);
      letter-spacing: -0.5px;
    }
    .total-count { font-size: 12px; color: var(--muted); text-align: right; }

    /* ── Row amount input con símbolo ────────────────────── */
    .amount-wrapper { position: relative; }
    .amount-wrapper .currency-symbol {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; color: var(--muted);
      pointer-events: none;
    }
    .amount-wrapper .form-input { padding-left: 30px; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <div id="month-selector-container"></div>
    </div>

    <!-- Totales del mes -->
    <div id="total-banner" class="total-banner">
      <div>
        <div class="label">Total gastado</div>
        <div class="value" id="total-amount">$ 0</div>
      </div>
      <div class="total-count" id="total-count">0 registros</div>
    </div>

    <!-- Filtros por categoría -->
    <div class="filters" id="category-filters">
      <button class="filter-chip active" data-cat="">Todos</button>
    </div>

    <!-- Lista de gastos agrupados por fecha -->
    <div id="expenses-list">
      <div class="skeleton" style="height:200px;border-radius:14px;"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" title="Agregar gasto">+</button>

  <!-- Nav inferior -->
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Drawer: agregar / editar gasto -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="drawer-title">Nuevo gasto</div>

    <div class="form-group">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-input" id="field-date"/>
    </div>

    <div class="form-group">
      <label class="form-label">Categoría</label>
      <select class="form-select" id="field-category">
        <option value="">Selecciona una categoría</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Valor</label>
      <div class="amount-wrapper">
        <span class="currency-symbol">$</span>
        <input type="number" class="form-input" id="field-amount" placeholder="0" min="0"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">¿De cuál cajita salió?</label>
      <select class="form-select" id="field-wallet">
        <option value="">Sin cajita asignada</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Descripción <span style="color:var(--muted);font-weight:300;">(opcional)</span></label>
      <input type="text" class="form-input" id="field-description" placeholder="Ej: Alimento + arena" maxlength="120"/>
    </div>

    <button class="btn-primary" id="btn-save">Guardar gasto</button>
  </div>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { addExpense, getExpenses, updateExpense, deleteExpense, getCategories, getWallets } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, renderMonthSelector, showToast } from "../assets/ui.js";
    import { formatCOP, parseCOP, currentMonth, formatDate, today } from "../assets/utils.js";

    let uid, selectedMonth, allExpenses = [], categories = [], wallets = [], editingId = null, activeFilter = "";

    // ── Init ─────────────────────────────────────────────
    const user = await requireAuth();
    uid = user.uid;
    selectedMonth = currentMonth();

    renderTopbar(user);
    renderBottomNav("expenses");
    renderMonthSelector("month-selector-container", selectedMonth, (m) => {
      selectedMonth = m;
      loadExpenses();
    });

    categories = await getCategories(uid);
    wallets    = await getWallets(uid);
    populateCategorySelect();
    populateWalletSelect();
    populateCategoryFilters();

    await loadExpenses();

    // ── Event listeners estáticos ─────────────────────────
    document.getElementById("fab").addEventListener("click", openNewDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
    document.getElementById("btn-save").addEventListener("click", saveExpense);

    // Event delegation para lista de gastos (items dinámicos)
    document.getElementById("expenses-list").addEventListener("click", e => {
      const deleteBtn = e.target.closest(".btn-danger");
      const editRow   = e.target.closest(".expense-left");
      if (deleteBtn) {
        const id = deleteBtn.dataset.id;
        if (id) handleDelete(id);
      } else if (editRow) {
        const id = editRow.dataset.id;
        if (id) openEditDrawer(id);
      }
    });


    // ── Drag to scroll en filtros (mouse) ────────────────
    const filtersEl = document.getElementById("category-filters");
    let isDragging = false, startX, scrollLeft;
    filtersEl.addEventListener("mousedown", e => {
      isDragging = true;
      filtersEl.style.cursor = "grabbing";
      startX = e.pageX - filtersEl.offsetLeft;
      scrollLeft = filtersEl.scrollLeft;
    });
    filtersEl.addEventListener("mouseleave", () => {
      isDragging = false;
      filtersEl.style.cursor = "grab";
    });
    filtersEl.addEventListener("mouseup", () => {
      isDragging = false;
      filtersEl.style.cursor = "grab";
    });
    filtersEl.addEventListener("mousemove", e => {
      if (!isDragging) return;
      e.preventDefault();
      const x = e.pageX - filtersEl.offsetLeft;
      filtersEl.scrollLeft = scrollLeft - (x - startX);
    });

    // Event delegation para filtros de categoría
    document.getElementById("category-filters").addEventListener("click", e => {
      const chip = e.target.closest(".filter-chip");
      if (chip) setFilter(chip, chip.dataset.cat);
    });

    // ── Cargar gastos ─────────────────────────────────────
    async function loadExpenses() {
      document.getElementById("expenses-list").innerHTML =
        `<div class="skeleton" style="height:200px;border-radius:14px;"></div>`;

      allExpenses = await getExpenses(uid, { month: selectedMonth });
      renderAll();
    }

    // ── Render con filtro activo ──────────────────────────

    function renderAll() {
      const filtered = activeFilter
        ? allExpenses.filter(e => e.category === activeFilter)
        : allExpenses;

      // Totales
      const total = filtered.reduce((s, e) => s + Number(e.amount), 0);
      document.getElementById("total-amount").textContent = formatCOP(total);
      document.getElementById("total-count").textContent = `${filtered.length} registro${filtered.length !== 1 ? "s" : ""}`;

      if (!filtered.length) {
        document.getElementById("expenses-list").innerHTML =
          `<div class="empty-state"><p>No hay gastos${activeFilter ? " en esta categoría" : " este mes"}.</p></div>`;
        return;
      }

      // Agrupar por fecha
      const groups = filtered.reduce((acc, e) => {
        (acc[e.date] = acc[e.date] || []).push(e);
        return acc;
      }, {});

      const sortedDates = Object.keys(groups).sort().reverse();

      document.getElementById("expenses-list").innerHTML = sortedDates.map(date => `
        <div class="date-group">
          <div class="date-label">${formatDate(date)}</div>
          ${groups[date].map(e => `
            <div class="expense-item">
              <div class="expense-left" data-id="${e.id}">
                <div class="expense-cat">${e.category}</div>
                ${e.description ? `<div class="expense-desc">${e.description}</div>` : ""}
              </div>
              <div class="expense-right">
                <div class="expense-amount">${formatCOP(e.amount)}</div>
                <button class="btn-danger" data-id="${e.id}">✕</button>
              </div>
            </div>`).join("")}
        </div>`).join("");
    }

    // ── Filtros por categoría ─────────────────────────────
    function populateCategoryFilters() {
      const container = document.getElementById("category-filters");
      const usedCats = [...new Set(allExpenses.map(e => e.category))];
      const cats = categories.length ? categories.map(c => c.name) : usedCats;

      container.innerHTML =
        `<button class="filter-chip active" data-cat="">Todos</button>` +
        cats.map(c => `<button class="filter-chip" data-cat="${c}">${c}</button>`).join("");
    }

    function setFilter(btn, cat) {
      document.querySelectorAll(".filter-chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = cat;
      renderAll();
    };

    // ── Populate select de cajitas ───────────────────────────
    function populateWalletSelect() {
      const sel = document.getElementById("field-wallet");
      sel.innerHTML = `<option value="">Sin cajita asignada</option>` +
        wallets.map(w => `<option value="${w.id}" data-name="${w.name}">${w.icon || "🏦"} ${w.name}</option>`).join("");
    }

    // ── Populate select de categorías ─────────────────────
    function populateCategorySelect() {
      const sel = document.getElementById("field-category");
      const defaultOpt = `<option value="">Selecciona una categoría</option>`;
      if (!categories.length) {
        sel.innerHTML = defaultOpt + `<option value="Otro">Otro</option>`;
        return;
      }
      const grouped = categories.reduce((acc, c) => {
        (acc[c.type] = acc[c.type] || []).push(c.name);
        return acc;
      }, {});
      sel.innerHTML = defaultOpt + Object.entries(grouped).map(([type, names]) => `
        <optgroup label="${type}">
          ${names.map(n => `<option value="${n}">${n}</option>`).join("")}
        </optgroup>`).join("");
    }

    // ── Drawer: abrir para nuevo gasto ────────────────────
    function openNewDrawer() {
      editingId = null;
      document.getElementById("drawer-title").textContent = "Nuevo gasto";
      document.getElementById("field-date").value = today();
      document.getElementById("field-category").value = "";
      document.getElementById("field-amount").value = "";
      document.getElementById("field-wallet").value      = "";
      document.getElementById("field-description").value = "";
      document.getElementById("btn-save").textContent = "Guardar gasto";
      openDrawer();
    }

    function openEditDrawer(id) {
      const e = allExpenses.find(x => x.id === id);
      if (!e) return;
      editingId = id;
      document.getElementById("drawer-title").textContent = "Editar gasto";
      document.getElementById("field-date").value = e.date;
      document.getElementById("field-category").value = e.category;
      document.getElementById("field-amount").value = e.amount;
      document.getElementById("field-wallet").value      = e.walletId || "";
      document.getElementById("field-description").value = e.description || "";
      document.getElementById("btn-save").textContent = "Actualizar gasto";
      openDrawer();
    };

    function openDrawer() {
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
    }

    function closeDrawer() {
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    };

    // ── Guardar / actualizar gasto ────────────────────────
    async function saveExpense() {
      const date     = document.getElementById("field-date").value;
      const category = document.getElementById("field-category").value;
      const amount   = Number(document.getElementById("field-amount").value);
      const walletId    = document.getElementById("field-wallet").value;
      const walletOpt   = document.querySelector(`#field-wallet option[value="${walletId}"]`);
      const walletName  = walletOpt?.dataset.name || "";
      const description = document.getElementById("field-description").value.trim();
      const btn         = document.getElementById("btn-save");

      if (!date || !category || !amount) {
        showToast("Completa fecha, categoría y valor.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        const data = { date, category, amount, description, walletId, walletName };
        if (editingId) {
          const old = allExpenses.find(x => x.id === editingId);
          await updateExpense(uid, editingId, old, data);
          showToast("Gasto actualizado.", "success");
        } else {
          await addExpense(uid, data);
          showToast("Gasto registrado.", "success");
        }
        wallets = await getWallets(uid);
        populateWalletSelect();
        closeDrawer();
        await loadExpenses();
        populateCategoryFilters();
      } catch (err) {
        showToast("Error al guardar. Intenta de nuevo.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? "Actualizar gasto" : "Guardar gasto";
      }
    };

    // ── Eliminar gasto ────────────────────────────────────
    async function handleDelete(id) {
      if (!confirm("¿Eliminar este gasto? El saldo de la cajita se ajustará.")) return;
      try {
        const expense = allExpenses.find(x => x.id === id);
        await deleteExpense(uid, id, expense);
        showToast("Gasto eliminado.", "success");
        await loadExpenses();
      } catch (err) {
        showToast("Error al eliminar.", "error");
      }
    };

    // ── Cerrar con Escape ─────────────────────────────────
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawer();
    });
  </script>
</body>
</html>
