<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Metas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 54px; height: 54px;
      background: var(--accent); color: #fdf6f0;
      border: none; border-radius: 50%; font-size: 26px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(212,96,138,0.25);
      z-index: 90; transition: background 0.2s, transform 0.2s;
    }
    .fab:hover  { background: var(--accent2); }
    .fab:active { transform: scale(0.95); }

    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
      z-index: 160; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-width: 680px; margin: 0 auto;
      max-height: 92vh; overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px; background: var(--border2);
      border-radius: 99px; margin: 0 auto 20px;
    }
    .drawer-title {
      font-family: "DM Serif Display", serif;
      font-size: 20px; font-weight: 400; margin-bottom: 20px;
    }

    /* ── Tarjeta de meta ─────────────────────────────────── */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .goal-card:hover { border-color: var(--border2); }

    .goal-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 14px;
    }

    .goal-left { display: flex; align-items: center; gap: 12px; }

    .goal-emoji {
      width: 44px; height: 44px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    .goal-name {
      font-size: 16px; color: var(--text); font-weight: 400;
    }
    .goal-target-date {
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }

    .goal-status {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px; border-radius: 99px; flex-shrink: 0;
    }
    .goal-status.done    { background: rgba(212,96,138,0.12); color: var(--accent); }
    .goal-status.on-track{ background: rgba(74,127,181,0.12); color: var(--info); }
    .goal-status.behind  { background: rgba(201,124,46,0.12); color: var(--warning); }
    .goal-status.no-date { background: var(--surface2); color: var(--muted); }

    /* ── Montos ──────────────────────────────────────────── */
    .goal-amounts {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 6px;
    }
    .goal-saved {
      font-family: "DM Serif Display", serif;
      font-size: 26px; letter-spacing: -0.8px; color: var(--accent);
    }
    .goal-saved.done { color: var(--accent); }
    .goal-total { font-size: 14px; color: var(--muted); }

    .goal-pct { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .goal-pct span { color: var(--text); font-weight: 500; }

    /* ── Panel calculadora dentro de la tarjeta ──────────── */
    .goal-calc-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
    }

    .calc-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .calc-row:last-child { border-bottom: none; }

    .calc-label { color: var(--muted); }
    .calc-value { font-family: "DM Serif Display", serif; font-size: 15px; letter-spacing: -0.3px; }
    .calc-value.accent  { color: var(--accent); }
    .calc-value.info    { color: var(--info); }
    .calc-value.warning { color: var(--warning); }
    .calc-value.muted   { color: var(--muted); font-size: 13px; font-family: "DM Sans", sans-serif; }

    /* ── Slider de ahorro mensual ────────────────────────── */
    .slider-section { margin: 14px 0 4px; }
    .slider-header {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted); margin-bottom: 8px;
    }
    .slider-header strong { color: var(--accent); font-family: "DM Serif Display", serif; font-size: 14px; }

    input[type="range"] {
      width: 100%; accent-color: var(--accent);
      height: 4px; cursor: pointer;
    }

    /* ── Emoji picker ────────────────────────────────────── */
    .emoji-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px;
    }
    .emoji-btn {
      width: 40px; height: 40px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .emoji-btn.selected { border-color: var(--accent); background: rgba(212,96,138,0.08); }

    /* ── Dual inputs ─────────────────────────────────────── */
    .dual-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .amount-wrapper { position: relative; }
    .amount-wrapper .sym {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }
    .amount-wrapper .form-input { padding-left: 26px; }

    /* ── Calculadora rápida (standalone) ─────────────────── */
    .quick-calc {
      background: rgba(74,127,181,0.06);
      border: 1px solid rgba(74,127,181,0.2);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .quick-calc h3 { color: var(--info); margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:20px;">
      <h2>Metas de ahorro</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Define tus metas y calcula cuánto ahorrar cada mes para cumplirlas.
      </p>
    </div>

    <!-- Calculadora rápida sin meta guardada -->
    <div class="quick-calc" id="quick-calc">
      <h3>Calculadora rápida</h3>
      <div class="dual-inputs" style="margin-bottom:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Meta total</label>
          <div class="amount-wrapper">
            <span class="sym">$</span>
            <input type="number" class="form-input" id="qc-goal" placeholder="0" min="0"/>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Ya tengo</label>
          <div class="amount-wrapper">
            <span class="sym">$</span>
            <input type="number" class="form-input" id="qc-saved" placeholder="0" min="0"/>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Meses para lograrlo</label>
        <input type="number" class="form-input" id="qc-months" placeholder="12" min="1" max="360"/>
      </div>
      <div id="qc-result" style="display:none;" class="goal-calc-panel">
        <div class="calc-row">
          <span class="calc-label">Ahorro mensual necesario</span>
          <span class="calc-value accent" id="qc-monthly"></span>
        </div>
        <div class="calc-row">
          <span class="calc-label">Falta ahorrar</span>
          <span class="calc-value info" id="qc-remaining"></span>
        </div>
        <div class="calc-row">
          <span class="calc-label">Fecha estimada</span>
          <span class="calc-value muted" id="qc-date"></span>
        </div>
      </div>
    </div>

    <!-- Lista de metas guardadas -->
    <div id="goals-list">
      <div class="skeleton" style="height:180px;border-radius:20px;"></div>
    </div>
  </div>

  <button class="fab" id="fab" title="Nueva meta">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Drawer: crear / editar meta -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="drawer-title">Nueva meta</div>

    <!-- Emoji -->
    <div class="form-group">
      <label class="form-label">Ícono</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- Nombre -->
    <div class="form-group">
      <label class="form-label">Nombre de la meta</label>
      <input type="text" class="form-input" id="field-name"
             placeholder="Ej: Viaje, Computador, Fondo de emergencia..." maxlength="50"/>
    </div>

    <!-- Montos -->
    <div class="dual-inputs">
      <div class="form-group">
        <label class="form-label">Meta total</label>
        <div class="amount-wrapper">
          <span class="sym">$</span>
          <input type="number" class="form-input" id="field-goal"
                 placeholder="0" min="0"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Ya tengo</label>
        <div class="amount-wrapper">
          <span class="sym">$</span>
          <input type="number" class="form-input" id="field-saved"
                 placeholder="0" min="0"/>
        </div>
      </div>
    </div>

    <!-- Fecha objetivo -->
    <div class="form-group">
      <label class="form-label">
        Fecha objetivo
        <span style="color:var(--muted);font-weight:300;">(opcional)</span>
      </label>
      <input type="month" class="form-input" id="field-date"/>
    </div>

    <!-- Notas -->
    <div class="form-group">
      <label class="form-label">
        Notas
        <span style="color:var(--muted);font-weight:300;">(opcional)</span>
      </label>
      <input type="text" class="form-input" id="field-notes"
             placeholder="Para qué es esta meta..." maxlength="120"/>
    </div>

    <!-- Calculadora en tiempo real -->
    <div id="drawer-calc" style="display:none;" class="goal-calc-panel" style="margin-bottom:16px;">
      <div class="slider-section">
        <div class="slider-header">
          <span>Ahorro mensual</span>
          <strong id="dc-slider-val">$ 0</strong>
        </div>
        <input type="range" id="dc-slider" min="0" max="5000000" step="10000"
               value="0"/>
      </div>
      <div style="height:10px;"></div>
      <div class="calc-row">
        <span class="calc-label">Necesario por mes</span>
        <span class="calc-value accent" id="dc-needed"></span>
      </div>
      <div class="calc-row">
        <span class="calc-label">Falta ahorrar</span>
        <span class="calc-value info" id="dc-remaining"></span>
      </div>
      <div class="calc-row" id="dc-date-row">
        <span class="calc-label">Llegarías en</span>
        <span class="calc-value muted" id="dc-date"></span>
      </div>
    </div>

    <button class="btn-primary" id="btn-save" style="margin-top:8px;">
      Guardar meta
    </button>
  </div>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getGoals, addGoal, updateGoal, deleteGoal } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, showToast } from "../assets/ui.js?v=2";
    import {
      formatCOP, formatMonth, currentMonth,
      monthlySavingsNeeded, monthsUntil, goalProgress, estimatedCompletion
    } from "../assets/utils.js";

    let uid, goals = [], editingId = null, selectedEmoji = "🎯";

    const EMOJIS = ["🎯","✈️","🏠","🚗","💻","📱","🎓","💍","🏖️","🛋️","🐾","🎸","💊","🧳","🎁","💰"];

    // ── Init ─────────────────────────────────────────────
    const user = await requireAuth();
    uid = user.uid;

    renderTopbar(user);
    renderBottomNav("categories"); // "Más" en el nav
    buildEmojiGrid();
    await loadGoals();

    // ── Cargar metas ──────────────────────────────────────
    async function loadGoals() {
      goals = await getGoals(uid);
      renderGoals();
    }

    // ── Render metas ──────────────────────────────────────
    function renderGoals() {
      const el = document.getElementById("goals-list");

      if (!goals.length) {
        el.innerHTML = `
          <div class="empty-state">
            <p>No tienes metas guardadas.</p>
            <p style="margin-top:6px;font-size:12px;">
              Usa la calculadora de arriba o toca
              <strong style="color:var(--accent)">+</strong> para guardar una meta.
            </p>
          </div>`;
        return;
      }

      // Ordenar: incompletas primero, luego por % de progreso desc
      const sorted = [...goals].sort((a, b) => {
        const pa = goalProgress(a.goalAmount, a.savedAmount);
        const pb = goalProgress(b.goalAmount, b.savedAmount);
        if (pa >= 1 && pb < 1) return 1;
        if (pb >= 1 && pa < 1) return -1;
        return pb - pa;
      });

      el.innerHTML = sorted.map(g => goalCardHTML(g)).join("");
    }

    function goalCardHTML(g) {
      const pct       = goalProgress(g.goalAmount, g.savedAmount);
      const pctN      = Math.round(pct * 100);
      const remaining = Math.max(0, g.goalAmount - g.savedAmount);
      const done      = pct >= 1;
      const months    = g.targetDate ? monthsUntil(g.targetDate) : null;
      const needed    = months !== null ? monthlySavingsNeeded(g.goalAmount, g.savedAmount, months) : null;

      // Estado
      let statusCls, statusLbl;
      if (done) {
        statusCls = "done"; statusLbl = "¡Cumplida!";
      } else if (months === null) {
        statusCls = "no-date"; statusLbl = "Sin fecha";
      } else if (months === 0) {
        statusCls = "behind"; statusLbl = "Vencida";
      } else {
        statusCls = "on-track"; statusLbl = `${months} mes${months !== 1 ? "es" : ""} restantes`;
      }

      const barCls = done ? "" : pct >= 0.8 ? "" : pct >= 0.5 ? "" : "";

      // Fecha estimada con ahorro mensual actual
      const estDate = needed !== null && needed > 0
        ? estimatedCompletion(g.goalAmount, g.savedAmount, needed)
        : null;

      return `
        <div class="goal-card" data-id="${g.id}">
          <div class="goal-card-top">
            <div class="goal-left">
              <div class="goal-emoji">${g.emoji || "🎯"}</div>
              <div>
                <div class="goal-name">${g.name}</div>
                <div class="goal-target-date">
                  ${g.targetDate ? `Meta: ${formatMonth(g.targetDate)}` : "Sin fecha límite"}
                </div>
              </div>
            </div>
            <div class="goal-status ${statusCls}">${statusLbl}</div>
          </div>

          <div class="goal-amounts">
            <div class="goal-saved ${done ? "done" : ""}">${formatCOP(g.savedAmount)}</div>
            <div class="goal-total">de ${formatCOP(g.goalAmount)}</div>
          </div>

          <div class="goal-pct">
            <span>${pctN}%</span> completado
            ${!done ? ` · faltan <span>${formatCOP(remaining)}</span>` : ""}
          </div>

          <div class="progress-bar" style="margin-bottom:${done || !needed ? "0" : "12px"};">
            <div class="progress-fill ${done ? "" : ""}" style="width:${Math.min(pct,1)*100}%;${done?"background:var(--accent);":""}"></div>
          </div>

          ${!done && needed !== null ? `
            <div class="goal-calc-panel" style="margin-top:12px;">
              <div class="calc-row">
                <span class="calc-label">Ahorro mensual necesario</span>
                <span class="calc-value accent">${formatCOP(needed)}</span>
              </div>
              <div class="calc-row">
                <span class="calc-label">Meses restantes</span>
                <span class="calc-value info">${months}</span>
              </div>
              ${estDate ? `
              <div class="calc-row">
                <span class="calc-label">Llegarías en</span>
                <span class="calc-value muted">${formatMonth(estDate)}</span>
              </div>` : ""}
            </div>` : ""}

          <div style="display:flex;justify-content:flex-end;margin-top:12px;">
            <button class="btn-danger" data-id="${g.id}" data-name="${g.name}">
              Eliminar
            </button>
          </div>
        </div>`;
    }

    // ── Calculadora rápida ────────────────────────────────
    function calcQuick() {
      const goal   = Number(document.getElementById("qc-goal").value)   || 0;
      const saved  = Number(document.getElementById("qc-saved").value)  || 0;
      const months = Number(document.getElementById("qc-months").value) || 0;
      const result = document.getElementById("qc-result");

      if (!goal || !months) { result.style.display = "none"; return; }

      const needed    = monthlySavingsNeeded(goal, saved, months);
      const remaining = Math.max(0, goal - saved);
      const estDate   = estimatedCompletion(goal, saved, needed);

      document.getElementById("qc-monthly").textContent   = formatCOP(needed);
      document.getElementById("qc-remaining").textContent = formatCOP(remaining);
      document.getElementById("qc-date").textContent      = estDate ? formatMonth(estDate) : "—";
      result.style.display = "block";
    };

    // ── Drawer: nuevo ─────────────────────────────────────
    document.getElementById("fab").addEventListener("click", openNewDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
    document.getElementById("btn-save").addEventListener("click", saveGoal);
    document.getElementById("qc-goal").addEventListener("input", calcQuick);
    document.getElementById("qc-saved").addEventListener("input", calcQuick);
    document.getElementById("qc-months").addEventListener("input", calcQuick);
    document.getElementById("field-goal").addEventListener("input", updateDrawerCalc);
    document.getElementById("field-saved").addEventListener("input", updateDrawerCalc);
    document.getElementById("field-date").addEventListener("input", updateDrawerCalc);
    document.getElementById("dc-slider").addEventListener("input", e => onSliderChange(e.target.value));

    // Event delegation for goal cards
    document.getElementById("goals-list").addEventListener("click", e => {
      const deleteBtn = e.target.closest(".btn-danger");
      const card      = e.target.closest(".goal-card");
      if (deleteBtn && deleteBtn.dataset.id) {
        handleDelete(deleteBtn.dataset.id, deleteBtn.dataset.name);
      } else if (card && !e.target.closest(".goal-calc-panel") && !e.target.closest(".btn-danger")) {
        if (card.dataset.id) openEditDrawer(card.dataset.id);
      }
    });

    // Event delegation for emoji grid
    document.getElementById("emoji-grid").addEventListener("click", e => {
      const btn = e.target.closest(".emoji-btn");
      if (btn) selectEmoji(btn.dataset.emoji);
    });

    function openNewDrawer() {
      editingId = null;
      selectedEmoji = "🎯";
      document.getElementById("drawer-title").textContent = "Nueva meta";
      document.getElementById("field-name").value  = "";
      document.getElementById("field-goal").value  = "";
      document.getElementById("field-saved").value = "";
      document.getElementById("field-date").value  = "";
      document.getElementById("field-notes").value = "";
      document.getElementById("btn-save").textContent = "Guardar meta";
      document.getElementById("drawer-calc").style.display = "none";
      highlightEmoji("🎯");
      openDrawer();
    }

    // ── Drawer: editar ────────────────────────────────────
    function openEditDrawer(id) {
      const g = goals.find(x => x.id === id);
      if (!g) return;
      editingId = id;
      selectedEmoji = g.emoji || "🎯";
      document.getElementById("drawer-title").textContent = "Editar meta";
      document.getElementById("field-name").value  = g.name;
      document.getElementById("field-goal").value  = g.goalAmount;
      document.getElementById("field-saved").value = g.savedAmount;
      document.getElementById("field-date").value  = g.targetDate || "";
      document.getElementById("field-notes").value = g.notes || "";
      document.getElementById("btn-save").textContent = "Actualizar meta";
      highlightEmoji(selectedEmoji);
      updateDrawerCalc();
      openDrawer();
    };

    // ── Calculadora en el drawer ──────────────────────────
    function updateDrawerCalc() {
      const goal   = Number(document.getElementById("field-goal").value)  || 0;
      const saved  = Number(document.getElementById("field-saved").value) || 0;
      const date   = document.getElementById("field-date").value;
      const calcEl = document.getElementById("drawer-calc");

      if (!goal) { calcEl.style.display = "none"; return; }
      calcEl.style.display = "block";

      const remaining = Math.max(0, goal - saved);
      const months    = date ? monthsUntil(date) : null;
      const needed    = months !== null ? monthlySavingsNeeded(goal, saved, months) : null;

      document.getElementById("dc-remaining").textContent = formatCOP(remaining);

      if (needed !== null) {
        document.getElementById("dc-needed").textContent = formatCOP(needed);
        const slider = document.getElementById("dc-slider");
        slider.max   = Math.max(needed * 2, 1000000);
        slider.value = needed;
        document.getElementById("dc-slider-val").textContent = formatCOP(needed);
        updateDateFromSlider(needed, goal, saved);
      } else {
        document.getElementById("dc-needed").textContent = "—";
        document.getElementById("dc-date").textContent   = "—";
        const slider = document.getElementById("dc-slider");
        slider.max   = Math.max(goal, 1000000);
        slider.value = 0;
        document.getElementById("dc-slider-val").textContent = formatCOP(0);
      }

      document.getElementById("dc-date-row").style.display = date ? "" : "none";
    };

    function onSliderChange(val) {
      const goal  = Number(document.getElementById("field-goal").value)  || 0;
      const saved = Number(document.getElementById("field-saved").value) || 0;
      document.getElementById("dc-slider-val").textContent = formatCOP(Number(val));
      updateDateFromSlider(Number(val), goal, saved);
    };

    function updateDateFromSlider(monthly, goal, saved) {
      const estDate = estimatedCompletion(goal, saved, monthly);
      document.getElementById("dc-date").textContent = estDate ? formatMonth(estDate) : "—";
    }

    // ── Emoji grid ────────────────────────────────────────
    function buildEmojiGrid() {
      document.getElementById("emoji-grid").innerHTML = EMOJIS.map(e => `
        <button type="button" class="emoji-btn" data-emoji="${e}">${e}</button>
      `).join("");
    }

    function selectEmoji(e) {
      selectedEmoji = e;
      highlightEmoji(e);
    };

    function highlightEmoji(e) {
      document.querySelectorAll(".emoji-btn").forEach(btn => {
        btn.classList.toggle("selected", btn.dataset.emoji === e);
      });
    }

    // ── Guardar ───────────────────────────────────────────
    async function saveGoal() {
      const name       = document.getElementById("field-name").value.trim();
      const goalAmount = Number(document.getElementById("field-goal").value)  || 0;
      const savedAmount= Number(document.getElementById("field-saved").value) || 0;
      const targetDate = document.getElementById("field-date").value || null;
      const notes      = document.getElementById("field-notes").value.trim();
      const btn        = document.getElementById("btn-save");

      if (!name)       { showToast("Escribe un nombre para la meta.", "error"); return; }
      if (!goalAmount) { showToast("Ingresa un monto objetivo.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "Guardando...";

      const data = { name, goalAmount, savedAmount, emoji: selectedEmoji, notes };
      if (targetDate) data.targetDate = targetDate;

      try {
        if (editingId) {
          await updateGoal(uid, editingId, data);
          showToast("Meta actualizada.", "success");
        } else {
          await addGoal(uid, data);
          showToast("Meta guardada.", "success");
        }
        closeDrawer();
        await loadGoals();
      } catch (err) {
        showToast("Error al guardar. Intenta de nuevo.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? "Actualizar meta" : "Guardar meta";
      }
    };

    // ── Eliminar ──────────────────────────────────────────
    async function handleDelete(id, name) {
      if (!confirm(`¿Eliminar la meta "${name}"?`)) return;
      try {
        await deleteGoal(uid, id);
        showToast("Meta eliminada.", "success");
        await loadGoals();
      } catch (err) {
        showToast("Error al eliminar.", "error");
      }
    };

    // ── Drawer helpers ────────────────────────────────────
    function openDrawer() {
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
      setTimeout(() => document.getElementById("field-name").focus(), 320);
    }

    function closeDrawer() {
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    };

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawer();
    });
  </script>
</body>
</html>
