<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Cajitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 54px; height: 54px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 50%; font-size: 26px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(212,96,138,0.25);
      z-index: 90; transition: background 0.2s, transform 0.2s;
    }
    .fab:hover  { background: var(--accent2); }
    .fab:active { transform: scale(0.95); }

    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 36px;
      z-index: 160; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-width: 680px; margin: 0 auto; max-height: 90vh; overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 20px; }
    .drawer-title  { font-family: "DM Serif Display", serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }

    /* ── Resumen total ────────────────────────────────────── */
    .total-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 22px 20px; margin-bottom: 14px;
      text-align: center;
    }
    .total-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .total-amount {
      font-family: "DM Serif Display", serif;
      font-size: 40px; letter-spacing: -1.5px; color: var(--accent); line-height: 1;
    }
    .total-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Tarjeta de cajita ───────────────────────────────── */
    .wallet-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .wallet-card:hover { border-color: var(--border2); }

    .wallet-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .wallet-left { display: flex; align-items: center; gap: 12px; }
    .wallet-icon {
      width: 42px; height: 42px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .wallet-name { font-size: 15px; color: var(--text); font-weight: 400; }
    .wallet-note { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .wallet-balance {
      font-family: "DM Serif Display", serif;
      font-size: 24px; letter-spacing: -0.8px; color: var(--text);
    }
    .wallet-balance.negative { color: var(--danger); }

    .wallet-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

    /* ── Emoji grid ──────────────────────────────────────── */
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .emoji-btn {
      width: 40px; height: 40px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .emoji-btn.selected { border-color: var(--accent); background: rgba(212,96,138,0.08); }

    /* ── Ajuste de saldo ─────────────────────────────────── */
    .adjust-section {
      background: rgba(212,96,138,0.06); border: 1px solid rgba(212,96,138,0.2);
      border-radius: 12px; padding: 14px; margin-bottom: 16px;
    }
    .adjust-section p { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }

    .amount-wrapper { position: relative; }
    .amount-wrapper .sym {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none;
    }
    .amount-wrapper .form-input { padding-left: 26px; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="page">
    <div style="margin-bottom:16px;">
      <h2>Cajitas</h2>
      <p style="font-size:13px;color:var(--muted);margin-top:4px;">
        Tus cuentas y lugares donde vive el dinero.
      </p>
    </div>

    <!-- Total general -->
    <div class="total-card" id="total-card">
      <div class="skeleton" style="height:80px;border-radius:12px;"></div>
    </div>

    <!-- Lista de cajitas -->
    <div id="wallets-list">
      <div class="skeleton" style="height:180px;border-radius:16px;"></div>
    </div>
  </div>

  <button class="fab" id="fab">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title" id="drawer-title">Nueva cajita</div>

    <!-- Emoji -->
    <div class="form-group">
      <label class="form-label">Ícono</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- Nombre -->
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-input" id="field-name"
             placeholder="Ej: Banco, Efectivo, Nequi..." maxlength="40"/>
    </div>

    <!-- Saldo inicial (solo al crear) -->
    <div class="form-group" id="balance-group">
      <label class="form-label">Saldo inicial</label>
      <div class="amount-wrapper">
        <span class="sym">$</span>
        <input type="number" class="form-input" id="field-balance" placeholder="0" min="0"/>
      </div>
    </div>

    <!-- Ajuste de saldo (solo al editar) -->
    <div class="adjust-section" id="adjust-section" style="display:none;">
      <p>El saldo se actualiza automáticamente con cada gasto e ingreso. Si necesitas corregirlo manualmente, ingresa el valor real actual.</p>
      <label class="form-label" style="margin-bottom:8px;">Saldo actual</label>
      <div class="amount-wrapper">
        <span class="sym">$</span>
        <input type="number" class="form-input" id="field-adjust" placeholder="0"/>
      </div>
    </div>

    <!-- Notas -->
    <div class="form-group">
      <label class="form-label">Notas <span style="color:var(--muted);font-weight:300;">(opcional)</span></label>
      <input type="text" class="form-input" id="field-notes" placeholder="Banco Davivienda, cuenta de ahorros..." maxlength="80"/>
    </div>

    <button class="btn-primary" id="btn-save">Guardar cajita</button>
  </div>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getWallets, addWallet, updateWallet, adjustWalletBalance, deleteWallet } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, showToast } from "../assets/ui.js";
    import { formatCOP } from "../assets/utils.js";

    const EMOJIS = ["🏦","💵","💳","📱","🐷","💰","🏧","✈️","🏠","🚗","📦","💎"];
    let uid, wallets = [], editingId = null, selectedEmoji = "🏦";

    const user = await requireAuth();
    uid = user.uid;
    renderTopbar(user);
    renderBottomNav("envelopes");
    buildEmojiGrid();
    await loadWallets();

    // ── Event listeners ───────────────────────────────────
    document.getElementById("fab").addEventListener("click", openNewDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
    document.getElementById("btn-save").addEventListener("click", saveWallet);
    document.getElementById("emoji-grid").addEventListener("click", e => {
      const btn = e.target.closest(".emoji-btn");
      if (btn) selectEmoji(btn.dataset.emoji);
    });
    document.getElementById("wallets-list").addEventListener("click", e => {
      const deleteBtn = e.target.closest(".btn-danger");
      const card      = e.target.closest(".wallet-card");
      if (deleteBtn) {
        handleDelete(deleteBtn.dataset.id, deleteBtn.dataset.name);
      } else if (card && !e.target.closest("button")) {
        openEditDrawer(card.dataset.id);
      }
    });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

    // ── Cargar cajitas ────────────────────────────────────
    async function loadWallets() {
      wallets = await getWallets(uid);
      renderWallets();
    }

    function renderWallets() {
      const totalEl = document.getElementById("total-card");
      const listEl  = document.getElementById("wallets-list");

      const total = wallets.reduce((s, w) => s + Number(w.balance), 0);
      totalEl.innerHTML = `
        <div class="total-label">Saldo total disponible</div>
        <div class="total-amount">${formatCOP(total)}</div>
        <div class="total-sub">${wallets.length} cajita${wallets.length !== 1 ? "s" : ""}</div>
      `;

      if (!wallets.length) {
        listEl.innerHTML = `
          <div class="empty-state">
            <p>No tienes cajitas todavía.</p>
            <p style="margin-top:6px;font-size:12px;">
              Toca <strong style="color:var(--accent)">+</strong> para crear la primera.
            </p>
          </div>`;
        return;
      }

      listEl.innerHTML = wallets.map(w => {
        const balance = Number(w.balance);
        const isNeg   = balance < 0;
        return `
          <div class="wallet-card" data-id="${w.id}">
            <div class="wallet-top">
              <div class="wallet-left">
                <div class="wallet-icon">${w.icon || "🏦"}</div>
                <div>
                  <div class="wallet-name">${w.name}</div>
                  ${w.notes ? `<div class="wallet-note">${w.notes}</div>` : ""}
                </div>
              </div>
              <div class="wallet-balance ${isNeg ? "negative" : ""}">${formatCOP(balance)}</div>
            </div>
            <div class="wallet-footer">
              <button class="btn-danger" data-id="${w.id}" data-name="${w.name}">Eliminar</button>
            </div>
          </div>`;
      }).join("");
    }

    // ── Emoji ─────────────────────────────────────────────
    function buildEmojiGrid() {
      document.getElementById("emoji-grid").innerHTML = EMOJIS.map(e =>
        `<button type="button" class="emoji-btn" data-emoji="${e}">${e}</button>`
      ).join("");
    }

    function selectEmoji(e) {
      selectedEmoji = e;
      document.querySelectorAll(".emoji-btn").forEach(b =>
        b.classList.toggle("selected", b.dataset.emoji === e)
      );
    }

    // ── Drawer nuevo ──────────────────────────────────────
    function openNewDrawer() {
      editingId = null;
      selectedEmoji = "🏦";
      document.getElementById("drawer-title").textContent   = "Nueva cajita";
      document.getElementById("field-name").value           = "";
      document.getElementById("field-balance").value        = "";
      document.getElementById("field-notes").value          = "";
      document.getElementById("field-adjust").value         = "";
      document.getElementById("btn-save").textContent       = "Guardar cajita";
      document.getElementById("balance-group").style.display  = "block";
      document.getElementById("adjust-section").style.display = "none";
      selectEmoji("🏦");
      openDrawer();
    }

    // ── Drawer editar ─────────────────────────────────────
    function openEditDrawer(id) {
      const w = wallets.find(x => x.id === id);
      if (!w) return;
      editingId = id;
      selectedEmoji = w.icon || "🏦";
      document.getElementById("drawer-title").textContent   = "Editar cajita";
      document.getElementById("field-name").value           = w.name;
      document.getElementById("field-adjust").value         = w.balance;
      document.getElementById("field-notes").value          = w.notes || "";
      document.getElementById("btn-save").textContent       = "Actualizar cajita";
      document.getElementById("balance-group").style.display  = "none";
      document.getElementById("adjust-section").style.display = "block";
      selectEmoji(selectedEmoji);
      openDrawer();
    }

    // ── Guardar ───────────────────────────────────────────
    async function saveWallet() {
      const name  = document.getElementById("field-name").value.trim();
      const notes = document.getElementById("field-notes").value.trim();
      const btn   = document.getElementById("btn-save");

      if (!name) { showToast("Escribe un nombre para la cajita.", "error"); return; }

      btn.disabled = true; btn.textContent = "Guardando...";

      try {
        if (editingId) {
          const newBalance = Number(document.getElementById("field-adjust").value) || 0;
          await updateWallet(uid, editingId, {
            name, notes, icon: selectedEmoji, balance: newBalance
          });
          showToast("Cajita actualizada.", "success");
        } else {
          const balance = Number(document.getElementById("field-balance").value) || 0;
          await addWallet(uid, { name, notes, icon: selectedEmoji, balance });
          showToast("Cajita creada.", "success");
        }
        closeDrawer();
        await loadWallets();
      } catch (err) {
        showToast("Error al guardar.", "error");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = editingId ? "Actualizar cajita" : "Guardar cajita";
      }
    }

    // ── Eliminar ──────────────────────────────────────────
    async function handleDelete(id, name) {
      if (!confirm(`¿Eliminar la cajita "${name}"?\nLos movimientos registrados no se borran.`)) return;
      try {
        await deleteWallet(uid, id);
        showToast("Cajita eliminada.", "success");
        await loadWallets();
      } catch (err) {
        showToast("Error al eliminar.", "error");
      }
    }

    function openDrawer() {
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
      setTimeout(() => document.getElementById("field-name").focus(), 320);
    }

    function closeDrawer() {
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    }
  </script>
</body>
</html>
