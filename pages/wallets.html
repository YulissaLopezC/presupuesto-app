<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presupuesto · Cajitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    body { background: #f0f4f8; }
    body.dark { background: #111; }

    .page-hdr { padding: 14px 16px 0; max-width: 680px; margin: 0 auto; }
    .page-title { font-size: 22px; font-weight: 500; color: var(--text); }
    .page-sub { font-size: 12px; color: #888; margin-top: 2px; }

    .sum-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 14px 0; max-width: calc(680px - 28px); }
    .sum-card { background: #fff; border-radius: 16px; padding: 16px; }
    body.dark .sum-card { background: #1a1a1a; }
    .sum-lbl { font-size: 9px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .sum-val-row { display: flex; align-items: baseline; gap: 4px; }
    .sum-sym { font-size: 16px; color: #185fa5; font-weight: 500; }
    .sum-val { font-size: 22px; font-weight: 500; color: #185fa5; letter-spacing: -0.5px; }
    .sum-val.red { color: #c0392b; }
    .sum-sym.red { color: #c0392b; }

    .transfer-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 14px 14px 0; background: #0f3460; color: #fff;
      border: none; border-radius: 12px; padding: 13px 18px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: "DM Sans", sans-serif;
      width: calc(100% - 28px); max-width: calc(680px - 28px);
    }
    body.dark .transfer-btn { background: #0a1f3d; }

    .section-hdr { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px 10px; max-width: 680px; margin: 0 auto; }
    .section-title { font-size: 15px; font-weight: 500; color: var(--text); }

    .wallet-list { display: flex; flex-direction: column; gap: 8px; padding: 0 14px; max-width: 680px; margin: 0 auto; }
    .wallet-item {
      background: #fff; border-radius: 14px; padding: 14px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: background 0.1s;
    }
    body.dark .wallet-item { background: #1a1a1a; }
    .wallet-item:hover { background: #f8fafc; }
    body.dark .wallet-item:hover { background: #222; }

    .w-ico { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .w-info { flex: 1; min-width: 0; }
    .w-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .w-type { font-size: 11px; color: #888; margin-top: 2px; }
    .w-right { text-align: right; flex-shrink: 0; }
    .w-balance { font-size: 16px; font-weight: 500; color: #185fa5; }
    .w-balance.red { color: #c0392b; }
    .w-sublbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #3b6d11; margin-top: 2px; }
    .w-sublbl.red { color: #c0392b; }
    .w-actions { display: flex; gap: 6px; }
    .w-btn { background: #f0f4f8; border: none; border-radius: 8px; padding: 6px 10px; font-size: 11px; color: #555; cursor: pointer; font-family: "DM Sans", sans-serif; transition: background 0.15s; }
    body.dark .w-btn { background: #222; color: #aaa; }
    .w-btn:hover { background: #e2e8f0; }
    .w-btn.danger:hover { background: #fbeaea; color: #c0392b; }

    .fab {
      position: fixed; bottom: 76px; right: 20px;
      width: 52px; height: 52px; background: #0f3460; color: #fff;
      border: none; border-radius: 50%; font-size: 24px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(15,52,96,0.3); z-index: 90;
    }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,52,96,0.4);
      z-index: 150; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff; border-radius: 20px; padding: 24px 20px 20px;
      width: 100%; max-width: 400px;
      transform: scale(0.95); opacity: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
      max-height: 90vh; overflow-y: auto;
    }
    body.dark .modal { background: #1a1a1a; }
    .modal-overlay.open .modal { transform: scale(1); opacity: 1; }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 500; color: var(--text); }
    .modal-close { background: none; border: none; font-size: 20px; color: #888; cursor: pointer; }
    .field-lbl { font-size: 10px; font-weight: 500; color: #8a9ab0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    /* Tipo selector */
    .tipo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 18px; }
    .tipo-btn {
      border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 14px 8px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; background: #fff; font-family: "DM Sans", sans-serif;
      transition: all 0.15s;
    }
    body.dark .tipo-btn { background: #222; border-color: #333; }
    .tipo-btn.active { border-color: #0f3460; background: #f0f4ff; }
    body.dark .tipo-btn.active { background: #0a1f3d; }
    .tipo-ico { width: 36px; height: 36px; border-radius: 10px; background: #f0f4f8; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .tipo-btn.active .tipo-ico { background: #e6f1fb; }
    .tipo-name { font-size: 12px; font-weight: 500; color: #888; }
    .tipo-btn.active .tipo-name { color: #0f3460; }

    /* Emoji grid */
    .emoji-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .emoji-btn {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1.5px solid #e2e8f0; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; transition: all 0.15s;
    }
    body.dark .emoji-btn { background: #222; border-color: #333; }
    .emoji-btn.active { border-color: #0f3460; background: #f0f4ff; }

    /* Fields */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .field-block { margin-bottom: 14px; }
    .f-input {
      width: 100%; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 13px; font-family: "DM Sans", sans-serif; color: var(--text);
      background: #fff; outline: none; transition: border-color 0.15s;
    }
    body.dark .f-input { background: #222; border-color: #333; }
    .f-input:focus { border-color: #0f3460; }
    .f-input:disabled { opacity: 0.3; cursor: not-allowed; }
    .modal-save-btn {
      width: 100%; padding: 13px; background: #0f3460; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: "DM Sans", sans-serif; margin-top: 4px;
    }
    .modal-save-btn:hover { background: #1a4a7a; }

    /* Transfer drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 24px 20px 36px; z-index: 160;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
      max-width: 680px; margin: 0 auto; max-height: 80vh; overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 20px; }
  </style>
</head>
<body>
  <div id="topbar" class="topbar" style="max-width:680px;margin:0 auto;padding:12px 14px 0;"></div>

  <div class="page-hdr">
    <div class="page-title">Cajitas</div>
    <div class="page-sub">Tus cuentas, ahorros y tarjetas</div>
  </div>

  <div class="sum-row" id="sum-row">
    <div class="skeleton" style="height:80px;border-radius:16px;"></div>
    <div class="skeleton" style="height:80px;border-radius:16px;"></div>
  </div>

  <button class="transfer-btn" id="btn-transfer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
    Transferir entre cajitas
  </button>

  <div class="section-hdr">
    <div class="section-title">Cajitas activas</div>
  </div>

  <div class="wallet-list" id="wallet-list">
    <div class="skeleton" style="height:72px;border-radius:14px;"></div>
    <div class="skeleton" style="height:72px;border-radius:14px;"></div>
  </div>

  <button class="fab" id="fab">+</button>
  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Modal nueva/editar cajita -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-hdr">
        <div class="modal-title" id="modal-title">Nueva cajita</div>
        <button class="modal-close" id="modal-close">×</button>
      </div>

      <div class="field-lbl">Tipo de cuenta</div>
      <div class="tipo-grid" id="tipo-grid">
        <button class="tipo-btn active" data-tipo="ahorro">
          <div class="tipo-ico">🏦</div>
          <span class="tipo-name">Ahorro</span>
        </button>
        <button class="tipo-btn" data-tipo="efectivo">
          <div class="tipo-ico">💵</div>
          <span class="tipo-name">Efectivo</span>
        </button>
        <button class="tipo-btn" data-tipo="credito">
          <div class="tipo-ico">💳</div>
          <span class="tipo-name">Crédito</span>
        </button>
      </div>

      <div class="field-lbl">Selecciona un ícono</div>
      <div class="emoji-grid" id="emoji-grid">
        <div class="emoji-btn active" data-emoji="🏦">🏦</div>
        <div class="emoji-btn" data-emoji="💵">💵</div>
        <div class="emoji-btn" data-emoji="💳">💳</div>
        <div class="emoji-btn" data-emoji="🐷">🐷</div>
        <div class="emoji-btn" data-emoji="✈️">✈️</div>
        <div class="emoji-btn" data-emoji="🏠">🏠</div>
        <div class="emoji-btn" data-emoji="📱">📱</div>
        <div class="emoji-btn" data-emoji="🎓">🎓</div>
        <div class="emoji-btn" data-emoji="🚗">🚗</div>
        <div class="emoji-btn" data-emoji="💊">💊</div>
      </div>

      <div class="two-col">
        <div>
          <div class="field-lbl">Nombre</div>
          <input class="f-input" id="field-name" placeholder="Ej. Fondo emergencia"/>
        </div>
        <div>
          <div class="field-lbl" id="balance-label">Saldo inicial</div>
          <input type="number" class="f-input" id="field-balance" placeholder="0" min="0"/>
        </div>
      </div>

      <div class="field-block" id="credit-limit-block">
        <div class="field-lbl">Límite de crédito</div>
        <input type="number" class="f-input" id="field-credit-limit" placeholder="0" min="0" disabled/>
      </div>

      <button class="modal-save-btn" id="btn-save-wallet">Guardar cajita</button>
    </div>
  </div>

  <!-- Transfer drawer -->
  <div class="drawer-overlay" id="drawer-overlay">
    <div class="drawer" id="drawer">
      <div class="drawer-handle"></div>
      <h3 style="margin-bottom:18px;font-size:18px;font-weight:500;color:var(--text);">Transferir entre cajitas</h3>
      <div class="form-group">
        <label class="form-label">Desde</label>
        <select class="form-select" id="transfer-from"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Hacia</label>
        <select class="form-select" id="transfer-to"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Monto</label>
        <input type="number" class="form-input" id="transfer-amount" placeholder="0" min="0"/>
      </div>
      <button class="btn-primary" id="btn-do-transfer">Transferir</button>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "../modules/auth.js";
    import { getWallets, addWallet, updateWallet, deleteWallet, archiveWallet, restoreWallet, addTransfer } from "../modules/db.js";
    import { renderTopbar, renderBottomNav, showToast } from "../assets/ui.js?v=3";
    import { formatCOP } from "../assets/utils.js";

    let uid, wallets = [], editingId = null, selectedTipo = "ahorro", selectedEmoji = "🏦";

    const user = await requireAuth();
    uid = user.uid;
    renderTopbar(user);
    renderBottomNav("wallets");
    await loadWallets();

    // ── Load ──────────────────────────────────────────────
    async function loadWallets() {
      wallets = await getWallets(uid);
      renderSummary();
      renderList();
    }

    // ── Summary ───────────────────────────────────────────
    function renderSummary() {
      const available = wallets.filter(w => w.type !== "credito").reduce((s,w) => s+Number(w.balance||0), 0);
      const debt      = wallets.filter(w => w.type === "credito").reduce((s,w) => s+Number(w.balance||0), 0);
      document.getElementById("sum-row").innerHTML = `
        <div class="sum-card">
          <div class="sum-lbl">Saldo disponible</div>
          <div class="sum-val-row">
            <span class="sum-sym">$</span>
            <span class="sum-val">${formatCOP(available).replace("$","")}</span>
          </div>
        </div>
        <div class="sum-card">
          <div class="sum-lbl">Deuda en crédito</div>
          <div class="sum-val-row">
            <span class="sum-sym red">$</span>
            <span class="sum-val red">${formatCOP(debt).replace("$","")}</span>
          </div>
        </div>`;
    }

    // ── List ──────────────────────────────────────────────
    function renderList() {
      const el = document.getElementById("wallet-list");
      const active = wallets.filter(w => !w.archived);
      if (!active.length) {
        el.innerHTML = `<div class="empty-state"><p>No tienes cajitas creadas.</p>
          <p style="margin-top:6px;font-size:12px;">Toca <strong style="color:#0f3460;">+</strong> para crear una.</p></div>`;
        return;
      }
      const icoBg = { ahorro: "#e6f1fb", efectivo: "#eaf3de", credito: "#fbeaf0" };
      el.innerHTML = active.map(w => {
        const isCredit  = w.type === "credito";
        const balance   = Number(w.balance||0);
        const limit     = Number(w.creditLimit||0);
        const available = isCredit ? limit - balance : balance;
        return `
          <div class="wallet-item">
            <div class="w-ico" style="background:${icoBg[w.type]||"#f0f4f8"};">${w.icon||"🏦"}</div>
            <div class="w-info">
              <div class="w-name">${w.name}</div>
              <div class="w-type">${w.type==="credito"?"Crédito"+(limit?` · Límite ${formatCOP(limit)}`:""):w.type==="efectivo"?"Efectivo":"Ahorro"}</div>
            </div>
            <div class="w-right">
              <div class="w-balance ${isCredit&&balance>0?"red":""}">${formatCOP(isCredit?balance:balance)}</div>
              <div class="w-sublbl ${isCredit&&balance>0?"red":""}">${isCredit?"Deuda actual":"Disponible"}</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;padding:0 2px 4px;justify-content:flex-end;">
            <button class="w-btn" onclick="openEdit('${w.id}')">Editar</button>
            <button class="w-btn danger" onclick="handleArchive('${w.id}')">Archivar</button>
          </div>`;
      }).join("");
    }

    // Archive / delete
    window.openEdit = (id) => {
      const w = wallets.find(x => x.id === id);
      if (!w) return;
      editingId = id;
      selectedTipo  = w.type || "ahorro";
      selectedEmoji = w.icon || "🏦";
      document.getElementById("modal-title").textContent = "Editar cajita";
      document.getElementById("btn-save-wallet").textContent = "Actualizar cajita";
      document.getElementById("field-name").value    = w.name || "";
      document.getElementById("field-balance").value = w.balance || 0;
      document.getElementById("field-credit-limit").value = w.creditLimit || "";
      updateTipoUI(); updateEmojiUI(); updateCreditFields();
      openModal();
    };
    window.handleArchive = async (id) => {
      if (!confirm("¿Archivar esta cajita?")) return;
      try { await archiveWallet(uid, id); showToast("Cajita archivada.", "success"); await loadWallets(); }
      catch(e) { showToast("Error.", "error"); }
    };

    // ── Modal ─────────────────────────────────────────────
    document.getElementById("fab").addEventListener("click", openNewModal);
    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("modal-overlay")) closeModal();
    });

    function openNewModal() {
      editingId = null; selectedTipo = "ahorro"; selectedEmoji = "🏦";
      document.getElementById("modal-title").textContent     = "Nueva cajita";
      document.getElementById("btn-save-wallet").textContent = "Guardar cajita";
      document.getElementById("field-name").value    = "";
      document.getElementById("field-balance").value = "";
      document.getElementById("field-credit-limit").value = "";
      updateTipoUI(); updateEmojiUI(); updateCreditFields();
      openModal();
    }
    function openModal()  { document.getElementById("modal-overlay").classList.add("open"); }
    function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); editingId = null; }

    // Tipo buttons
    document.getElementById("tipo-grid").addEventListener("click", e => {
      const btn = e.target.closest("[data-tipo]");
      if (!btn) return;
      selectedTipo = btn.dataset.tipo;
      updateTipoUI(); updateCreditFields();
    });
    function updateTipoUI() {
      document.querySelectorAll(".tipo-btn").forEach(b => b.classList.toggle("active", b.dataset.tipo === selectedTipo));
    }
    function updateCreditFields() {
      const isCredit = selectedTipo === "credito";
      document.getElementById("field-credit-limit").disabled = !isCredit;
      document.getElementById("balance-label").textContent = isCredit ? "Deuda actual" : "Saldo inicial";
    }

    // Emoji buttons
    document.getElementById("emoji-grid").addEventListener("click", e => {
      const btn = e.target.closest("[data-emoji]");
      if (!btn) return;
      selectedEmoji = btn.dataset.emoji;
      updateEmojiUI();
    });
    function updateEmojiUI() {
      document.querySelectorAll(".emoji-btn").forEach(b => b.classList.toggle("active", b.dataset.emoji === selectedEmoji));
    }

    // Save
    document.getElementById("btn-save-wallet").addEventListener("click", saveWallet);
    async function saveWallet() {
      const name    = document.getElementById("field-name").value.trim();
      const balance = Number(document.getElementById("field-balance").value) || 0;
      const limit   = Number(document.getElementById("field-credit-limit").value) || 0;
      const btn     = document.getElementById("btn-save-wallet");
      if (!name) { showToast("Escribe un nombre.", "error"); return; }
      btn.disabled = true; btn.textContent = "Guardando...";
      try {
        const data = { name, type: selectedTipo, icon: selectedEmoji, balance };
        if (selectedTipo === "credito" && limit) data.creditLimit = limit;
        if (editingId) { await updateWallet(uid, editingId, data); showToast("Cajita actualizada.", "success"); }
        else           { await addWallet(uid, data);               showToast("Cajita creada.", "success"); }
        closeModal(); await loadWallets();
      } catch(e) { showToast("Error al guardar.", "error"); console.error(e); }
      finally { btn.disabled = false; btn.textContent = editingId ? "Actualizar cajita" : "Guardar cajita"; }
    }

    // ── Transfer ──────────────────────────────────────────
    document.getElementById("btn-transfer").addEventListener("click", openTransfer);
    document.getElementById("drawer-overlay").addEventListener("click", e => {
      if (e.target === document.getElementById("drawer-overlay")) closeTransfer();
    });

    function openTransfer() {
      const opts = wallets.filter(w=>!w.archived).map(w =>
        `<option value="${w.id}">${w.icon||"🏦"} ${w.name} · ${formatCOP(w.balance||0)}</option>`
      ).join("");
      document.getElementById("transfer-from").innerHTML = opts;
      document.getElementById("transfer-to").innerHTML   = opts;
      document.getElementById("transfer-amount").value   = "";
      document.getElementById("drawer-overlay").classList.add("open");
      document.getElementById("drawer").classList.add("open");
    }
    function closeTransfer() {
      document.getElementById("drawer-overlay").classList.remove("open");
      document.getElementById("drawer").classList.remove("open");
    }
    document.getElementById("btn-do-transfer").addEventListener("click", async () => {
      const fromId = document.getElementById("transfer-from").value;
      const toId   = document.getElementById("transfer-to").value;
      const amount = Number(document.getElementById("transfer-amount").value) || 0;
      if (!amount || fromId === toId) { showToast("Revisa los datos.", "error"); return; }
      const fromW  = wallets.find(w => w.id === fromId);
      const toW    = wallets.find(w => w.id === toId);
      try {
        await addTransfer(uid, { fromWalletId: fromId, fromWalletName: fromW?.name, toWalletId: toId, toWalletName: toW?.name, amount });
        showToast("Transferencia realizada.", "success");
        closeTransfer(); await loadWallets();
      } catch(e) { showToast("Error.", "error"); }
    });
  </script>
</body>
</html>
